      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: After an incorrect password for a user account has been entered
            three times, the account will be blocked until the user requests the lockout
            be lifted (see 46). The Cyber SO grants permission in this regard.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.49
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.49
