    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:abdo_2019:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: Hoofdstuk 1 Bestuur en Organisatie
      translations:
        en:
          name: 'Chapter 1: Management and Organisation'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.1'
      name: Algemeen
      translations:
        en:
          name: General
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.1
      ref_id: 1.1.1
      description: Opdrachtnemer voldoet aan de eisen van de ABDO 2019 aangaande de
        gerelateerde Gerubriceerde Opdracht.
      annotation: 'Verwijzing : Procedure ABDO'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor satisfies the ABDO 2019 requirements with regard
            to the Classified Contract in question.
          annotation: 'Reference: Procedure ABDO'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.1
      ref_id: 1.1.2
      description: "Bij be\xEBindiging van het contract vervallen alle bijbehorende\
        \ autorisaties, de LvV en de VGB. Hieraan voorafgaand dient de Opdrachtnemer\
        \ de door Opdrachtgever verstrekte TBB te retourneren tenzij Opdrachtgever,\
        \ eventueel in overleg met BIV / MIVD, schriftelijk toestemming heeft verleend\
        \ de TBB te vernietigen of te behouden."
      annotation: 'Verwijzing : Procedure ABDO'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Upon expiry of the contract, all associated authorisations,
            Lists of Confidential Positions and Certificates of No Objection cease
            to be valid. Prior to this, the Contractor will return the IBP provided
            by the Commissioning Party unless the Commissioning Party, in consultation
            with DISS/ISO if applicable, has issued written consent to destroy or
            retain the IBP.
          annotation: 'Reference: Procedure ABDO'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.2'
      name: Inrichten van de beveiligingsorganisatie
      translations:
        en:
          name: Setting up a security organisation
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.1
      description: Opdrachtnemer beschikt over een integraal beveiligingsbeleid, waarin
        ook de organisatorische-, personele-, (waar nodig) fysieke- en informatiebeveiligingsaspecten
        in relatie tot het TBB zijn beschreven en is tevens bekrachtigd door het hoogste
        bestuursorgaan van de Opdrachtnemer.
      annotation: 'Verwijzing : Bijlage 3'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor has an organisation-wide structurally enforced
            and widely supported security policy which is endorsed by the highest
            executive body.
          annotation: 'Reference: Appendix 3'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.2
      description: Opdrachtnemer beschikt over een beveiligingsplan, opgesteld door
        de BF, goedgekeurd door BIV / MIVD en ondertekend door het hoogste bestuursorgaan
        van de Opdrachtnemer, waarin een actuele beschrijving van de beveiligingssituatie
        (op basis van zelfinspectie) is opgenomen en de beveiligingseisen uit de ABDO
        zijn uitgewerkt in duidelijke, hanteerbare maatregelen en procedures.
      annotation: 'Verwijzing : Bijlage 3'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor has a security plan drawn up by its SO, approved
            by DISS/ISO and signed by the highest executive body, detailing the ABDO
            2017 security requirements in clear, manageable measures and procedures.
          annotation: 'Reference: Appendix 3'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.3
      description: "Opdrachtnemer heeft de in het beveiligingsplan beschreven maatregelen\
        \ en procedures eenduidig ge\xEFmplementeerd in de organisatie."
      annotation: 'Verwijzing : Bijlage 3'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor has unequivocally implemented in its organisation
            the measures and procedures described in the security plan.
          annotation: 'Reference: Appendix 3'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.3.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2.3
      ref_id: 1.2.3.1
      description: Opdrachtnemer heeft maatregelen getroffen om binnen 48 uur op verzoek
        van BIV / MIVD de registratie van bedrijfsmiddelen op te leveren conform bijlage.
      annotation: 'Verwijzing : Bijlage 27'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Constractor has implemented measures to enable the provision
            of a list of registered company resources in accordance with the appendix
            within 48 hours, at the reguest of DISS/ISO.
          annotation: 'Reference: Appendix 27'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.4
      description: "Opdrachtnemer heeft, met voorafgaande schriftelijke instemming\
        \ van BIV / MIVD, een beveiligingsfunctionaris (BF) benoemd en zonodig \xE9\
        \xE9n of meerdere sub-BF\u2019n, afhankelijk van de omvang van de BO, het\
        \ aantal betrokken locaties en specialismen."
      annotation: 'Verwijzing : Bijlage 3'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor has, with prior written permission from DISS/ISO,
            appointed an SO and one or more Deputy SOs, depending on the size of the
            SC, and the number of locations and specialisations involved.
          annotation: 'Reference: Appendix 3'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.5
      description: 'De BF beschikt ten minste over:

        - de Nederlandse nationaliteit en is in dienst van het desbetreffende bedrijf;

        - voldoende autonomie, bevoegdheden, slagkracht en senioriteit;

        - een Verklaring Omtrent Gedrag (VOG) of een Verklaring van Geen Bezwaar (VGB)
        op het hoogst geldende rubriceringsniveau van de BO;

        - rechtstreekse en onafhankelijke toegang tot alle bestuursorganen binnen
        de organisatie.'
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The SO has at least:

            - Dutch nationality, and is employed bij the company in question;

            - suffient autonomy, powers, leverage and seniority;

            - a Certificate of Good Conduct or Certificate of No Objection for the
            highst applicable level of classification of the SC;

            - direct and independent access to all administrative bodies within the
            organization.'
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.6
      description: Alle beveiligingsmaatregelen zijn volgens een schillenstructuur
        opgebouwd met toepassing van het "Need-to-Be" principe.
      annotation: 'Verwijzing : Bijlage 17 / 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: All security measures are established in a layered structure
            to which the "Need-to-Be" principle applies.
          annotation: 'Reference: Appendix 17 / 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.2.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.2
      ref_id: 1.2.7
      description: Bij het samenstellen van alle maatregelen worden de "Need-to-Be"
        en "Need-to-Know" principes toegepast.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The "Need-to-Be" and "Need-to-Know" principles apply to all
            compiled measures.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.3'
      name: De Beveiligingsfunctionaris
      translations:
        en:
          name: The Security Officer
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.1
      description: De BF is belast met de dagelijkse zorg voor de beveiliging, oefent
        toezicht uit en voert periodiek, doch minstens eenmaal per jaar een zelfinspectie
        uit. De resultaten zijn schriftelijk vastgelegd en gerapporteerd aan het bestuur
        van de Opdrachtnemer.
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The SO is tasked with the day-to-day implementation of security,\
            \ supervision and periodic, i.e. at least once a year, self-inspections,\
            \ the results of which are recorded in writing and reported to the Contractor\u2019\
            s executive board."
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.2
      description: De BF toetst periodiek, doch minimaal eenmaal per jaar, het beveiligingsplan
        aan de praktijk. De resultaten hiervan zijn schriftelijk vastgelegd en aan
        het bestuur, in afschrift aan BIV / MIVD, gerapporteerd. Zonodig wordt het
        beveiligingsplan geactualiseerd.
      annotation: 'Verwijzing : Bijlage 3 / 37'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO periodically, i.e. at least once a year, tests the security
            plan in practice, the results of which are recorded in writing and reported
            to the executive board with a copy to DISS/ISO. The security plan is updated
            if necessary.
          annotation: 'Reference: Appendix 3 / 37'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.3
      description: (Beleids)wijzigingen die impact hebben op het security beleid van
        het bedrijf zijn aan BIV / MIVD ter beoordeling verstrekt en zijn verwerkt
        in het beveiligingsplan.
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Policy and other changes which affect the company\u2019s security\
            \ policy are submitted to DISS/ISO for approval and incorporated into\
            \ the security plan."
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.4
      description: Noodzakelijke wijzigingen n.a.v. een verhoogd dreigingsbeeld of
        een Beveiligingsincident, zijn vastgelegd in het beveiligingsplan binnen de
        door BIV / MIVD gestelde termijn.
      annotation: 'Verwijzing : Bijlage 3 / 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Essential changes as the result of a raised threat level or
            a Security Incident are laid down in the security plan by the SO within
            the deadline set by DISS/ISO.
          annotation: 'Reference: Appendix 3 / 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.5
      description: De BF draagt zorg voor volledige medewerking bij controles, audits
        en onderzoeken bij Opdrachtnemer door BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO ensures full cooperation during inspections, audits
            and investigations of the Contractor by DISS/ISO.
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.6
      description: De BF stelt zich door middel van het onderhouden van contacten
        met de gemeente, omliggende bedrijven en de politie op de hoogte van zaken
        die de lokale beveiliging aangaan.
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO keeps up-to-date on matters pertaining to local security
            through contact with the municipal authorities, neighbouring companies
            and the police.
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.3.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.3
      ref_id: 1.3.7
      description: 'De BF voert voorts de taken uit als beschreven in bijlage 4: Taken
        en verantwoordelijkheden BF.'
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The SO also carries out the duties as described in Appendix
            4: Duties and responsibilities of the SO.'
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.4'
      name: Zeggenschap en bedrijfsstructuur
      description: Een melding van een Opdrachtnemer ten aanzien van de eisen van
        1.4 kan aanleiding geven dit formeel schriftelijk aan de Directeur MIVD ter
        besluitvorming voor te leggen. Dit is ter beoordeling van BIV / MIVD.
      translations:
        en:
          name: Control and company structure
          description: A notification by the Contractor with regard to the requirements
            in 1.4 can give reason to formally submit it in writing to the DISS Director
            for review. This is at the discretion of DISS/ISO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.1
      description: Opdrachtnemer heeft ten behoeve van de Autorisatie een Verklaring
        van Eigendom, Zeggenschap en bedrijfsstructuur opgesteld en ter beschikking
        gesteld aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor has drawn up Certificates of Propriety, Control
            and company structure and submitted them to DISS/ISO for the purpose of
            authorisation.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.2
      description: Opdrachtnemer meldt elke voorgenomen wijziging in eigendom/aandeelhouderschap
        van het bedrijf  terstond schriftelijk aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in writing and without delay
            any proposed change in ownership/share ownership of the company.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.3
      description: "Opdrachtnemer meldt voorgenomen wijzigingen in Zeggenschap, eigendom\
        \ en aandeelhouderschap waarbij deze grotendeels of geheel in handen komt\
        \ van \xE9\xE9n natuurlijke of rechtspersoon, of van \xE9\xE9n of meerdere\
        \ buitenlandse natuurlijke of rechtspersonen, terstond schriftelijk aan BIV\
        \ / MIVD."
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in writing and without delay
            any proposed changes to Control, ownership and share ownership as a result
            of which this will fall largely or entirely into the hands of a sole natural
            person or legal entity or one or more foreign natural persons or legal
            entities.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.4
      description: Opdrachtnemer meldt voorgenomen benoemingen van bestuurders die
        niet beschikken over de Nederlandse nationaliteit, terstond schriftelijk aan
        BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in writing and without delay
            any proposed appointments to the executive board of persons who do not
            hold Dutch nationality.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.5
      description: Opdrachtnemer meldt voorgenomen samenwerking met buitenlandse bedrijven
        of overheden, terstond schriftelijk aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in writing and without delay
            any proposed cooperation with foreign companies or governments.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.6
      description: "Opdrachtnemer meldt voorgenomen splitsing, strategische samenwerking\
        \ of fusie, dreigende gedeeltelijke danwel volledige overname, bedrijfsbe\xEB\
        indiging, surseance van betaling of faillissement terstond schriftelijk aan\
        \ BIV / MIVD."
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in writing and without delay
            any proposed break-up, strategic partnership or merger, imminent partial
            or complete take- over, business cessation, suspension of payment or bankruptcy.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.7
      description: Opdrachtnemer meldt voorgenomen wijziging van bedrijfsactiviteiten,
        locaties, sourcing, fusies of gedeeltelijke dan wel volledige overname terstond
        schriftelijk aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in writing and without delay
            any proposed changes to business activities, locations, sourcing, mergers
            or partial or complete takeovers.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.8
      description: "Opdrachtnemer verschaft duidelijkheid bij welk (onderdeel van\
        \ het) bedrijf en op welke locatie de BO wordt belegd en streeft maximaal\
        \ naar onderbrenging van alle BO bij \xE9\xE9n duidelijk herkenbaar en juridisch\
        \ en organisatorisch af te schermen (onderdeel van het) bedrijf."
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor provides clarity regarding the company/part
            of company by which and the location at which the SC will be carried out
            and does its utmost to ensure all SCs are placed with a single, clearly
            recognisable company/part of company that can be legally and organisationally
            shielded off.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.9
      description: Opdrachtnemer is een Nederlands Rechtspersoon in geval van een
        BO waarbij een grote hoeveelheid (te bepalen door BIV / MIVD in overleg met
        Opdrachtgever) Bijzondere Informatie (BI) is overgedragen.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the case of an SC in which large amounts of SI (to be determined
            by DISS/ISO in consultation with the Commissioning Party) are transferred,
            the Contractor is a Dutch legal entity.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.10
      description: Opdrachtnemer garandeert dat een grote hoeveelheid BI (te bepalen
        door BIV / MIVD in overleg met Opdrachtgever) slechts op Nederlands grondgebied
        wordt gegenereerd, bewerkt en opgeslagen.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor guarantees that any large amounts of SI (to
            be determined by DISS/ISO in consultation with the Commissioning Party)
            are only generated, processed and stored on Dutch territory.
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.4.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.4
      ref_id: 1.4.11
      description: Opdrachtnemer plaatst slechts medewerkers met de Nederlandse nationaliteit
        op Vertrouwensfuncties waarbij toegang tot een grote hoeveelheid BI (te bepalen
        door BIV / MIVD  in overleg met Opdrachtgever) is vereist.
      annotation: 'Verwijzing : Bijlage 5'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor only appoints employees with Dutch nationality
            to Confidential Positions which require access to a large amount of SI
            (to be determined by DISS/ISO in consultation with the Commissioning Party).
          annotation: 'Reference: Appendix 5'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.5'
      name: Beveiligingsbewustzijn
      translations:
        en:
          name: Security awareness
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.5
      ref_id: 1.5.1
      description: Opdrachtnemer voert een programma uit ter bevordering van het beveiligingsbewustzijn
        waarbij deelname verplicht en meetbaar is.
      annotation: 'Verwijzing : Bijlage 6'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor implements a security awareness programme, in
            which participation is compulsory and measurable.
          annotation: 'Reference: Appendix 6'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.5
      ref_id: 1.5.2
      description: De BF geeft voorlichting aan medewerkers die werken aan een BO,
        aangaande ABDO 2019 procedures en de bijbehorende verantwoordelijkheden, bij
        aanstelling op een Vertrouwensfunctie, bij de start van een nieuwe BO en vervolgens
        periodiek, doch tenminste eenmaal per jaar.
      annotation: 'Verwijzing : Bijlage 6'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO instructs employees tasked with carrying out an SC on
            ABDO 2019 procedures and their corresponding responsibilities on appointment
            to a Confidential Position, at the start of a new SC and subsequently
            periodically, i.e. at least once a year.
          annotation: 'Reference: Appendix 6'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.5
      ref_id: 1.5.3
      description: De BF geeft waar nodig individueel advies en begeleiding aan medewerkers,
        die werken aan een BO, buitenlandse contacten hebben of op reis gaan naar
        risicolanden.
      annotation: 'Verwijzing : Bijlage 6 / 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If necessary, the SO advises and supervises on an individual
            basis employees who are tasked with an SC, who have foreign contacts or
            who are travelling to high-risk countries.
          annotation: 'Reference: Appendix 6 / 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.6'
      name: RAL / PSI / SAL
      translations:
        en:
          name: Security Classification Checklist / Project Security Instruction /
            Security Aspect Letter
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.6
      ref_id: 1.6.1
      description: Een door de Opdrachtgever ingevulde Rubriceringsaanduidingslijst
        (RAL) is per BO aanwezig.
      annotation: 'Verwijzing : Bijlage 7'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A Security Classification Checklist (SCC) filled in by the
            Commissioning Party is on file for every SC.
          annotation: 'Reference: Appendix 7'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.6
      ref_id: 1.6.2
      description: Een Project Security Instruction (PSI) of Security Aspect Letter
        (SAL)is aanwezig indien een (buitenlandse) BO specifieke aanvullende beveiligingseisen
        stelt.
      annotation: 'Verwijzing : Bijlage 7'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the event that a foreign or Dutch SO makes specific additional
            security demands, a Project Security Instruction (PSI) or Security Aspect
            Letter (SAL) will be available.
          annotation: 'Reference: Appendix 7'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.6.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.6
      ref_id: 1.6.3
      description: "EU en/of NAVO TBB wordt alleen vrijgegeven aan landen, organisaties\
        \ of personeel die tot de EU en/of NAVO programma\u2019s behoren, behoudens\
        \ vooraf vastgelegde uitzonderingen."
      annotation: 'Verwijzing : Bijlage 7'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An EU and/or NATO IBP is only released to countries, organisations,
            or personnel involved in EU and/or NATO programmes, barring exceptions
            laid down in advance.
          annotation: 'Reference: Appendix 7'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.7'
      name: Subcontractor(s)
      translations:
        en:
          name: Subcontractor(s)  ( Logistical chain)
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      ref_id: 1.7.1
      description: "Opdrachtnemer meldt voorgenomen uitbesteding van werkzaamheden\
        \ in het kader van een BO aan binnen- of buitenlandse Subcontractor(s) vooraf\
        \ aan BIV / MIVD. \n\nBIV / MIVD neemt hier een besluit over en verleent waar\
        \ mogelijk toestemming."
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor reports to DISS/ISO in advance any proposed
            outsourcing of work pertaining to an SC to domestic or foreign Subcontractors.
            This is at the discretion of DISS/ISO, which grants permission where possible.
          annotation: 'Reference: Appendix 8'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      ref_id: 1.7.2
      description: Na toestemming van BIV / MIVD tot uitbesteding heeft Opdrachtnemer
        in het contract met Subcontractor(s) die in aanraking komen met een TBB, de
        ABDO 2019 bedongen. Een ingevulde RAL is hierbij verstrekt aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Once permission for outsourcing to the Subcontractor has been
            granted by DISS/ISO, the Contractor incorporates the ABDO 2019 in its
            contract with the Subcontractors coming into contact with an IBP. The
            Contractor submits to DISS/ISO a completed SCC in this regard.
          annotation: 'Reference: Appendix 8'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      ref_id: 1.7.3
      description: Na toestemming van BIV / MIVD (op basis van een door de buitenlandse
        Partner verstrekt Facility Security Clearance) tot uitbesteding heeft Opdrachtnemer
        in het contract met buitenlandse Subcontractor(s) die in aanraking komen met
        een TBB, de  in het betrokken land geldende beveiligingseisen bedongen. Een
        ingevulde RAL is hierbij verstrekt aan BIV / MIVD.
      annotation: 'Verwijzing : Procedure ABDO'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Once permission for outsourcing has been granted by DISS/ISO
            (on the basis of a Facility Security Clearance submitted by the foreign
            Partner), the Contractor incorporates the security requirements applicable
            in the country in question in its contract with foreign Subcontractors
            coming into contact with an IBP. A completed SCC is submitted to DISS/ISO
            in this regard.
          annotation: 'Reference: Procedure ABDO'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      ref_id: 1.7.4
      description: Op (toe)leveranties van systeemonderdelen die op grond van hun
        kritische / vitale functie een zekere mate van bescherming verdienen, heeft
        Opdrachtnemer de ABDO 2019 bedongen.
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor stipulates the ABDO 2019 to its suppliers of
            system components requiring a certain degree of protection due to their
            critical/vital function.
          annotation: 'Reference: Appendix 8'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      ref_id: 1.7.5
      description: 'Wanneer binnen een samenwerkingsverband met andere bedrijven wordt
        gewerkt aan een BO zijn de werkzaamheden aan een TBB zoveel mogelijk gecentraliseerd.


        (Opdrachtnemer draagt de verantwoordelijkheid voor het voldoen aan de eisen
        van ABDO 2019 de bedrijven die hij als Subcontractor(s) onder zijn hoede neemt).'
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When companies work on an SC in partnership with other companies,
            any work on an IBP is centralised as far as is possible. (The Contractor
            bears responsibility for compliance with the requirements of the ABDO
            2019 by any company it takes under its wing as a Subcontractor).
          annotation: 'Reference: Appendix 8'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.7.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.7
      ref_id: 1.7.6
      description: Opdrachtnemer meldt het voornemen (een) buitenlandse Subcontractor(s)
        in te schakelen voor een BO vooraf aan BIV / MIVD voor toestemming. Voor inschakeling
        van een buitenlands bedrijf is toestemming van Opdrachtgever en Autorisatie
        door BIV / MIVD vereist.
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor requests permission from DISS/ISO in advance
            for any plans to outsource work for an SC to a foreign Subcontractor.
            Outsourcing to a foreign company requires the permission of the Commissioning
            Party and authorisation from DISS/ISO.
          annotation: 'Reference: Appendix 8'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.8'
      name: Pers, internet, sociale media, publicatie, opnamen, etc.
      translations:
        en:
          name: Press, internet, social media, publication, photographs, film footage
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.8.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.8
      ref_id: 1.8.1
      description: Opdrachtnemer en zijn medewerkers maken zonder uitdrukkelijke voorafgaande
        toestemming van Opdrachtgever en BIV / MIVD op geen enkele wijze publiekelijk
        bekend welke BO zij voor de Nederlandse overheid, buitenlandse overheid en/of
        NAVO / EU uitvoeren.
      annotation: 'Verwijzing : Bijlage 3 / 6'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor and its personnel must not make publicly known
            in any way whatsoever which SC they are executing for the Dutch government,
            foreign government and/or NATO/EU without the explicit prior consent of
            the Commissioning Party and DISS/ISO.
          annotation: 'Reference: Appendix 3 / 6'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.8.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.8
      ref_id: 1.8.2
      description: Het maken van opnamen van een TBB, anders dan noodzakelijk voor
        de uitvoering van de BO, is ongeacht het middel, niet toegestaan zonder voorafgaande
        schriftelijke goedkeuring van de Opdrachtgever in overleg met BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 6'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Taking photographs of or otherwise recording an IBP, unless
            required for the execution of the SC, is prohibited, regardless of the
            device used, without the prior written consent of the Commissioning Party
            in consultation with DISS/ISO.
          annotation: 'Reference: Appendix 6'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.8.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.8
      ref_id: 1.8.3
      description: Opdrachtnemer en zijn medewerkers maken contactgegevens en afspraken
        met de MIVD op geen enkele wijze publiekelijk bekend.
      annotation: 'Verwijzing : Bijlage 6'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor and its personnel will not make contact details
            and agreements with DISS publicly known in any way.
          annotation: 'Reference: Appendix 6'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1
      ref_id: '1.9'
      name: Beveiligingsincidenten
      translations:
        en:
          name: Security incidents
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.1
      description: Er is een Incident Response Procedure (IRP) opgesteld voor het
        behandelen van Beveiligingsincidenten. Deze is bekend bij allen die werken
        aan of toegang hebben tot een TBB.
      annotation: 'Verwijzing : Bijlage 9'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An Incident Response Procedure (IRP) for dealing with Security
            Incidents has been drawn up. It is familiar to everyone who is working
            on or has access to an IBP.
          annotation: 'Reference: Appendix 9'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.2
      description: "Beveiligingsincidenten dienen binnen de normstelling genoemd in\
        \ tabel \u201CClassificatie\u201D met behulp van de IRP aan BIV / MIVD te\
        \ zijn bekend gesteld."
      annotation: 'Verwijzing : Bijlage 9'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Within the parameters given in the \u201CClassification table,\
            \ Security Incidents must be reported to DISS/ISO in line with the IRP."
          annotation: 'Reference: Appendix 9'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.3
      description: Gegevens t.a.v. toegang tot en inzicht in een TBB zijn vastgelegd
        en worden gedurende de aangegeven periode bewaard om achteraf onderzoek naar
        vermoede Beveiligingsincidenten mogelijk te maken.
      annotation: 'Verwijzing : Bijlage 9'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Data regarding access to and examination of an IBP are laid
            down and are retained during the period indicated, to enable investigation
            of suspected Security Incidents after the fact.
          annotation: 'Reference: Appendix 9'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.4
      description: Informatie aangaande vastgestelde Beveiligingsincidenten wordt
        gedurende de aangegeven periode door de BF bewaard.
      annotation: 'Verwijzing : Bijlage 9'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Information regarding established Security Incidents will be
            retained by the SO for the period indicated.
          annotation: 'Reference: Appendix 9'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.5
      description: Werknemers dienen zwakke plekken in de beveiliging binnen de aangegeven
        termijn aan de BF te rapporteren.
      annotation: 'Verwijzing : Bijlage 9'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Personnel must report any weaknesses in security to the SO
            within the period indicated.
          annotation: 'Reference: Appendix 9'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.6
      description: Er is een evaluatiemechanisme gedefinieerd waarmee men specifieke
        lessen (lessons learned) identificeert en deze verwerkt in het beveiligingsbeleid.
      annotation: 'Verwijzing : Bijlage 4 / 9'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An evaluation mechanism has been defined with which specific
            lessons learned are identified and security procedures are adapted accordingly.
          annotation: 'Reference: Appendix 4 / 9'
    - urn: urn:intuitem:risk:req_node:abdo_2019:1.9.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:1.9
      ref_id: 1.9.7
      description: Er zijn disciplinaire maatregelen mogelijk tegen veroorzakers van
        Beveiligingsincidenten.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Anyone causing a Security Incident may face disciplinary action.
    - urn: urn:intuitem:risk:req_node:abdo_2019:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: Hoofdstuk 2 Personeel
      translations:
        en:
          name: 'Chapter 2: Personnel'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2
      ref_id: '2.1'
      name: Het Veiligheidsonderzoek, VGB en VOG
      translations:
        en:
          name: The Security Screening, Certificate of No Objection and Certificate
            of Good Conduct
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.1
      description: Er is een formele Lijst van Vertrouwensfuncties (LvV) vastgesteld
        door de MIVD.
      annotation: 'Verwijzing : Bijlage 10'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A formal List of Confidential Positions (LoCP) has been compiled
            by DISS.
          annotation: 'Reference: Appendix 10'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.2
      description: Veiligheidsonderzoeken worden aangevraagd op basis van een formeel
        vastgestelde LvV.
      annotation: 'Verwijzing : Bijlage 10'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Security Screenings are requested on the basis of a formally
            compiled LoCP.
          annotation: 'Reference: Appendix 10'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.3
      description: Een geldige VGB voor het vervullen van een Vertrouwensfunctie op
        A-niveau is aanwezig voor alle betrokken medewerkers en deze is niet ouder
        dan 5 jaar.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '1'
      translations:
        en:
          description: A valid Certificate of No Objection for the fulfilment of an
            A-level Confidential Position is on file for all relevant personnel and
            it is no more than five years old
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.4
      description: Een geldige VGB voor het vervullen van een Vertrouwensfunctie op
        B-niveau is aanwezig voor alle betrokken medewerkers en deze is niet ouder
        dan 5 jaar.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '2'
      translations:
        en:
          description: A valid Certificate of No Objection for the fulfilment of a
            B-level Confidential Position is on file for all relevant personnel and
            it is no more than five years old
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.5
      description: Een geldige VGB voor het vervullen van een Vertrouwensfunctie op
        C-niveau is aanwezig voor alle betrokken medewerkers en deze is niet ouder
        dan 5 jaar.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '3'
      translations:
        en:
          description: A valid Certificate of No Objection for the fulfilment of a
            C-level Confidential Position is on file for all relevant personnel and
            it is no more than five years old
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.6
      description: Een geldige VOG voor vervullen van een functie op DV-niveau is
        aanwezig voor alle betrokken medewerkers en deze is niet ouder dan 4 jaar.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '4'
      translations:
        en:
          description: A valid Certificate of Good Conduct for the fulfilment of a
            position at NLD Restricted level is on file for all relevant personnel
            and it is no more than four years old.
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.7
      description: Beheerders, in het bijzonder beheerders van de digitale omgeving,
        zijn in het bezit van een VGB  op A-niveau.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Administrators, in particular administrators of digital environments,
            possess at least a A-level Certificate of No Objection.
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.8
      description: Beheerders, in het bijzonder beheerders van de digitale omgeving,
        zijn in het bezit van een VGB  op minimaal B-niveau.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '3'
      - '4'
      translations:
        en:
          description: Administrators, in particular administrators of digital environments,
            possess at least a B-level Certificate of No Objection.
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.9
      description: De BF van de Opdrachtnemer vraagt tenminste drie maanden voor het
        verstrijken van de periode van vijf jaar na de afgifte van de meest recente
        VGB een hernieuwd Veiligheidsonderzoek aan.
      annotation: 'Verwijzing : Bijlage 11'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Contractor\u2019s SO requests a new Security Screening\
            \ at least three months before the end of the five-year period following\
            \ the issue of the most recent Certificate of No Objection."
          annotation: 'Reference: Appendix 11'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.10
      description: Bij tussentijdse aanleiding, bijvoorbeeld bij wijziging persoonlijke
        omstandigheden, vraagt de BF een hernieuwd Veiligheidsonderzoek aan.
      annotation: 'Verwijzing : Bijlage 14'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the event of interim necessity, for example in the case
            of a change in personal circumstances, the SO requests a new Security
            Screening.
          annotation: 'Reference: Appendix 14'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.11
      description: Plaatsing op een Vertrouwensfunctie van een medewerker die niet
        beschikt over de Nederlandse nationaliteit, is voorafgaande aan de aanvraag
        van het Veiligheidsonderzoek goedgekeurd door BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 13'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The appointment of a member of staff without Dutch nationality
            to a Confidential Position must be approved by DISS/ISO prior to the application
            for a Security Screening.
          annotation: 'Reference: Appendix 13'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.12
      description: Opdrachtnemer plaatst slechts medewerkers met de Nederlandse nationaliteit
        op Vertrouwensfuncties waarbij toegang tot een grote hoeveelheid BI (te bepalen
        door BIV / MIVD in overleg met Opdrachtgever) is vereist.
      annotation: 'Verwijzing : Bijlage 13'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Contractor only appoints employees with Dutch nationality
            to Confidential Positions which require access to a large amount of SI
            (to be determined by DISS/ISO in consultation with the Commissioning Party).
          annotation: 'Reference: Appendix 13'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.1.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.1
      ref_id: 2.1.13
      description: Een overzicht van alle de VGB, de VOG en verklaringen van bekendheid
        met de geheimhoudingsplicht is bij de BF aanwezig.
      annotation: 'Verwijzing : Bijlage 4'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO has a list on file of all Certificates of No Objection,
            Certificates of Good Conduct and declarations of awareness of the duty
            of secrecy.
          annotation: 'Reference: Appendix 4'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2
      ref_id: '2.2'
      name: Geheimhoudingsverklaring
      translations:
        en:
          name: Declaration of awareness of the duty of secrecy
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.2
      ref_id: 2.2.1
      description: De BF heeft de (Vertrouwens) functionaris gewezen op de verplichtingen
        die voortvloeien uit het bekleden van een (Vertrouwens) functie.
      annotation: 'Verwijzing : Bijlage 10 / 12'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO has drawn the attention of employees holding a Confidential
            Position or other position to the obligations entailed in holding a Confidential
            Position or other position.
          annotation: 'Reference: Appendix 10 / 12'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.2
      ref_id: 2.2.2
      description: "Een door een Vertrouwensfunctionaris getekende \u2018Verklaring\
        \ van bekendheid met de geheimhoudingsplicht voor (Vertrouwens) functionarissen\u2019\
        \ is aanwezig en niet ouder dan vijf jaar."
      annotation: 'Verwijzing : Bijlage 12'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A 'Declaration of awareness of the duty of secrecy of emploiyees
            holding a Confidential position or other position' signed by employees
            holding a Confidential Position is on file and it is no more than five
            years old.
          annotation: 'Reference: Appendix 12'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.2
      ref_id: 2.2.3
      description: "Een door een functionaris getekende \u2018Verklaring van bekendheid\
        \ met de geheimhoudingsplicht voor (Vertrouwens)functionarissen\u2019 is aanwezig."
      annotation: 'Verwijzing : Bijlage 12'
      implementation_groups:
      - '4'
      translations:
        en:
          description: "A \u2018Declaration of awareness of the duty of secrecy of\
            \ employees holding a Confidential Position or other position\u2019 signed\
            \ by employees holding a Confidential Position is on file."
          annotation: 'Reference: Appendix 12'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.2
      ref_id: 2.2.4
      description: "Een door een Vertrouwensfunctionaris, die kennis moet nemen van\
        \ crypto, crypto-security of CCI-gemerkte Informatie of materiaal, getekende\
        \ \u2018Verklaring van bekendheid met de geheimhoudingsplicht voor Vertrouwensfunctionarissen\
        \ in het kader van een Cryptofunctie \u2019 is aanwezig en niet ouder dan\
        \ vijf jaar."
      annotation: 'Verwijzing : Bijlage 12'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A 'Declaration of awareness of the duty of secrecy of emploiyees
            holding a Confidential position or other position' signed by employees
            holding a Confidential Position that entails examining crypto, crypto-security
            or information or materiel marked as a Controlled Cryptographic Item (CCI
            Marked) is on file and it is no more than five years old.
          annotation: 'Reference: Appendix 12'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2
      ref_id: '2.3'
      name: Ontheffing uit een Vertrouwensfunctie
      translations:
        en:
          name: Release from a Confidential Position
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.3
      ref_id: 2.3.1
      description: 'De BF meldt ontheffing uit een Vertrouwensfunctie aan BIV  / MIVD
        bij:

        - functiewijziging van een Vertrouwensfunctionaris;

        - ontslag van een Vertrouwensfunctionaris;

        - overtreding van beveiligingsregels door een Vertrouwensfunctionaris.'
      annotation: 'Verwijzing : Bijlage 15'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The SO reports to DISS/ISO the release of an employee from
            a Confidential Position in the case of:

            - change of job of an employee holding a Confidential Position;

            - dismissal of an employee holding a Confidential Position;

            - violation of security regulations by an employee holding a Confidential
            Position.'
          annotation: 'Reference: Appendix 15'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.3
      ref_id: 2.3.2
      description: Een door de medewerker getekende ontheffingsverklaring bij  ontheffing
        uit een Vertrouwensfunctie respectievelijk Cryptofunctie is aanwezig.
      annotation: 'Verwijzing : Bijlage 15'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A declaration of release from office signed by employees released
            from a Confidential Position or a Crypto Position is on file.
          annotation: 'Reference: Appendix 15'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.3
      ref_id: 2.3.3
      description: De BF heeft een toelichting gegeven op de ontheffingsverklaring,
        de (kopie) VGB ingenomen en zeker gesteld dat de medewerker geen TBB in bezit
        heeft.
      annotation: 'Verwijzing : Bijlage 15'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO has given an explanation of the declaration of release
            from office, has revoked the Certificate of No Objection or copy thereof
            and ensured that the employee does not have any IBPs in his or her possession.
          annotation: 'Reference: Appendix 15'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.3
      ref_id: 2.3.4
      description: "Indien de Vertrouwensfunctionaris de beveiligingsregels van de\
        \ Opdrachtnemer bewust of onbewust negeert of overtreedt, dient de BF passende\
        \ maatregelen te nemen en BIV / MIVD hierover te informeren. \nGrove nalatigheid\
        \ of bewuste Compromittatie van Staatsgeheime of Vitale Informatie of Materieel\
        \ kan aanleiding zijn tot strafrechtelijke vervolging."
      annotation: 'Verwijzing : Bijlage 15'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "If the employee holding a Confidential Position intentionally\
            \ or unintentionally ignores or violates the Contractor\u2019s security\
            \ regulations, the SO is required to take appropriate action and inform\
            \ DISS/ISO. Gross negligence or intentionally compromising State Secret\
            \ or Vital Information or Materiel may lead to criminal proceedings."
          annotation: 'Reference: Appendix 15'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.3
      ref_id: 2.3.5
      description: "Na het be\xEBindigen van de overeenkomst zijn alle digitale TBB\
        \ teruggegeven aan de Opdrachtgever. In het Beveiligingsplan is het proces\
        \ hiervan beschreven."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Following termination of the contract, all digital IBPs are
            returned to the Commissioning Party. This process is described in more
            detail in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2
      ref_id: '2.4'
      name: Reizen naar het buitenland
      translations:
        en:
          name: Travelling abroad
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      ref_id: 2.4.1
      description: Een Vertrouwensfunctionaris heeft een voorgenomen reis naar het
        buitenland in het kader van een BO onverwijld gemeld aan de BF.
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Employees holding a Confidential Position will report any proposed
            trip abroad for the purpose of the SC to the SO without delay.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      ref_id: 2.4.2
      description: Een Vertrouwensfunctionaris heeft een voorgenomen reis naar een
        risicoland onverwijld gemeld aan de BF.
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Employees holding a Confidential Position will report any proposed
            trip to a high-risk country to the SO without delay.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      ref_id: 2.4.3
      description: Indien bij een zakelijke reis een Request for Visit (RfV) benodigd
        is, dient de Vertrouwensfunctionaris, via de BF, een RfV ter goedkeuring in
        bij BIV / MIVD. Zonder goedgekeurd RfV kan de reis niet plaatsvinden.
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If a Request for Visit (RfV) is required for a business trip,
            employees holding a Confidential Position submit a digital/physical RfV
            to DISS/ISO via the SO. Without an approved RfV, the trip cannot take
            place.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      ref_id: 2.4.4
      description: De BF brieft en debrieft Vertrouwensfunctionarissen die voorgenomen
        reizen naar risicolanden aan de BF hebben gemeld.
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO briefs and debriefs the employee holding a Confidential
            Position who has reported to the SO a proposed trip to a high-risk country.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      ref_id: 2.4.5
      description: "Een Vertrouwensfunctionaris heeft zakelijk of priv\xE9verblijf\
        \ van een hemzelf/haarzelf of diens Partner in het buitenland langer dan zes\
        \ aaneengesloten maanden onverwijld gemeld aan de BF."
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO will report to DISS/ISO any business or private trip
            of longer than three consecutive months by an employee holding a Confidential
            Position or his or her Partner.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.5.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4.5
      ref_id: 2.4.5.1
      description: "De BF meldt aan BIV / MIVD het zakelijk of priv\xE9verblijf van\
        \ een Vertrouwensfunctionaris of diens Partner in het buitenland langer dan\
        \ zes aaneengesloten maanden."
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO will report to DISS/ISO any foreign business or private
            trip of longer then six consecutive months undertaken by an employee holding
            a Confidential Position or his of her Partner.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:2.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:2.4
      ref_id: 2.4.6
      description: "De BF meldt, d.m.v. het formulier in bijlage 16, aan BIV / MIVD\
        \ zakelijke reizen en/of priv\xE9verblijf van een Vertrouwensfunctionaris\
        \ naar of in een risicoland."
      annotation: 'Verwijzing : Bijlage 16'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO reports any business and/or private trips by an employee
            holding a Confidential Position to or in a high-risk country to DISS/ISO
            using the form in Appendix 16.
          annotation: 'Reference: Appendix 16'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3
      assessable: false
      depth: 1
      ref_id: '3'
      name: Hoofdstuk 3 Fysiek
      translations:
        en:
          name: 'Chapter 3: Physical'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.1'
      name: Organisatorische maatregelen
      translations:
        en:
          name: Organisational measures
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.1
      description: De fysieke beveiligingsmaatregelen zijn volgens een schillenstructuur
        opgebouwd met toepassing van het "Need-to-Be" principe.
      annotation: 'Verwijzing : Bijlage 17 / 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The physical security measures are established in a layered\
            \ structure to which the \u201CNeed-to-Be principle applies."
          annotation: 'Reference: Appendix 17 / 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.2
      description: Bij het samenstellen van de fysieke maatregelen worden de "Need-to-Be"
        en "Need-to-Know" principes toegepast.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "When compiling the physical measures, the \u201CNeed-to-Be\
            \ and \u201CNeed-to- Know principles are applied."
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.3
      description: TBB moet worden beveiligd zodat enerzijds Compromittatie wordt
        voorkomen en anderzijds Compromittatie wordt gedetecteerd/gesignaleerd.
      annotation: 'Verwijzing : Bijlage 19 / 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: IBPs must be secured to prevent them from being compromised.
          annotation: 'Reference: Appendix 19 / 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.4
      description: Fysieke toegang tot het compartiment met een TBB is tot op individueel
        niveau controleerbaar.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Physical access to the compartment containing an IBP must be
            verifiable down to the level of the individual.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.5
      description: Toegang tot het TBB of compartiment is alleen door middel van Two-factor
        Authenticatie verleend.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access to the IBP or compartment is only granted by means of
            Two-factor Authentication
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.6
      description: Alleen een Geautoriseerd persoon kan zelfstandig toegang krijgen
        tot een TBB of tot een compartiment waarin zich een TBB bevindt.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Only an Authorised Person can independently gain access to
            an IBP or to a compartment containing an IBP.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.7
      description: De BF zorgt voor Autorisatie van het personeel betreffende de toegang
        tot een TBB en de daarbij behorende infrastructuur.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The SO arranges the Authorisation of the personnel regarding
            access to an IBP and the corresponding infrastructure.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.8
      description: Periodiek, doch minimaal 1x per jaar, wordt het betrokken personeel
        en bewakingspersoneel getraind in het uitvoeren van beveiligingsmaatregelen.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Periodically, i.e. at least once a year, the involved personnel
            and security personnel are trained in implementing the security measures.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.9
      description: Toegang van personen zonder Autorisatie (zoals bezoekers) is vooraf
        gemeld aan de BF.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access by persons without Authorisation (e.g. visitors) is
            reported to the SO in advance.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.10
      description: Personen met een Autorisatie zijn binnen het compartiment herkenbaar
        door middel van een zichtbaar gedragen pas. Op de pas staan tenminste de naam
        van de persoon en een pasfoto.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Persons with an Authorisation are identifiable within the compartment
            by means of a pass worn visibly. The pass has on it at least the name
            of the person and a passport photo.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.11
      description: Personen zonder Autorisatie (zoals bezoekers) zijn binnen het compartiment
        herkenbaar door middel van een zichtbaar gedragen pas. Op de pas staat voor
        een ieder goed zichtbaar "bezoeker" vermeld.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Persons without Authorisation (such as visitors) are identifiable\
            \ within the compartment by means of a pass worn so it is clearly visible.\
            \ The word \u201Cvisitor is clearly visible on the pass for all to see."
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.12
      description: "Bij toegang van personen zonder Autorisatie is het personeel in\
        \ een compartiment waar gewerkt wordt met of aan een TBB vooraf ge\xEFnformeerd.\
        \ Het personeel neemt hierop maatregelen om Compromittatie te voorkomen."
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: In the event of access by persons without Autorisation, the
            personnel in the compartment in which work is carried out with or on an
            IBP are informed in advance. The personnel then take measures to prevent
            the IBP from being compromised.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.13
      description: In alle compartimenten met een TBB wordt personeel zonder Autorisatie(zoals
        bezoekers) begeleid door personeel met een Autorisatie. Van personen zonder
        Autorisatie is vooraf de identiteit vastgesteld en geregistreerd. De registratie
        hiervan wordt minimaal een jaar bewaard en op aanvraag aan BIV / MIVD verstrekt.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In all compartments containing an IBP, personnel without Authorisation
            (such as visitors) are escorted by personnel with Authorisation. The identity
            of persons without Authorisation is determined and registered in advance.
            The registration hereof is retained for at least a year and is submitted
            to DISS/ISO on request.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.14
      description: Toegang tot een compartiment met een TBB door  bezoekers zonder
        Autorisatie die niet beschikken over de Nederlandse nationaliteit is minimaal
        vijf werkdagen voor het bezoek gemeld via de BF aan BIV / MIVD. Zonder toestemming
        van BIV / MIVD kan het bezoek niet plaatsvinden.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Access to a compartment containing an IBP by visitors without
            Authorisation who do not have Dutch nationality will be reported to DISS/ISO
            via the SO at least five working days in advance. Without the permission
            of DISS/ISO, this visit will not take place.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.15
      description: Er vindt toegangscontrole plaats bij elke beveiligingsschil.
      annotation: 'Verwijzing : Bijlage 17'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access checks are performed at every layer of security
          annotation: 'Reference: Appendix 17'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.16
      description: Aan de buitenzijde van het compartiment met een TBB zijn algemene
        beveiligingsinstructies bevestigd.
      annotation: 'Verwijzing : Bijlage 3 / 4 / 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: General security instructions are attached to the outside of
            the compartment containing an IBP
          annotation: 'Reference: Appendix 3 / 4 / 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.17
      description: De uitgifte van sleutels voor toegang tot compartimenten en opbergmiddelen
        met een TBB is geregistreerd. Bij de uitgifte van sleutels is gecontroleerd
        of men over een Autorisatie beschikt. De registratie hiervan wordt minimaal
        een jaar bewaard. Sleutels zijn voor zo min mogelijk personen toegankelijk.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The issue of keys for access to compartments and means of storage
            containing an IBP is registered. When issuing keys, it will be checked
            whether the person to which the key is being issued has Authorisation.
            The registration hereof will be retained for at least one year. The keys
            are accessible to as few people as possible.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.18
      description: Er zijn uitsluitend gecertificeerde sleutels gebruikt.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Only certified keys are used
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.19
      description: De BF beheert certificaten, cijfercombinaties en reservesleutels
        van opbergmiddelen en compartimenten. Deze dienen opgeborgen/beveiligd te
        worden overeenkomstig het beveiligingsniveau van het desbetreffende TBB.
      annotation: 'Verwijzing : Bijlage 4 / 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The SO managed the certificates, digit combinations and spare
            keys of storage systems and compartments. These must be stored/secured
            in accordance with the security level of the IBP.
          annotation: 'Reference: Appendix 4 / 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.20
      description: 'Cijfercombinaties van sloten worden, zonder dat een eerder gebruikte
        combinatie wordt gekozen, veranderd:

        - indien een nieuw opbergmiddel of slot in gebruik wordt genomen;

        - indien een medewerker die de combinatie kent, wordt overgeplaatst;

        - indien wordt vermoed of vaststaat dat Compromittatie heeft plaatsgevonden;

        - uiterlijk zes maanden na de laatste wijziging van de combinatie.'
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: 'Digit combinations for locks are changed to a combination
            that has not been used previously:

            - if a new means of storage or lock is put into use;

            - if an employee who knows the combination is transferred;

            - if it has been established or is suspected that the IBP has been compromised;

            - No more than six months after the last time the combination was changed.'
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.21
      description: Alvorens een TBB buiten het reguliere, in het beveiligingsplan
        beschreven, proces te plaatsen, is hier toestemming voor verkregen van BIV
        / MIVD. De beveiliging van het TBB wordt hierbij op hetzelfde niveau gehouden.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Before applying to an IBP a procedure that deviates from the
            regular procedure described in the security plan, permission must be gained
            from DISS/ISO. The security of the IBP will be kept at the same level
            in this regard.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.22
      description: "Het \"Clear Desk principe\" en \u201Cclear screen principe\u201D\
        \ is toegepast in alle compartimenten waar zich een TBB bevindt of kan bevinden.\
        \ Een TBB wordt niet onbeveiligd achter gelaten."
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The \u201CClear Desk Principle and \u201CClear Screen Principle\
            \ are applied in all compartments that do or could contain an IBP. An\
            \ IBP is not left unsecured."
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.23
      description: Beheer- en instandhoudingsmaatregelen zijn getroffen om beveiligingsmaatregelen
        blijvend te laten functioneren.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Management and maintenance measures are met to ensure the constant
            operation of security measures.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.24
      description: Het verlies van een authenticatiemiddel, zoals (elektronische)
        sleutel, dient behandeld te worden als een Beveiligingsincident.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The loss of a means of authentication, such as a key/digital
            key, will be treated as a Security Incident.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.25
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.25
      description: Er zijn niet meer compartimenten dan strikt noodzakelijk.
      annotation: 'Verwijzing : Bijlage 18 / 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There are no more compartments than strictly necessary.
          annotation: 'Reference: Appendix 18 / 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.26
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.26
      description: Wanneer binnen een samenwerkingsverband met andere bedrijven wordt
        gewerkt aan een opdracht worden de compartimenten zoveel mogelijk gecentraliseerd.
      annotation: 'Verwijzing : Bijlage 18 / 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When companies work in partnership with other companies on
            an assignment, the compartments will be centralised as far as is possible.
          annotation: 'Reference: Appendix 18 / 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.27
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.27
      description: Het compartiment met een TBB bevindt zich in een zone die met toegangscontrole
        is afgeschermd van de openbare ruimte of van ruimten die niet onder controle
        staan.
      annotation: 'Verwijzing : Bijlage 18 / 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The compartment containing an IBP is in a zone that is screened
            off from public areas or uncontrolled compartments by means of access
            control.
          annotation: 'Reference: Appendix 18 / 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.28
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.28
      description: Beveiligingspersoneel heeft de beschikking over alarmeringsmiddelen.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Security personnel have the means to issue alerts.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.29
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.29
      description: Bij het verlaten van een compartiment met een TBB is een sluitronde
        gemaakt, waarbij de deur van het opbergmiddel, het compartiment en zo mogelijk
        het gebouw is afgesloten. Ramen en deuren zijn afgesloten en het Indringer
        Detectie- en Signaleringssysteem (IDSS) is geactiveerd. Tevens is een controle
        op insluiping en de verzegeling van nooddeuren uitgevoerd.
      annotation: 'Verwijzing : Bijlage 18 / 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When leaving a compartment containing an IBP, a security round
            is completed, during which the door of the means of storage, the compartment
            and, where possible, the building is locked. Windows and doors are locked
            and the Intruder Detection and Alarm System (IDAS) is activated. In addition,
            intrusion checks are carried out and the seals of emergency doors are
            inspected.
          annotation: 'Reference: Appendix 18 / 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.30
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.30
      description: Bij afwezigheid van geautoriseerd personeel blijft positief bewakingsrendement
        gewaarborgd.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: In the absence of Authorised personnel. Effective security
            is safeguarded.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.1.31
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.1
      ref_id: 3.1.31
      description: Een verboden plaats moet voldoen aan de TBB 1 normering op alle
        beveiligingsgebieden (organisatorisch, personeel, fysiek en cybersecurity).
      implementation_groups:
      - '1'
      translations:
        en:
          description: A Prohibited Place must comply with the IBP 1 standard in all
            security areas (organisational, personnel, physical and cyber security).
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.2'
      name: Bouwkundige maatregelen
      translations:
        en:
          name: Constructional measures
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.1
      description: Compartimenten met een TBB zijn afsluitbaar.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Compartments containing an IBP can be locked.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.2
      description: In het beveiligingsplan is een sluit- en sleutelplan opgenomen.
        Ramen, deuren en opbergmiddelen zijn afgesloten bij afwezigheid van geautoriseerd
        personeel. Sleutels worden op hetzelfde niveau beveiligd als het TBB waar
        de sleutel toegang toe geeft. De sleutel is opgeborgen in een sleutelkast
        met een EN 1300 gecertificeerd slot. Indien het opbergmiddel en/of sleutelkast
        onder detectie staat/staan, kan de norm van het slot van de sleutelkast (i.c.
        EN 1300) vervallen.
      annotation: 'Verwijzing : Bijlage 18 / 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A locking plan and master key plan are included in the security
            plan. In the absence of Authorised personnel, windows, doors and means
            of storage are locked. Keys are secured at the same level as the IBP to
            which the key provides access.
          annotation: 'Reference: Appendix 18 / 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.3
      description: Een compartiment waarin een TBB is opgeborgen is afgesloten met
        een slot voorzien van een gecertificeerde cilinder en sleutels. Wanneer een
        slot met een cilinder niet kan worden toegepast, wordt een gelijkwaardig gecertificeerd
        of getest mechanisme gebruikt, waardoor onbevoegd betreden niet mogelijk is
        zonder sporen van braak.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A compartment in which an IBP is stored is locked with a lock
            that has a certified cylinder and keys. If a ock with a cylinder cannot
            be applied, a mechanism that is certified or tested to the same level
            will be used, whereby unauthorised entry is not possble without leaving
            traces of forced entry.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.4
      description: Toegangsdeuren met een Elektronisch Toegangsbeheer Systeem (ETS)
        zijn voorzien van een deurdranger en een (elektronisch en akoestisch) alarm
        tegen te lang openstaan.
      annotation: 'Verwijzing : Bijlage 19 / 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Access doors with an Electronic Access Control System (EACS)
            are fitted with a door spring and a (electronic and acoustic) alarm that
            sounds when it has been open for too long.
          annotation: 'Reference: Appendix 19 / 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.5
      description: Nooddeuren in het compartiment zijn alleen naar buiten toe te openen
        en te verzegelen. Bij openen klinkt een elektronisch of akoestisch signaal.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Emergency doors in the compartment only open outwards and can
            be sealed. An electronic or acoustic signal is given when they are opened
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.6
      description: Het gebouw waarin zich een TBB bevindt, is tegen opklimmen beveiligd.
        Losse opklimmogelijkheden zijn verwijderd zoals (afval) containers en ladders.
        Hemelwaterafvoeren, lage muren e.d. zijn van opklimbeveiliging conform NEN1887
        voorzien.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The building in which an IBP is located is secured against
            being climbed. Movable items that can be used for climbing, such as containers,
            waste bins and ladders, have been removed. Chainware pipes, low walls,
            etc., are fitted with security measures to prevent climbing in accordance
            with NEN1887.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.7
      description: Gevelopeningen groter dan 15 cm moeten zijn beveiligd conform NEN-EN
        5096 en NEN-EN-1627 die geldt voor het compartiment.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "Fa\xE7ade openings larger than 15 cm will be secured in accordance\
            \ with NEN-EN 5096 and NEN-EN 1627 in the case of compartments."
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.8
      description: Kelderramen en dergelijke zijn afgeschermd met traliewerk of strekmetaal
        conform NEN-EN 5096 en NEN-EN-1627 die geldt voor het compartiment.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Cellar windows and the like are screened off by bars or expanded
            metal in accordance with NEN-EN 5096 and NEN-EN 1627 in the case of compartments.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.9
      description: Lichtkoepels, indien niet slagvast, zijn voorzien van traliewerk
        of strekmetaal conform NEN-EN 5096 en NEN-EN-1627 die geldt voor het compartiment.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Dome lights that are not impact-proof are fitted with bars
            or expanded metal in accordance with NEN-EN 5096 or NEN-EN 1627 in the
            case of compartments.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.10
      description: Het compartiment met een TBB of een opbergmiddel met een TBB,  zijn
        op alle vlakken (drie dimensionaal) van inbraakwerende maatregelen voorzien
        conform de normen uit de tabel in bijlage 19.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Compartments and means of storage containing an IBP are fitted
            on all sides (three dimensional) with intruder-resistant measures in accordance
            with the norms in the table in Appendix 19.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.11
      description: Voor een compartiment, met een TBB of een opbergmiddel met een
        TBB grenzend aan een buitengevel, gelden voor de braakwerendheid van deze
        buitengevel de eisen overeenkomstig het beveiligingsniveau van het desbetreffende
        TBB.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "If a compartment or storage system containing an IBP abuts\
            \ an outer fa\xE7ade, the intruder-resistance properties of the outer\
            \ fa\xE7ade must comply with the requirements in accordance with the security\
            \ level applicable to the IBP."
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.12
      description: Ramen en gevel zijn voorzien van braakwerende maatregelen overeenkomstig
        met het beveiligingsniveau van het desbetreffende TBB.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: "The windows and fa\xE7ade are fitted with intruder-resistant\
            \ systems in accordance with the security level applicable to the IBP."
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.13
      description: Opbergmiddelen tot 1000 kilogram zijn chemisch verankerd.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Storage systems up to 1,000 kilograms are chemically anchored.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.13.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2.13
      ref_id: 3.2.13.1
      description: Opbergmiddelen tot 1000 kilogram zijn verankerd.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '3'
      translations:
        en:
          description: Storage systems up to 1,000 kilograms are anchored.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.14
      description: Bevestigingspunten van opbergmiddelen die van buitenaf bereikbaar
        zijn, zijn voorzien van beveiligde schroeven, bouten of moeren.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Attachment points of means of storage that can be accessed
            from outside are fitted with secured screws, nuts and/or bolts.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.15
      description: Opbergmiddelen zijn voorzien van Two-factor Authenticatie.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Means of storage have Two-factor Authentication.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.16
      description: Opbergmiddelen zijn dusdanig afsluitbaar dat braak achteraf kan
        worden vastgesteld.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Means of storage are locked in such a way that intrusion can
            be traced retrospectively.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.17
      description: Opbergmiddelen voldoen aan de normering NEN-1143.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Storage systems must comply with the NEN-1143 standard.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.18
      description: Rondom het gebouw of terrein met een TBB staat een terreinafscheiding
        met toegangscontrole.
      annotation: 'Verwijzing : Bijlage 17 / 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Site fencing with access control surrounds any building or
            grounds containing an IBP.
          annotation: 'Reference: Appendix 17 / 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.19
      description: Er is beveiligingsverlichting toegepast rondom het gebouw met een
        TBB.
      annotation: 'Verwijzing : Bijlage 17 / 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Security lighting is in place around the building containing
            an IBP.
          annotation: 'Reference: Appendix 17 / 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.20
      description: "Bij de aanleg van cultuurtechnische infrastructuur is rekening\
        \ gehouden met inbraakpreventie doormiddel van het cre\xEBren van een overzichtelijk\
        \ geheel, zodat de indringer niet ongezien te werk kan gaan."
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: When laying out land and water infrastructure, intruder-prevention
            measures must be taken into account by ensuring that there is a clear
            view of the whole site so an intruder cannot work unseen.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.21
      description: De ramen en glazen wanden in een compartiment met een TBB zijn
        voorzien van inkijk beperkende maatregelen.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Windows and glass partitions in a compartment containing an
            IBP must be fitted with means to prevent people from looking in.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.2.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.2
      ref_id: 3.2.22
      description: Er zijn voorzieningen getroffen om elektronische apparatuur die
        niet strikt noodzakelijk zijn voor het uitvoeren van werkzaamheden  buiten
        de compartimenten te houden.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Measures have been taken to keep outside the compartment electronic
            equipment that is not strictly necessary for carrying out the work.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.3'
      name: Elektronische maatregelen
      translations:
        en:
          name: Electronic measures
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.1
      description: Het compartiment waarin een opbergmiddel met een TBB is geplaatst,
        is voorzien van een IDSS.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Compartments containing a means of storage containing an IBP
            are fitted with an IDAS.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.2
      description: De aanliggende compartimenten van het compartiment met een TBB
        zijn voorzien van IDSS of een opbergmiddel met een TBB is zelf voorzien van
        IDSS.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The compartments adjacent to the compartment containing an
            IBP are fitted with an IDAS. A means of storage containing an IBP is itself
            fitted with an IDAS.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.3
      description: Het activeren en deactiveren van een IDSS kan alleen door middel
        van een Two-factor Authenticatie.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Activating and deactivating an IDAS is only possible by means
            of Two Factor Authentication.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.4
      description: Het IDSS functioneert 24 uur per dag en 7 dagen per week, tenzij
        Geautoriseerd personeel aanwezig is in het compartiment.
      annotation: 'Verwijzing : Bijlage 18 / 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The IDAS functions 24 hours a day, 7 days a week, unless Authorised
            personnel are present in the compartment.
          annotation: 'Reference: Appendix 18 / 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.5
      description: IDSS-onderdelen zijn zodanig geplaatst dat Compromittatie van een
        TBB of pogingen daartoe worden ontdekt en een alarm genereren.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: IDAS components are installed in such a way that if the IBP
            is compromised, or if attempts are made to do so, this will be detected
            and an alarm will be set off.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.6
      description: De ruimte met een TBB is binnen het IDSS als aparte zone opgenomen.
        Deze zone is actief wanneer er geen Geautoriseerd personeel is in de ruimte.
      annotation: 'Verwijzing : Bijlage 18 / 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The work area containing an IBP is included as a separate zone
            in the IDAS. This zone is active when there are no Authorised personnel
            in the area.
          annotation: 'Reference: Appendix 18 / 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.7
      description: Doormelding van een IDSS voldoet aan de kwaliteit zoals gesteld
        in bijlage 19.
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The automatic alarm of the IDAS meets the quality stipulated
            in Appendix 19.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.8
      description: Een alarm van een IDSS leidt tot een alarmopvolging binnen de in
        bijlage 21 gestelde Interventie tijd.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An alarm from an IDAS leads to an alarm response within the
            Intervention Time stipulated in Appendix 21.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.9
      description: Het IDSS signaleert en registreert uitval van de stroomvoorziening
        van de IDSS.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The IDAS signals and registers failure of the power supply
            of the IDAS.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.10
      description: Het IDSS beschikt over een gegarandeerde stroomvoorziening.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The IDAS has a guaranteed power supply.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.11
      description: Het IDSS is niet onopgemerkt te saboteren c.q. een Compromittatie
        wordt opgemerkt. Pogingen hiertoe zijn als een werkelijk alarm te presenteren.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: It is not possible to sabotage or compromise the IDAS without
            this being noticed. Attempts to do so are presented as an actual alarm.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.12
      description: Detectie vindt onder alle (klimatologische) omstandigheden plaats.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Detection takes place under all conditions, climatological
            and otherwise.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.13
      description: Bewegingsmelders beschikken over anti-masking maatregelen.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Motion detectors are fitted with anti-masking measures.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.14
      description: Alleen elektronische apparatuur die essentieel is voor het uitvoeren
        van de opdracht is toegestaan binnen de ruimten van het TBB. De keuze voor
        apparatuur geschiedt op basis van een risico-analyse. Een lijst van de apparatuur
        en de bijbehorende risico-analyse is vooraf afgestemd met BIV MIVD en opgenomen
        in het beveiligingsplan.
      annotation: 'Verwijzing : Bijlage 18 / 19 / 20 / 36'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Only electronic equipment that is essential for executing the
            contract is permitted in areas containing an IBP. Equipment is selected
            on the basis of a risk analysis. A list of the equipment and accompanying
            risk analysis is drawn up in advance in consultation with DISS/ISO and
            included in the security plan.
          annotation: 'Reference: Appendix 18 / 19 / 20 / 36'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.15
      description: In een ruimte met een TBB zijn geen camera's, smartdevices, microfoons
        of andere apparatuur met een opnamefunctionaliteit aanwezig.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: No cameras, smart devices, microphones or other equipment with
            recording capabilities are permitted in areas containing an IBP.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.16
      description: "Beveiligingssystemen zijn ge\xEFnstalleerd en periodiek onderhouden\
        \ door een gecertificeerd bedrijf conform NEN-EN 50130. Daarbij zijn de beveiligingssystemen\
        \ periodiek, doch minimaal 1x per jaar, gecontroleerd."
      annotation: 'Verwijzing : Bijlage 19'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Security systems are installed and periodically maintained
            by a certified company in accordance with NEN-EN 50130. In addition, the
            security systems are inspected periodically, i.e. at least once a year.
          annotation: 'Reference: Appendix 19'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.17
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.17
      description: Een beveiligingscamera met zicht op de toegang van een compartiment
        is buiten het compartiment aangebracht.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A security camera with a view of the entrance to the compartment
            is fitted.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.18
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.18
      description: De bewaartermijn voor camerabeelden is 3 maanden. Camerabeelden
        met incidentdata dienen 1 jaar bewaard te zijn.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The retention period for camera images is three months. Camera
            images containing data relating to an incident will be retained for one
            year.
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.19
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.19
      description: "Er is een ETS voor gecontroleerde toegang tot het compartiment\
        \ ge\xEFnstalleerd en in werking."
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An EACS for controlling access to the compartment is installed
            and in operation.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.20
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.20
      description: Als gebruik is gemaakt van elektronische sloten, zijn maatregelen
        getroffen om te detecteren dat toegang "onder dwang" is verleend.
      annotation: 'Verwijzing : Bijlage 18'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: If electronic locks are used, measures are taken to detect
            forced entry.
          annotation: 'Reference: Appendix 18'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.21
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.21
      description: Een ETS is uitgerust met een Anti Pass Back (APB) systeem.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: The EACS is equipped with an Anti Pass Back (APB) system.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.22
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.22
      description: Een ETS is voorzien van Logging, waarbij de logs tenminste een
        jaar worden bewaard.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: The EACS is equipped with a Logging function and the logs are
            retained for at least one year.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.23
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.23
      description: Een ETS is zodanig uitgevoerd dat, wanneer het systeem uitschakelt
        of uitvalt, alle toegangen tot het compartiment mechanisch worden afgesloten
        of elektronisch afgesloten blijven.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: The EACS is set up in such a way that if the system turns off
            or fails, all entrances to the compartment are mechanically or electronically
            locked.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.24
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.24
      description: Een ETS is dusdanig uitgevoerd dat een noodknopbediening of mechanische
        paniekontgrendeling binnen het compartiment op zodanige wijze is aangebracht
        dat bij calamiteiten het Object snel in het kader van veiligheid kan worden
        verlaten.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: The EACS is set up in such a way that a panic button or panic
            release mechanism is installed in the compartment so that, in the context
            of safety, the Building can be left quickly in the event of an emergency.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.25
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.25
      description: De noodknopbediening of mechanische paniekontgrendeling is van
        buitenaf niet bereikbaar. Na gebruik van de noodknopbediening of mechanische
        paniekontgrendeling dienen adequate veiligheidsmaatregelen te worden getroffen
        ter bescherming van het TBB.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: The panic button or panic release mechanism is not accessible
            from outside. Following the use of the panic button or panic release mechanism,
            adequate security measures will be taken to protect the IBP.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.26
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.26
      description: Wanneer een beveiligingssysteem (ETS of IDSS) gekoppeld is aan
        een gebouwbeheersysteem, gelden de beveiligingsmaatregelen van het beveiligingssysteem
        ook voor het gebouwbeheersysteem.
      annotation: 'Verwijzing : Bijlage 20'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: If a security system (EACS or IDAS) is linked to a building
            management system, the security measures of the security system also apply
            to the building management system.
          annotation: 'Reference: Appendix 20'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.3.27
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.3
      ref_id: 3.3.27
      description: Voorafgaand aan de ingebruikname van een compartiment en bij toevoeging
        of wijziging van middelen in het compartiment dient er, in overleg met BIV
        / MIVD,  een elektronisch veiligheidsonderzoek (EVO), geluidsdempingsmeting
        en zoneringsmeting uitgevoerd te zijn. Eventuele maatregelen zijn afgestemd
        met BIV / MIVD.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: Before a compartment is used and when additional resources
            are placed in a compartment or the resources in a compartment are changed,
            a digital security investigation, sound reduction measurements and zoning
            measurements must be conducted in consultation with DISS/ISO. Any measures
            taken must be implemented in consultation with DISS/ISO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.4'
      name: Reactieve maatregelen
      translations:
        en:
          name: Response measures
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.1
      description: Meldingen uit het IDSS en het ETS moeten leiden tot tijdige Interventie.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Signals from the IDAS and the EACS will lead to timely Intervention.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.2
      description: Interventie vindt plaats door daartoe aangewezen en opgeleid personeel
        binnen de gestelde Interventietijd.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Intervention is carried out within the stipulated Intervention
            Time by personnel who have been designated and trained to do so.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.3
      description: Als alleen een alarm afgaat in een compartiment en niet bij de
        daaromheen liggende beveiligingsschillen is te handelen alsof de omliggende
        alarmen ook zijn afgegaan.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: If an alarm only goes off in a compartment and not in the security
            layers around it, action must be taken as though the surrounding alarms
            have also gone off.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.4
      description: Beveiligingspersoneel informeert bij een geconstateerde Compromittatie
        van een TBB terstond de BF.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If it is established that an IBP has been compromised, security
            personnel inform the SO immediately.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.5
      description: Reactie op (technische) storingen moet leiden tot het herstellen
        van het gewenste beveiligingsrendement.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The response to the failure (technical or otherwise) will lead
            to the restoration of the required return on security.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.6
      description: Na een alarm vindt controle van het compartiment met een TBB plaats
        door de BF of diens gemandateerde.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Following an alarm, inspection of the compartment containing
            an IBP will be carried out by the SO or the person to whom he/she has
            given a mandate to do so.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.7
      description: Alarmverificatie vindt aan de buitenzijde van het compartiment
        met een TBB plaats. Hierbij zijn alle toegangen, gevelopeningen, daken e.d.
        gecontroleerd.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Alarm verification takes place on the outside of the compartment\
            \ containing an IBP. As part of this, all entrances, fa\xE7ade openings,\
            \ roofs, and the like, are inspected."
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.8
      description: Personeel dat alarmverificatie uitvoert, heeft ten tijde van de
        alarmverificatie niet de beschikking over sleutels of codes die toegang geven
        tot het TBB.
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At the time of the alarm verification, the personnel who carry
            out the alarm verification do not have at their disposal the keys or codes
            that grant access to the IBP.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.4.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.4
      ref_id: 3.4.9
      description: "Een Particuliere Alarm Centrale beschikt over een justiti\xEB\
        le erkenning en voldoet aan de NEN-EN 50518 norm."
      annotation: 'Verwijzing : Bijlage 21'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Private-Sector Emergency Centres have judicial recognition
            and comply with the provisions of the NEN-EN 50518 standard.
          annotation: 'Reference: Appendix 21'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.5'
      name: Transport en verzenden
      translations:
        en:
          name: Transport and post
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.5.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.5
      ref_id: 3.5.1
      description: Een TBB wordt uitsluitend buiten het compartiment gebracht als
        dit voor de voortgang van de werkzaamheden absoluut noodzakelijk is.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An IBP is only taken out of the compartment if this is absolutely
            necessary for the continuation of the work.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.5.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.5
      ref_id: 3.5.2
      description: De BF stelt conform bijlage 22 voorschriften op voor het transporteren
        en verzenden van een TBB en houdt hier toezicht op.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO draws up instructions for transporting and posting an
            IBP and supervises this.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.5.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.5
      ref_id: 3.5.3
      description: Een TBB mag nooit mee naar huis worden genomen.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An IBP must never be taken home.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.5.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.5
      ref_id: 3.5.4
      description: Transport van TBB is vooraf gemeld aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Transport of an IBP is reported to DISS/ISO in advance.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.6'
      name: Transport en verzenden binnenland
      translations:
        en:
          name: Transport and post within the Netherlands
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.1
      description: Transport van een TBB geschiedt uitsluitend door tussenkomst van
        BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      translations:
        en:
          description: Transport of an IBP only occurs through the agency of DISS/ISO.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.2
      description: Een TBB is uitsluitend mee te nemen in een door BIV / MIVD goedgekeurd
        afsluitbaar transportmiddel.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: An IBP may only be transported in a means of transport that
            can be locked and has been approved by DISS/ISO.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.3
      description: "Transport van een TBB vindt plaats:\n- handcarried, al dan niet\
        \ met eigen vervoer, door 1 Geautoriseerde medewerker, of \n- met inschakeling\
        \ van een door BIV / MIVD goedgekeurd transport- / koeriersbedrijf."
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      translations:
        en:
          description: 'Transport of an IBP is carried out: by hand, whether or not
            by private transport, by one Authorised employee, or by engagement of
            a transport/courier company approved by DISS/ISO.'
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.4
      description: Een TBB is uitsluitend mee te nemen in een afsluitbaar transportmiddel.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '4'
      translations:
        en:
          description: An IBP is only be transported in a lockable means of transport.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.5
      description: "Transport van een TBB vindt plaats:\n- handcarried, al dan niet\
        \ met eigen vervoer, door een Geautoriseerde medewerker, of \n- met inschakeling\
        \ van een door BIV / MIVD goedgekeurd transport-/ koeriersbedrijf, of\n- met\
        \ inschakeling van een transport-/koeriersbedrijf"
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'Transport of an IBP is carried out:

            - by hand, whether or not by private transport, by one Authorised employee,
            or

            - by engagement of a transport/courier company approved by DISS/ISO, or

            - by engagement of a transport/courier company.'
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.6
      description: Het transport-/koeriersbedrijf waaraan het TBB zonder toezicht
        of begeleiding door een vertrouwensfunctionaris wordt toevertrouwd, is als
        Subcontractor aangemeld bij BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The transport/courier company to which the IBP is entrusted
            without the supervision or escort of an employee holding a confidential
            position, has been registered with DISS/ISO as a Subcontractor.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.7
      description: Transport van een TBB gaat via de kortst mogelijke weg zonder onderbrekingen.
        Het TBB blijft onder toezicht, voertuigen worden niet onbeheerd gestald.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      translations:
        en:
          description: An IBP is transported via the shortest possible route without
            interruptions. The IBP is kept under supervision and vehicles are not
            left unattended.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.8
      description: Verzenden van BI per post is niet toegestaan.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      translations:
        en:
          description: Sending SI by post is not permitted.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.9
      description: Verzending van BI per post is uitsluitend toegestaan binnen Nederland
        wanneer dit aangetekend met een track en trace nummer wordt verstuurd in dubbele
        verpakking volgens bijlage 22 met een onmiddellijke ontvangstbevestiging
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      translations:
        en:
          description: Sending SI by post is only permitted within the Netherlands
            by registered post with a track and trace number in double packaging according
            to the provisions of Appendix 22, with an acknowledgement of receipt being
            issued without delay.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.6.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.6
      ref_id: 3.6.10
      description: Verzending van BI per post is uitsluitend binnen Nederland toegestaan
        wanneer dit in dubbele verpakking volgens bijlage 22 wordt verstuurd.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '4'
      translations:
        en:
          description: Sending SI by post is only permitted in the Netherlands in
            double packaging in accordance with the provisions of Appendix 22.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.7'
      name: Transport en verzenden buitenland
      translations:
        en:
          name: Transport and post abroad
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      ref_id: 3.7.1
      description: Transport van een TBB geschiedt uitsluitend door tussenkomst van
        BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      translations:
        en:
          description: Transport of an IBP only occurs through the agency of DISS/ISO.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      ref_id: 3.7.2
      description: Een TBB mag zonder toestemming van BIV / MIVD niet worden meegenomen
        naar het buitenland.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Without the permission of DISS/ISO, an IBP will not be taken
            abroad.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      ref_id: 3.7.3
      description: Internationaal transport van een TBB vindt plaats na goedkeuring
        van het transportplan door BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: International transport of an IBP takes place following approval
            of the transport plan by DISS/ISO.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      ref_id: 3.7.4
      description: "Voor transport van BI naar het buitenland kan worden teruggevallen\
        \ op BIV / MIVD (\u201CGovernment-to-Government\u201D-procedure)."
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: For transport of SI to a foreign country, it is possible to
            fall back on DISS/ISO (Government-to-Governmentprocedure).
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      ref_id: 3.7.5
      description: Verzenden van BI per post is niet toegestaan.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Sending SI by post is not permitted.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.7.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.7
      ref_id: 3.7.6
      description: Verzenden van BI  per post is toegestaan, met gebruikmaking van
        aangetekende post met track en trace nummer, in dubbele verpakking en met
        onmiddellijke ontvangstbevestiging.
      annotation: 'Verwijzing : Bijlage 22'
      implementation_groups:
      - '3'
      - '4'
      translations:
        en:
          description: Sending SI by post is permitted by registered post with a track
            and trace number in double packaging, with an acknowledgement of receipt
            being issued without delay.
          annotation: 'Reference: Appendix 22'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3
      ref_id: '3.8'
      name: Fysieke opslag, verwerking en ontwikkeling
      translations:
        en:
          name: Physical storage, processing and development
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.1
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.1
      description: De BF of een daartoe aangewezen en geautoriseerd persoon dient
        een actueel overzicht te hebben van alle BO binnen het bedrijf.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO or person designated and authorised to do so has an
            up-to-date list on file of all SCs at the company.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.2
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.2
      description: Geregistreerd is wie BI onder zijn berusting heeft.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A register is kept of who has SI in his/her possession.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.3
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.3
      description: Geregistreerd is wie werkzaamheden aan BI heeft uitgevoerd of BI
        heeft ingezien.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: A register is kept of who has performed work on or seen SI.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.4
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.4
      description: Informatie geproduceerd door het bedrijf, waarbij de steller vermoedt
        dat bij Compromittatie voor de Staat schade kan ontstaan, is Gerubriceerd.
        De Rubricering is door de (sub-)BF vastgesteld en geregistreerd.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: If Information is produced by the company and the author suspects
            that the State could be damaged if it were compromised, it is classified.
            The Classification is determined and registered by the SO/Deputy SO.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.5
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.5
      description: BI is geregistreerd en van een kenmerk (labeling) voorzien.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: SI is registered and labelled.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.6
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.6
      description: BI is geregistreerd en van een uniek exemplaarnummer voorzien.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: SI is registered and given a unique copy number.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.7
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.7
      description: Rubriceringen en Merkingen zijn conform bijlage 23 aangebracht.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Classifications and Markings are applied in accordance with
            Appendix 23.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.8
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.8
      description: De reproductie van Informatie geschiedt alleen met toestemming
        van degene die de Rubricering heeft vastgesteld.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Information is only reproduced with permission from the person
            who determined the Classification.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.9
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.9
      description: Gemaakte reproducties zijn geregistreerd.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Reproductions created are registered.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.10
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.10
      description: Het maken van reproducties is voorbehouden aan daartoe aangewezen
        geautoriseerd personeel dat ook zorgdraagt voor de registratie hiervan.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Creating reproductions is only permitted by the designated
            authorised personnel, who are also responsible for the registration.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.11
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.11
      description: Reproducties kennen dezelfde Rubricering als het origineel, ook
        als slechts delen van het origineel is gebruikt.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Reproductions have the same Classification as the original,
            even if only parts of the original are used.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.12
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.12
      description: Er zijn niet meer reproducties gemaakt dan strikt noodzakelijk
        is.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: No more reproductions are made than is strictly necessary.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.13
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.13
      description: Reproducties maken, is alleen toegestaan met door BIV / MIVD toegestane
        middelen.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Creating reproductions is only permitted using means permitted
            by DISS/ISO.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.14
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.14
      description: Reproductiemiddelen worden beschouwd als een Informatiesysteem
        en worden minimaal op hetzelfde niveau beveiligd als de verwerkte informatie.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Means of reproduction are considered Information Systems and
            are secured at at least the same level as the information processed.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.15
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.15
      description: In geval van vernietiging wordt door de BF of een aangewezen medewerker
        met de juiste Autorisatie een proces verbaal van vernietiging opgemaakt.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: In the case of destruction, an official report of the destruction
            is drawn up by the SO or the designated employee with the correct authorisation.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:3.8.16
      assessable: true
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:3.8
      ref_id: 3.8.16
      description: Vernietigen van Informatie geschiedt conform bijlage 23.
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Information is destroyed in accordance with Appendix 23.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: Hoofdstuk 4 Cyber
      translations:
        en:
          name: 'Chapter 4: Cyber'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.1'
      name: Informatiebeveiligingsbeleid
      translations:
        en:
          name: Information security policy
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.1:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.1
      name: Beleidsregels voor Informatiebeveiliging
      translations:
        en:
          name: Policy rules for Information Security
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.1.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.1:1
      ref_id: 4.1.1
      description: Er is beleid ten aanzien van cybersecurity.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There is policy relating to cyber security.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.2'
      name: Organiseren van Informatiebeveiliging
      translations:
        en:
          name: Organising Information Security
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2
      name: Interne organisatie
      translations:
        en:
          name: Internal organisation
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.1
      description: Er is een Cyber Beveiligingsfunctionaris (Cyber-BF) aangesteld.
        De Cyber-BF heeft, net als de BF, rechtstreeks toegang tot de Directie van
        de organisatie. De Cyber-BF kan deeltaken door derden binnen de organisatie
        laten uitvoeren.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A Cyber Security Officer (Cyber SO) has been appointed. Like
            the SO, the Cyber SO has direct access to the board of directors of the
            organisation. The Cyber SO can have third parties within the organisation
            carry out subtasks.
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.2
      description: De Cyber-BF is namens de directie bevoegd tot het (laten) nemen
        van gepaste beveiligingsmaatregelen op het gebied van Cyber-security.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: On behalf of the board of directors, the Cyber SO has been
            authorised to take appropriate security measures in the Cyber Security
            domain, or arrange for them to be taken.
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.3
      description: De Cyber-BF houdt, namens de directie, toezicht op een veilige
        inrichting van de digitale infrastructuur binnen de organisatie.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Cyber SO oversees, on behalf of the board of directors,
            the secure set-up of the digital infrastructure within the organisation.
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.4
      description: De Cyber-BF verstrekt, jaarlijks en op verzoek van BIV / MIVD,
        de aan de organisatie toebehorende externe IP adressen, haar Internet Service
        Provider(s), domeinnamen en de door de organisatie, ten behoeve van de gerubriceerde
        opdracht, gebruikte hard-/software aan BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 41'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Cyber SO provides DISS/ISO with the external IP addresses
            and domain names belonging to the organisation.
          annotation: 'Reference: Appendix 41'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.5
      description: De Cyber-BF houdt door middel van een registratie toezicht op de
        locatie, uitgifte, inname en herkomst van alle door de organisatie in ontvangst
        of beheer genomen digitale TBB.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The Cyber SO oversees, by means of a log, the location, issue,
            intake and origin of all digital IBPs received by or taken into the management
            of the organization.
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.6
      description: De Cyber-BF heeft te allen tijde inzicht in de gebruikte digitale
        TBB.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '4'
      translations:
        en:
          description: The Cyber SO has, at all times, an overview of the digital
            IBPs in use.
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.7
      description: De Cyber-BF voert voorts de taken uit als beschreven in de bijlage.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Cyber SO also carries out the tasks as described in the
            appendix.
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:1
      ref_id: 4.2.8
      description: De Cyber-BF draagt zorg voor volledige medewerking bij controles
        van, audits op en onderzoeken aan de IT infrastructuur van de Opdrachtnemer
        door BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 24'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The Cyber SO ensures full cooperation during inspections,\
            \ audits and investigations of the Contractor\u2019s IT infrastructure\
            \ by DISS/ISO."
          annotation: 'Reference: Appendix 24'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2
      name: Scheiding van taken
      translations:
        en:
          name: Division of tasks
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:2
      ref_id: 4.2.9
      description: De rechten van een gebruiker omvatten niet een gehele cyclus van
        handelingen in een kritisch Informatiesysteem.
      annotation: 'Verwijzing : Bijlage 31'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The rights of a user do not include a full cycle of actions
            in a critical Information System.
          annotation: 'Reference: Appendix 31'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:2
      ref_id: 4.2.10
      description: Er is een scheiding tussen IT-beheertaken en gebruikerstaken.
      annotation: 'Verwijzing : Bijlage 31'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There is a division between IT-administrator tasks and user
            tasks.
          annotation: 'Reference: Appendix 31'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.11
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:2
      ref_id: 4.2.11
      description: "Voordat de verwerking van configuratiegegevens die de Integriteit\
        \ van informatiesystemen kunnen aantasten zijn deze gegevens door een tweede\
        \ persoon ge\xEFnspecteerd en geaccepteerd. Van de acceptatie is een log bijgehouden."
      annotation: 'Verwijzing : Bijlage 31'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Before configuration data that could compromise the Integrity
            of information systems is processed, the data is inspected and accepted
            by a second person. A log is kept of acceptance.
          annotation: 'Reference: Appendix 31'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.12
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:2
      ref_id: 4.2.12
      description: Implementeer Role-Based Access Control (RBAC) voor IT-beheer.
      annotation: 'Verwijzing : Bijlage 31'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Responsibilities for IT management and Changes to data and
            corresponding information system functions must be clearly allocated to
            one specific (IT administrator) role.
          annotation: 'Reference: Appendix 31'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2
      name: Mobiele apparatuur en telewerken
      translations:
        en:
          name: Mobile devices and teleworking
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.13
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.13
      description: "Een TBB dat is opgeslagen op mobiele apparatuur is alleen toegestaan\
        \ met toepassing van door BIV / MIVD goedgekeurde procedures en middelen:\n\
        - een goedgekeurde Vercijfering; \n- heeft alleen de hoogst noodzakelijke\
        \ hoeveelheid informatie in opslag; \n- mag niet gebruikt worden in publieke\
        \ ruimten."
      annotation: 'Verwijzing : Bijlage 22 / 25'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: 'An IBP that is saved on a mobile device is only permitted
            with the application of the procedures and means approved by DISS/ISO:
            approved Encryption; no more information saved than is necessary; not
            used in public spaces.'
          annotation: 'Reference: Appendix 22 / 25'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.14
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.14
      description: "Een TBB dat is opgeslagen op mobiele apparatuur is alleen toegestaan\
        \ met toepassing van door BIV / MIVD goedgekeurde procedures en middelen:\n\
        - een goedgekeurde Vercijfering; \n- heeft alleen de hoogst noodzakelijke\
        \ hoeveelheid informatie in opslag; \n- mag niet gebruikt worden in publieke\
        \ ruimten;\n- een door BIV / MIVD goedgekeurde koppeling."
      annotation: 'Verwijzing : Bijlage 22 / 25'
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'An IBP that is saved on a mobile device is only permitted
            with the application of the procedures and means approved by DISS/ISO:

            - approved Encryption;

            - no more information saved than is necessary;

            - not used in public spaces;

            - a connection approved by DISS/ISO.'
          annotation: 'Reference: Appendix 22 / 25'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.15
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.15
      description: Voor het gebruik van mobiele apparatuur en telewerken zijn gebruikersinstructies
        opgesteld.
      implementation_groups:
      - '4'
      translations:
        en:
          description: User instructions have been drawn up for the use of mobile
            devices and teleworking.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.16
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.16
      description: Een mobiel apparaat bevat geen kenmerken die direct herleidbaar
        zijn tot het Ministerie van Defensie.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Mobile devices do not have any characteristics that make them
            directly traceable to the Ministry of Defence.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.17
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.17
      description: Er zijn voorzieningen om de actualiteit van anti-Malware programmatuur
        op mobiele apparaten te garanderen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There are provisions to guarantee the currency of anti-Malware
            software on mobile devices.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.18
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.18
      description: Na melding van verlies of diefstal is direct de communicatiemogelijkheid
        met de centrale applicaties afgesloten.
      implementation_groups:
      - '4'
      translations:
        en:
          description: After a report of loss or theft, the functionality to communicate
            with the central applications is shut down without delay.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.19
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.19
      description: Mobiele apparatuur in het kader van BYOD of CYOD zijn alleen na
        goedkeuring van BIV / MIVD toegestaan.
      annotation: 'Verwijzing : Bijlage 25 / 28'
      implementation_groups:
      - '4'
      translations:
        en:
          description: Mobile devices in the context of BYOD or CYOD are only permitted
            following the approval of DISS/ISO.
          annotation: 'Reference: Appendix 25 / 28'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.20
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:3
      ref_id: 4.2.20
      description: Opslag, verwerking en transport van data op BYOD / CYOD-apparatuur
        vindt plaats op basis van gelijke condities gesteld aan DV netwerken. Bij
        lokale opslag van data is door BIV / MIVD goedgekeurde Vercijfering toegepast.
      annotation: 'Verwijzing : Bijlage 25 / 28'
      implementation_groups:
      - '4'
      translations:
        en:
          description: Data is stored, processed and transported on BYOD/CYOD on the
            basis of the same conditions imposed on NLD Restricted networks. For local
            storage of data, encryption approved by DISS/ISO is applied.
          annotation: 'Reference: Appendix 25 / 28'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2
      name: Telewerken
      translations:
        en:
          name: Teleworking
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.21
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      ref_id: 4.2.21
      description: Telewerken is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Teleworking is not permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.22
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      ref_id: 4.2.22
      description: "Telewerkvoorzieningen op basis van een terminal server verbinding\
        \ zijn zo ingericht dat op de werkplek geen bedrijfsinformatie is opgeslagen\
        \ (\u201Czero footprint\u201D) en mogelijke Malware vanaf de werkplek niet\
        \ in het vertrouwde deel terecht kan komen."
      implementation_groups:
      - '4'
      translations:
        en:
          description: "Teleworking provisions on the basis of a terminal server connection\
            \ is set up in such a way that no company information is saved on the\
            \ workstation (\u201Czero footprint) and any Malware from the workstation\
            \ cannot enter the trusted section."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.23
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      ref_id: 4.2.23
      description: Indien toegang tot een TBB via een remote inlogvoorziening mogelijk
        is, is een procedure hiervoor in het Beveiligingsplan opgenomen.
      implementation_groups:
      - '4'
      translations:
        en:
          description: If access to an IBP is possible via a remote log-in facility,
            a procedure for this is included in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.24
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      ref_id: 4.2.24
      description: Voor remote toegang is gebruik gemaakt van de door BIV / MIVD goedgekeurde
        oplossing(en) en middelen.
      implementation_groups:
      - '4'
      translations:
        en:
          description: For remote access, use is made of solutions and means approved
            by DISS/ISO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.25
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      ref_id: 4.2.25
      description: Bij gebruik van telewerken moet al het verkeer van en naar de mobiele
        apparatuur gerouteerd worden over de goedgekeurde vercijferde verbinding met
        het DV netwerk.
      implementation_groups:
      - '4'
      translations:
        en:
          description: During teleworking, all communications to and from mobile devices
            must be routed via approval encrypted connections with the NLD Restricted
            information network.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.2.26
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.2:4
      ref_id: 4.2.26
      description: Bij mobiele apparatuur die zich buiten het compartiment bevindt,
        zijn inkijkbeperkende maatregelen toegepast (bijv. screenfilters).
      implementation_groups:
      - '4'
      translations:
        en:
          description: Measures to ensure screen privacy (e.g. privacy filters) are
            implemented for mobile eguipment located outside a compartment.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.3'
      name: Veilig personeel
      translations:
        en:
          name: Secure personnel
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.3:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.3
      name: Bewustzijn, opleiding en training ten aanzien van Informatiebeveiliging
      translations:
        en:
          name: Awareness, qualification courses and training regarding Information
            Security
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.3.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.3:1
      ref_id: 4.3.1
      description: Het personeel dat betrokken is bij de behandeling van een TBB doorloopt
        jaarlijks een Cyber security-awareness training met goed gevolg. Zie bijlage
        26 voor een overzicht met aandachtspunten.
      annotation: 'Verwijzing : Bijlage 26'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Personnel involved in handling IBPs complete Cyber security-
            awareness training annually. See Appendix 26 for a list of focal areas.
          annotation: 'Reference: Appendix 26'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.3.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.3:1
      ref_id: 4.3.2
      description: "De BF, Cyber-BF, IT-beheer en het overige personeel dat betrokken\
        \ is bij de behandeling van een digitale\_TBB\_bezitten de benodigde ervaring,\
        \ competenties en kennis door relevante opleiding en training."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The SO, Cyber SO, IT administrator and other employees who
            are involved in handling digital IBPs have the necessary experience, competences
            and knowledge from relevant qualification courses and training.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.3:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.3
      name: "Be\xEBindiging of Wijziging van verantwoordelijkheden van het dienstverband"
      translations:
        en:
          name: Employment termination and changes to responsibilities
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.3.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.3:2
      ref_id: 4.3.3
      description: "Er is een procedure vastgesteld voor verandering/be\xEBindiging\
        \ van functie/dienstverband, contract/project of overeenkomst waarin minimaal\
        \ aandacht besteed is aan het intrekken van toegangsrechten, innemen van ICT-bedrijfsmiddelen\
        \ en welke verplichtingen ook na be\xEBindiging van het dienstverband blijven\
        \ gelden."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'A procedure has been laid down for changing and terminating
            a position, employment, a contract, a project or an agreement in which
            at least the following is detailed: the withdrawal of access rights, the
            collection of Company ICT Resources, and which obligations will continue
            to apply after termination of the contract.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.4'
      name: Beheer van Bedrijfsmiddelen
      translations:
        en:
          name: Management of company resources
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Inventariseren van ICT-bedrijfsmiddelen
      translations:
        en:
          name: Inventory of Company ICT Resources
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:1
      ref_id: 4.4.1
      description: Er is een actuele registratie van ICT-bedrijfsmiddelen. Zie bijlage
        voor een overzicht van te registreren gegevens.
      annotation: 'Verwijzing : Bijlage 27'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There is an up-to-date log of Company ICT Resources. See the
            appendix for an overview of the information to be logged.
          annotation: 'Reference: Appendix 27'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:1
      ref_id: 4.4.2
      description: Er is een actuele beschrijving van de ICT-infrastructuur beschikbaar.
      annotation: 'Verwijzing : Bijlage 27'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An up-to-date description of the ICT infrastructure is available.
          annotation: 'Reference: Appendix 27'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:1
      ref_id: 4.4.3
      description: Alle apparatuur en systemen zijn in een netwerk- of configuratietekening
        bijgehouden. Hierin is duidelijk aangegeven de locatie en de functie van de
        componenten.
      annotation: 'Verwijzing : Bijlage 27'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: All equipment and systems are recorded in a network or configuration
            diagram, in which the location and function of the components are clearly
            indicated.
          annotation: 'Reference: Appendix 27'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Eigendom van ICT-bedrijfsmiddelen
      translations:
        en:
          name: Inventory of Company ICT Resources
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:2
      ref_id: 4.4.4
      description: Voor elk bedrijfsproces, applicatie, gegevensverzameling en overige
        ICT-bedrijfsmiddelen is een verantwoordelijke lijnmanager benoemd.
      annotation: 'Verwijzing : Bijlage 27'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A responsible line manager is appointed for each company process,
            application, collection of data and other Company ICT Resources.
          annotation: 'Reference: Appendix 27'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Aanvaardbaar gebruik van ICT-bedrijfsmiddelen
      translations:
        en:
          name: Acceptable use of Company ICT Resources
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:3
      ref_id: 4.4.5
      description: Er zijn regels vastgesteld en gedocumenteerd voor gebruik van ICT-bedrijfsmiddelen
        en deze zijn ter kennis gesteld aan de gebruikers. De regels zijn als bijlage
        opgenomen in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Rules have been determined and documented for the use of Company
            ICT Resources and the users have taken cognisance of them. The rules are
            laid down in an appendix to the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:3
      ref_id: 4.4.6
      description: Alleen applicaties die door IT-Beheer op een systeem geplaatst
        zijn, zijn gebruikt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Only applications that have been installed on a system by IT
            Management are used.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Classificatie van informatie
      translations:
        en:
          name: Classification of information
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:4
      ref_id: 4.4.7
      description: De opsteller van de informatie doet een voorstel tot Rubricering
        en/of Merking en brengt deze aan op de informatie. De Cyber-BF stelt de Rubricering
        van de informatie vast.
      annotation: 'Verwijzing : Bijlage 23 / 30'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The author of the information proposes a Classification and/or
            Marking and puts it on the information. The Cyber SO lays down the Classification
            of the information.
          annotation: 'Reference: Appendix 23 / 30'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:4
      ref_id: 4.4.8
      description: De opsteller van de informatie bepaalt de Rubricering en/of Merking
        en brengt deze aan op de informatie.
      annotation: 'Verwijzing : Bijlage 23 / 30'
      implementation_groups:
      - '4'
      translations:
        en:
          description: The author of the information determines the Classification
            and/or Marking and puts it onto the information.
          annotation: 'Reference: Appendix 23 / 30'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Informatie labelen
      translations:
        en:
          name: Labelling information
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:5
      ref_id: 4.4.9
      description: De hoogste Rubricering en Merking van Informatie is vermeld op
        verwijderbare en mobiele gegevensdragers.
      annotation: 'Verwijzing : Bijlage 23 / 30'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The highest Classification and Marking of Information is stated
            on removable and mobile data carriers.
          annotation: 'Reference: Appendix 23 / 30'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Behandelen van ICT-bedrijfsmiddelen
      translations:
        en:
          name: Handling Company ICT Resources
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:6
      ref_id: 4.4.10
      description: Systeemdocumentatie, wanneer deze specifieke informatie bevat over
        beveiligingsmaatregelen van de TBB welke zich op het systeem bevinden, is
        op het zelfde niveau beveiligd als deze TBB.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: System documentation that contains specific information about
            security measures of IBPs on the system are secured at the same level
            as this IBP.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.11
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:6
      ref_id: 4.4.11
      description: Er is systeemdocumentatie aanwezig die een implementatie van een
        systeem beschrijft om beheer te kunnen uitvoeren.
      annotation: 'Verwijzing : Bijlage 29'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: System documentation is available that describes the implementation
            of a system in order to enable management.
          annotation: 'Reference: Appendix 29'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.12
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:6
      ref_id: 4.4.12
      description: Er zijn procedures vastgesteld en in werking gesteld voor verwijderen
        van een TBB en de vernietiging hiervan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Procedures have been established and put into operation for
            the removal of an IBP and the destruction thereof.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.13
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:6
      ref_id: 4.4.13
      description: "Na be\xEBindigen van de opdracht of bij het afvoeren zijn de gegevensdragers\
        \ fysiek vernietigd. Een proces-verbaal van vernietiging is opgesteld."
      annotation: 'Verwijzing : Bijlage 23'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Upon expiry of the contract or disposal, the data carriers
            are physically destroyed. An official report is drawn up of the destruction.
          annotation: 'Reference: Appendix 23'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.14
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:6
      ref_id: 4.4.14
      description: Het wissen van gegevensdragers is alleen toegestaan indien gebruik
        is gemaakt van door BIV / MIVD goedgekeurde middelen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The deletion of data carriers is only permitted if DISS/ISO-approved
            means are used.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.14.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4.14
      ref_id: 4.4.14.1
      description: Alle digitale gegevensdragers in een compartiment waar BI op staat,
        zijn vercijferd. Voor ingebruikname is, in overleg met BIV / MIVD, goedkeuring
        verkregen over de voorgestelde oplossing.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: All digital data carriers in compartments labelled SI are encrypted.
            The proposed solution must be approved in consultation with DISS/ISO prior
            to use.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4:7
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4
      name: Beheer van Verwijderbare Gegevensdragers
      translations:
        en:
          name: Management of Removable Data Carriers
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.15
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:7
      ref_id: 4.4.15
      description: Verwijderbare Gegevensdragers zijn niet onbeheerd achtergelaten.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Removable Data Carriers must not be left behind unattended.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.4.16
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.4:7
      ref_id: 4.4.16
      description: In het geval dat gegevensdragers een kortere verwachte levensduur
        hebben dan de gegevens die ze bevatten, zijn de gegevens gekopieerd wanneer
        75% van de levensduur van de gegevensdrager is verstreken.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: In the case that data carriers have a shorter expected service
            life than the data that they contain, the data is copied when 75% of the
            service life of the data carrier has passed.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.5'
      name: Toegangsbeveiliging
      translations:
        en:
          name: Access security
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Beleid voor toegangsbeveiliging
      translations:
        en:
          name: Policy for access security
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:1
      ref_id: 4.5.1
      description: Alleen geautoriseerde gebruikers hebben toegang.
      annotation: 'Verwijzing : Bijlage 31'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Only authorised users have access.
          annotation: 'Reference: Appendix 31'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:1
      ref_id: 4.5.2
      description: Het systeem voorkomt ongeautoriseerde toegang.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The system prevents unauthorised access.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:1
      ref_id: 4.5.3
      description: Toegang door derden uit hoofde van toezicht, inspectie en of audit
        is goedgekeurd door BIV / MIVD.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Access by third parties for the purpose of supervision, inspection
            and/or audit is approved by DISS/ISO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:1
      ref_id: 4.5.4
      description: In het Beveiligingsplan is beschreven op welke wijze gebruikers
        toegang hebben.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The manner in which users have access is described in the Security
            Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:1
      ref_id: 4.5.5
      description: "Er is \xE9\xE9n basisadministratie van authenticatiegegevens van\
        \ gebruikers, op basis waarvan de gebruikers vooraf zijn ge\xEFdentificeerd\
        \ en geautoriseerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There is a single master database of user authentication information,
            on the basis of which users are identified and authorised in advance.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Toegang tot netwerken en netwerkdiensten
      translations:
        en:
          name: Access to networks and network services
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:2
      ref_id: 4.5.6
      description: Beheer op afstand is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Remote administration is not permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:2
      ref_id: 4.5.7
      description: Er is een procedure vastgesteld waarbij onderhoud op afstand alleen
        toegankelijk is als het strikt noodzakelijk is en een verbinding uitsluitend
        geactiveerd kan worden door een bevoegd functionaris (conform Beveiligingsplan).
      implementation_groups:
      - '4'
      translations:
        en:
          description: A procedure has been laid down whereby remote maintenance is
            only accessible if it is strictly necessary and a connection can only
            be activated by an authorised employee (in accordance with the Security
            Plan).
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:2
      ref_id: 4.5.8
      description: De toegang voor onderhoud op afstand door een Leverancier is alleen
        opengesteld op basis een wijzigingsverzoek of storingsmelding.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Access for remote maintenance by a Supplier is only made available
            on the basis of a request for change or notification of a malfunction.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:2
      ref_id: 4.5.9
      description: Beheer op afstand van apparatuur is alleen toegestaan indien gebruik
        is gemaakt van door BIV / MIVD goedgekeurde middelen.
      annotation: 'Verwijzing : Bijlage 25'
      implementation_groups:
      - '4'
      translations:
        en:
          description: Remote management of equipment is only permitted if DISS/ISO-approved
            means are used.
          annotation: 'Reference: Appendix 25'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Registratie en afmelden van gebruikers
      translations:
        en:
          name: Registration and deregistration of users
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:3
      ref_id: 4.5.10
      description: Op basis van een risicoafweging is bepaald waar en op welke wijze
        functiescheiding is toegepast en welke toegangsrechten zijn gegeven. De risicoafweging,
        resultaten en maatregelen zijn weergegeven in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: On the basis of a risk analysis it has been determined where
            and in what way the roles will be split and which access rights will be
            assigned. The risk analysis, results and measures are included in the
            Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.11
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:3
      ref_id: 4.5.11
      description: Het accountmechanisme garandeert dat handelingen zijn herleid naar
        een natuurlijk persoon.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The account mechanism guarantees that actions can be traced
            back to a natural person.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.12
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:3
      ref_id: 4.5.12
      description: Een account mag geen indicatie geven van het privilegeniveau of
        de naam van de gebruiker.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Accounts do not give any indication of the privilege level
            or the name of the user.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.13
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:3
      ref_id: 4.5.13
      description: Bij uitgifte van authenticatiemiddelen is de identiteit van de
        gebruiker vastgesteld evenals het feit dat de gebruiker recht heeft op het
        authenticatiemiddel.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When issuing means of authentication, the identification of
            the user is verified as well as the fact that the user has the right to
            the means of authentication.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Beheren van speciale toegangsrechten
      translations:
        en:
          name: Management of special access rights
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.14
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.14
      description: Gebruikers hebben alleen bevoegdheden voor zover dat voor de uitoefening
        van hun taak noodzakelijk is ("Need-to-know", "need-to-use").
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Users only have rights in so far as this is necessary for them
            to perform their task ("Need-to-know", "need-to-use").
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.15
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.15
      description: "Gebruikers hebben alleen toegang tot een voor de functie noodzakelijk\
        \ geachte set van applicaties en commando\u2019s."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Users only have access to the set of applications and commands
            that is considered necessary for the position.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.16
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.16
      description: Systeemprocessen draaien onder een eigen gebruikersnaam, voor zover
        deze processen handelingen verrichten voor andere systemen of gebruikers.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Systems processes are run under the user\u2019s own name in\
            \ the event that these processes perform actions for other systems or\
            \ users."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.17
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.17
      description: Autorisaties en gebruikersrollen zijn per gebruiker verstrekt conform
        een vaste autorisatieprocedure.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Authorisations and user roles are issued per user in accordance
            with a fixed authorisation procedure.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.18
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.18
      description: Er is een noodprocedure zodat in noodgevallen een beheerdersaccount
        met bijbehorend wachtwoord toegankelijk is. Hierin moet beschreven zijn wie
        er toestemming geeft voor gebruik van dit account.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There is an emergency procedure whereby an administrator account
            and corresponding password can be accessed in the case of emergencies.
            This must describe who grants permission for use of this account.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.19
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.19
      description: "Op het wachtwoord voor een beheerdersaccount zijn de eisen van\
        \ toepassing die \xE9\xE9n (1) rubriceringsniveau hoger liggen dan het systeem\
        \ dat er mee beheerd wordt, met als hoogste rubriceringsniveau STG. ZEER GEHEIM."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The requirements that apply to the password for an administrator
            account are one (1) classification level higher than the system that they
            manage, with the highest classification level being NLD TOP SECRET.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.20
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.20
      description: "Er zijn maatregelen getroffen om het ongeautoriseerde gebruik\
        \ van i/o-poorten (zoals de parallelle, seri\xEBle, USB en firewire poorten)\
        \ op de werkplek(sessie) tegen te gaan."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There are measures taken to combat the unauthorised use of
            the workstation/workstation session i/o ports (such as parallel, serial,
            USB and firewire ports).
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.21
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.21
      description: "Indien een gebruiker ingelogd is op een werkplek(sessie), dan\
        \ vindt het overnemen van de werkplek(sessie) alleen plaats na toestemming\
        \ van de gebruiker. Er moet een mogelijkheid zijn om overname van de werkplek(sessie)\
        \ zelf te be\xEBindigen of er moet een melding komen dat de werkplek(sessie)\
        \ is be\xEBindigd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If a user is logged onto a workstation/workstation session,
            the workstation/workstation session can only be taken over once permission
            has been granted by the user. There is the possibility for the user him/herself
            to terminate the takeover of the workstation/workstation session or notification
            is given that the workstation/workstation session has been ended.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.22
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.22
      description: Administrator- of rootrechten zijn aan een beperkte groep IT-beheerders
        toegekend. Van deze IT-beheerders is een register bijgehouden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Administrator or root rights are assigned to a limited group
            of IT administrators. A register is kept of these IT administrators.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.23
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.23
      description: De IT-beheerders administreren het gebruik van de beheerdersaccounts.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The IT administrators manage the use of the administrator accounts.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.24
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:4
      ref_id: 4.5.24
      description: Het systeem geeft aan welke autorisaties zijn verleend aan personen
        en/of systemen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The system indicates which authorisations have been granted
            to persons and/or systems.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Beheer van geheime Authenticatie-informatie van gebruikers
      translations:
        en:
          name: Management of secret Authentication information of users
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.25
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:5
      ref_id: 4.5.25
      description: "Ten aanzien van wachtwoorden geldt: \n- wachtwoorden zijn op een\
        \ veilige manier uitgegeven (controle identiteit van de gebruiker evenals\
        \ het feit dat de gebruiker recht heeft op het authenticatiemiddel);\n- tijdelijke\
        \ wachtwoorden zijn bij eerste gebruik vervangen door een ander wachtwoord;\n\
        - wachtwoorden mogen niet tegelijkertijd met het gebruikersaccount zijn verstrekt;\n\
        - wachtwoorden die standaard in software zijn meegegeven, zijn bij installatie\
        \ gewijzigd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The following applies to passwords:

            - passwords are issued in a secure manner (verification of the identification
            of the user as well as the fact that the user has the right to the means
            of authentication);

            - temporary passwords are replaced by a new password the first time they
            are used;

            - passwords are not be issued at the same time as the user account;

            - passwords that are included with software as standard are changed during
            installation.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.26
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:5
      ref_id: 4.5.26
      description: Op het wachtwoord voor een gebruikersaccount zijn de eisen van
        toepassing die gelijk zijn aan het rubriceringsniveau van het systeem waartoe
        toegang is verkregen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The requirements that apply to the password for a user account
            are of the same classification level as the system to which they grant
            access.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Beoordeling van toegangsrechten van gebruikers
      translations:
        en:
          name: "Assessment of users\u2019 access rights"
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.27
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:6
      ref_id: 4.5.27
      description: "Toegangsrechten van gebruikers zijn periodiek, minimaal jaarlijks,\
        \ ge\xEBvalueerd. Het interval is beschreven in het Beveiligingsplan."
      implementation_groups:
      - '4'
      translations:
        en:
          description: Access rights of users are evaluated periodically, i.e. at
            least once a year. The interval is described in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.28
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:6
      ref_id: 4.5.28
      description: "Toegangsrechten van gebruikers zijn periodiek, minimaal driemaandelijks,\
        \ ge\xEBvalueerd. Het interval is beschreven in het Beveiligingsplan."
      implementation_groups:
      - '2'
      - '3'
      translations:
        en:
          description: Access rights of users are evaluated periodically, i.e. at
            least every three months. The interval is described in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.29
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:6
      ref_id: 4.5.29
      description: "Toegangsrechten van gebruikers zijn periodiek, minimaal maandelijks,\
        \ ge\xEBvalueerd. Het interval is beschreven in het Beveiligingsplan."
      implementation_groups:
      - '1'
      translations:
        en:
          description: Access rights of users are evaluated periodically, i.e. at
            least once a month. The interval is described in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.30
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:6
      ref_id: 4.5.30
      description: Accounts die meer dan 60 dagen niet zijn gebruikt, zijn geblokkeerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Accounts that are not used for more than 60 days are blocked.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.31
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:6
      ref_id: 4.5.31
      description: Een geblokkeerd account is vrijgegeven door tussenkomst van de
        Cyber-BF.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: A blocked account is unblocked by the intervention of the Cyber
            SO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:7
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5
      name: Geheime Authenticatie-informatie gebruiken
      translations:
        en:
          name: Use of secret Authentication information
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.32
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:7
      ref_id: 4.5.32
      description: 'Aan de gebruikers is een set gedragsregels aangereikt met daarin
        minimaal het volgende:

        - wachtwoorden zijn niet opgeschreven;

        - gebruikers delen hun wachtwoord nooit met anderen;

        - een wachtwoord wordt onmiddellijk gewijzigd indien het vermoeden bestaat
        dat het bekend is geworden aan een derde;

        - wachtwoorden zijn niet gebruikt in automatische inlogprocedures (bijv. opgeslagen
        onder een functietoets of in een macro).'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'A code of conduct is issued to users, which states at least
            the following:

            - passwords will not be written down;

            - users will never share their passwords with anyone;

            - a password will be changed without delay if it suspected that it is
            known to a third party;

            - passwords will be not used in automatic log-in procedures (e.g. saved
            using a function key or in a macro).'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.33
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:7
      ref_id: 4.5.33
      description: De minimale lengte van wachtwoorden is voor (TBB1:12, TBB2 en 3:10,
        TBB4:9) karakters.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'The minimum length of passwords is the following number of
            characters: IBP 1: 12; IBP 2 and 3: 10; IBP: 9.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.34
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:7
      ref_id: 4.5.34
      description: Wachtwoorden zijn elke (TBB1:60, TBB2:90, TBB3:90, TBB4:90) dagen
        gewijzigd. Daarbij zijn de laatste 10 gebruikte wachtwoorden niet hergebruikt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Passwords are changed every so many days: IBP 1: 60, IBP 2:
            90, IBP 3: 90, IBP 4: 90. When doing so, the last 10 passwords used may
            not be used again.'
