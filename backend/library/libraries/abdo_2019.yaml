translations:
  en:
    name: General Security Requirements for Defence Contracts (ABDO) 2019
    description: "## Foreword\n\nIt regularly becomes clear that outsiders have great\
      \ interest in the knowledge, information, materiel, goods and other objects\
      \ of the Ministry of Defence, knowledge institutes and companies. Objectionable\
      \ practices and covert means are not shunned in an attempt to lay hands on knowledge\
      \ or gather information regarding these subjects. Proper security is therefore\
      \ vital.\n\nYour organization also has at its disposal valuable matters you\
      \ do not want to yield to unauthorized persons. Unfortunately, not everyone\
      \ is sufficiently aware of that. This, in combination with a (too) low level\
      \ of security, makes an organization vulnerable. The security of knowledge,\
      \ information, materiel and goods, as well as knowledge of the object used for\
      \ production, processing and/or storage, therefore deserves the necessary attention.\n\
      \nAmong others, the Civil Service Data Security - Special Information regulation\
      \ (Voorschrift informatiebeveiliging rijksdienst \u2014 bijzondere informatie;\
      \ VIR) provides rules for the security of special information of the central\
      \ government, in order to prevent the undesirable dissemination of, and unlawful\
      \ access to, this information. It also describes how to act if a security incident\
      \ occurs. For each ministry, these rules have been further detailed in security\
      \ policy. For the Ministry of Defence, the security policy is the Defence Security\
      \ Policy (Defensie Beveiligingsbeleid; DSP).\n\nThe scope of the Civil Service\
      \ Data Security - Special Information regulation and other regulations is in\
      \ principle restricted to the central government. It can however be necessary\
      \ to release information, materiel, goods or even other objects \u2014 in other\
      \ words an Interest to be Protected (IBP) \u2014 to parties outside of the Ministry\
      \ of Defence, for example to an company that needs an IBP to execute a contract.\
      \ This is only permitted if there is sufficient certainty that adequate security\
      \ is guaranteed. This document is an overall revision of General Security Requirements\
      \ for Defence Contracts (Algemene Beveiligingseisen voor Defensieopdrachten;\
      \ ABDO), in other words ABDO 2019, which the Ministry of Defence imposes on\
      \ organizations and companies with regard to the security of an IBP. The ABDO\
      \ 2019 is derived from the aforementioned regulations, where necessary supplemented\
      \ with new general security requirements and implementing provisions.\n\nThe\
      \ ABDO 2019 replaces the ABDO 2017 and has been slightly amended in comparison.\
      \ The ABDO 2019 thus satisfies the need of the Ministry of Defence for a modern\
      \ regime of security requirements. The application thereof contributes to adequate\
      \ security of not only the IBP handed over by the Ministry of Defence, but also\
      \ companies' own 'crown jewels/intellectual property'.\n\nThe ABDO 2019 will\
      \ come into effect on 1 November 2019.\n\n*Note : This document is a translation\
      \ of the original Dutch version of the document. The Minister of Defence cannot\
      \ assume any responsibility for the accuracy or reliability of the translated\
      \ version of this document and shall always refer to the original Dutch version\
      \ of the document, nor shall this translation be construed as constituting any\
      \ obligation on the part of the Minister of Defence.*\n\nSource: https://www.defensie.nl/documenten/2020/02/04/abdo-2019-english"
