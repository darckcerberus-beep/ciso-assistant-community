      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.50
      description: Het is niet toegestaan om gebruik te maken van groepsaccounts om
        gegevens te wijzigen in bedrijfskritieke applicaties die zelf geen Identificatie-,
        Authenticatie- en authorisatiemechanisme hebben.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Using group accounts in order to change data in operation-critical
            applications that do not have Identification, Authentication and authorisation
            mechanisms is not permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.51
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.51
      description: Het is niet toegestaan om gebruik te maken van groepsaccounts.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: The use of group accounts is not permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.52
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.52
      description: 'Groepsaccounts zijn toegestaan onder de volgende voorwaarden:

        - een groepsaccount is alleen in gebruik als er een grote operationele noodzaak
        is en het gebruik van persoonlijke accounts zeer ondoelmatig is;

        - de Cyber-BF verleent toestemming voor het gebruik van een groepsaccount;

        - het gebruik van een groepsaccount is te herleiden naar een natuurlijk persoon;

        - het is niet toegestaan om via externe toegang gebruik te maken van een groepsaccount;

        - het is niet toegestaan om toegang te hebben tot externe systemen (bijvoorbeeld
        het internet) met behulp van een groepsaccount;

        - het is niet toegestaan om persoonlijke of niet-werkgerelateerde informatie
        te verwerken met behulp van een groepsaccount.'
      implementation_groups:
      - '4'
      translations:
        en:
          description: 'Group accounts are permitted under the following conditions:

            - a group account is only in use if there is a major operational need
            and the use of personal accounts is very inefficient;

            - the Cyber SO grants permission for the use of a group account;

            - the use of a group account can be traced back to a natural person;

            - the use of a group account via external access is not permitted;

            - accessing external systems (e.g. the internet) using a group account
            is not permitted;

            - processing personal or non-work related information using a group account
            is not permitted.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.53
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.53
      description: 'Systeemaccounts zijn toegestaan onder de volgende voorwaarden:

        - het is niet toegestaan om via externe toegang gebruik te maken van een systeemaccount;

        - het is niet toegestaan om toegang te hebben tot externe systemen (bijvoorbeeld
        het internet) met behulp van een systeemaccount;

        - het is niet toegestaan om persoonlijke of niet-werkgerelateerde informatie
        te verwerken met behulp van een systeemaccount.'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'System accounts are permitted under the following conditions:

            - the use of a system account via external access is not permitted;

            - accessing external systems (e.g. the internet) using a system account
            is not permitted;

            - processing personal or non-work related information using a system account
            is not permitted.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5:10
