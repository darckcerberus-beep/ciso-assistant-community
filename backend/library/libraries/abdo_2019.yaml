      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:10
      ref_id: 4.5.57
      description: 'Gebruikers hebben de mogelijkheid hun eigen wachtwoord te kiezen
        en te wijzigen. Hierbij geldt het volgende:

        - voordat een gebruiker zijn wachtwoord kan wijzigen, wordt de gebruiker opnieuw
        geauthenticeerd;

        - ter voorkoming van typefouten in het nieuw gekozen wachtwoord is er een
        bevestigingsprocedure.'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Users have the possibility to choose and change their own
            password. The following applies in this regard:

            - before a user can change his/her password, the user is authenticated
            again;

            - there is a confirmation procedure for the purpose of preventing typing
            errors in the newly chosen password.'
