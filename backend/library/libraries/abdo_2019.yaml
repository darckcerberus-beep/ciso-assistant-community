urn: urn:intuitem:risk:library:abdo_2019
locale: nl
ref_id: ABDO_2019
name: Algemene Beveiligingseisen voor Defensieopdrachten (ABDO) 2019
description: "## VOORWOORD\n\nRegelmatig blijkt dat buitenstaanders grote interesse\
  \ hebben in kennis, informatie, materieel, goederen en objecten van het Ministerie\
  \ van Defensie, kennisinstituten en bedrijven. Onoorbare praktijken en heimelijke\
  \ middelen worden niet geschuwd om te trachten hierop de hand te leggen of hieromtrent\
  \ gegevens te vergaren. Het is dus noodzakelijk een en ander goed te beveiligen.\n\
  \nOok uw organisatie beschikt over waardevolle zaken die u niet wilt prijsgeven\
  \ aan onbevoegden. Helaas is niet iedereen zich daarvan in voldoende mate bewust.\
  \ Dat, in combinatie met een (te) laag niveau van beveiliging, maakt een organisatie\
  \ kwetsbaar. De beveiliging van kennis, informatie, materieel en goederen alsmede\
  \ van het object waar e.e.a. wordt geproduceerd, verwerkt danwel opgeslagen, verdient\
  \ dan ook de nodige aandacht.\n\nOnder andere het Voorschrift Informatiebeveiliging\
  \ Rijksdienst (VIR) geeft regels voor de beveiliging van (Bijzondere) Informatie\
  \ bij de Rijksoverheid, opdat ongewenste verspreiding van en onrechtmatige toegang\
  \ tot die (Bijzondere) Informatie wordt voorkomen. Ook wordt beschreven hoe te handelen\
  \ indien zich een Beveiligingsincident heeft voorgedaan. Voor ieder ministerie zijn\
  \ deze regels nader uitgewerkt in beveiligingsbeleid. Voor Defensie is dat het Defensie\
  \ Beveiligingsbeleid (DBB).\n\nDe werking van het VIR en andere voorschriften is\
  \ in beginsel beperkt tot de Rijksoverheid. Het kan echter noodzakelijk zijn de\
  \ betreffende informatie, materieel, goederen of zelfs een object \u2013 met andere\
  \ woorden een Te Beschermen Belang (TBB) \u2013 buiten het Ministerie van Defensie\
  \ te brengen, bijvoorbeeld bij een bedrijf dat een TBB nodig heeft voor de uitvoering\
  \ van een contract. Dit is alleen toegestaan als voldoende zekerheid bestaat dat\
  \ een adequate beveiliging is gewaarborgd. Thans liggen voor de geheel herziene\
  \ Algemene Beveiligingseisen voor Defensieopdrachten, ofwel de ABDO 2019, die Defensie\
  \ oplegt aan instellingen en bedrijven met betrekking tot het Beveiligen van een\
  \ TBB. De ABDO 2019 zijn een afgeleide van de eerder genoemde regelgeving, waar\
  \ nodig aangevuld met nieuwe algemene beveiligingseisen en uitvoeringsbepalingen.\n\
  \nDe ABDO 2019 vervangen de ABDO 2017 en zijn ten opzichte daarvan enigszins gewijzigd.\
  \ Daarmee voorziet de ABDO 2019 in de behoefte van het Ministerie van Defensie aan\
  \ een modern stelsel van beveiligingseisen. Toepassing daarvan draagt bij aan adequate\
  \ beveiliging van niet alleen de overgedragen TBB van het Ministerie van Defensie\
  \ maar ook van de bedrijfseigen \u201Ckroonjuwelen\u201D.\n\nDe ABDO 2019 treden\
  \ in werking per 1 november 2019.\n\nBron: https://www.defensie.nl/documenten/2020/02/04/abdo-2019"
