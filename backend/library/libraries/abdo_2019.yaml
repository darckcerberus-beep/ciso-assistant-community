      implementation_groups:
      - '4'
      translations:
        en:
          description: After an incorrect password for a user account has been entered
            five times, the account will be blocked for at least 10 minutes. If a
            lock-out period cannot be imposed, the account will be blocked until the
            user requests the lockout be lifted or the password is resetted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.47
