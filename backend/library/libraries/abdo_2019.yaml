      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Information that is transferred between networks and systems
            may contain Malware and is potentially unsafe. Measures have been taken
            to avoid contamination.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.20
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:3
      ref_id: 4.9.20
      description: Elk segment heeft een gedefinieerd rubriceringsniveau. Bij overgang
        van segment vindt controle plaats op protocol, inhoud en richting van de communicatie.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Each segment has a defined classification level. When transferring
            between segments, checks are carried out with regard to protocol, content
            and the direction of communication.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.21
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:3
      ref_id: 4.9.21
      description: Beheer en audit van segmenten vindt plaats vanuit een minimaal
        logisch gescheiden, separaat segment.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Segments are managed and audited from a separate segment that
            is at least logically separate.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.22
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:3
      ref_id: 4.9.22
      description: Segmentering is ingericht met voorzieningen waarvan de functionaliteit
        is beperkt tot het strikt noodzakelijke.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Segmenting is set up with provisions of which the functionality
            is limited to what is strictly necessary.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.23
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:3
      ref_id: 4.9.23
      description: Het netwerk is gesegmenteerd (Compartimentering) op basis van "Need-to-be",
        "Need-to-know" en "least privilege" principes.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The network is segmented (Compartmentalised) on the basis\
            \ of the principles \u201CNeed-to-be, \u201CNeed-to-know and \u201Cleast\
            \ privilege."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9
      name: Beleid en procedures voor informatietransport
      translations:
        en:
          name: Policy and procedures for information transport
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.24
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:4
      ref_id: 4.9.24
      description: Alle TBB die zich niet binnen het daarvoor bestemde fysieke compartiment
        bevindt is vercijferd.  De toe te passen Vercijfering is goedgekeurd door
        BIV / MIVD.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: All IBPs that are not in the designated physical compartment
            are encrypted. The Encryption to be applied has been approved by DISS/ISO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.25
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:4
      ref_id: 4.9.25
      description: Een TBB is alleen verzonden over een onbeveiligde verbinding wanneer
        door BIV /  MIVD goedgekeurde Vercijfering is toegepast.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An IBP is only sent over an insecure connection when DISS/ISO-approved
            Encryption is applied.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.26
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:4
      ref_id: 4.9.26
      description: Binnenkomende programmatuur (zowel op fysieke media als gedownload)
        is gecontroleerd op ongeautoriseerde wijzigingen (integriteitscontrole) aan
        de hand van een door de Leverancier via een gescheiden kanaal geleverde checksum
        of certificaat.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Incoming software (both on physical media and downloaded) is
            checked for unauthorised changes using a checksum or certificate delivered
            by the Supplier through a separate channel.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.27
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:4
      ref_id: 4.9.27
      description: Ontsluiting van TBB op een netwerk tussen verschillende bedrijfslocaties
        (WAN) is niet toegestaan.
      implementation_groups:
      - '1'
      translations:
        en:
          description: Accessing an IBP on a network between various company locations
            (WAN) is not permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.28
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:4
      ref_id: 4.9.28
      description: Ontsluiting van TBB op een netwerk tussen verschillende bedrijfslocaties
        (WAN) is alleen toegestaan indien de verbinding tussen de locaties van een
        door BIV / MIVD goedgekeurde Vercijfering is voorzien.
      implementation_groups:
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Accessing an IBP on a network between various company locations
            (WAN) is only permitted if the connection between the locations has DISS/ISOapproved
            Encryption.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9:5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9
      name: Cloudcomputing
      translations:
        en:
          name: Cloudcomputing
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.29
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:5
      ref_id: 4.9.29
      description: Het gebruik van een public Cloud-dienst (computing, opslag, transport)
        is niet toegestaan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The use of a public Cloud service (computing, storage, transport)
            is not permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.30
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:5
      ref_id: 4.9.30
      description: Het gebruik van een Private Cloud-dienst (computing, opslag, transport)
        is toegestaan.
      implementation_groups:
      - '4'
      translations:
        en:
          description: The use of a Private Cloud Service (computing, storage, transport)
            is permitted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.31
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:5
      ref_id: 4.9.31
      description: Private Cloud-dienst (computing, opslag, transport) vindt plaats
        op Nederlands grondgebied, bij een Nederlandse rechtspersoon en met gebruik
        van personeel met de Nederlandse nationaliteit.
      implementation_groups:
      - '4'
      translations:
        en:
          description: Private Cloud services (computing, storage, transport) will
            be carried out on Dutch territory, at a Dutch legal entity and by personnel
            with the Dutch nationality.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9:6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9
      name: Virtualisatie
      translations:
        en:
          name: Virtualisation
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.32
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:6
      ref_id: 4.9.32
      description: 'Bij toepassing van Virtualisatie is een risicoanalyse uitgevoerd.
        De volgende voorwaarden zijn hierbij van toepassing:

        - securityfuncties draaien op fysiek gescheiden virtualisatieplatformen;

        - er zijn alleen systeemcomponenten gecombineerd die hetzelfde rubriceringsniveau
        hebben;

        - het ontwerp en implementatie is goedgekeurd door BIV / MIVD.'
      annotation: 'Verwijzing : Bijlage 34'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'A risk analysis is carried out when applying Virtualisation.
            The following conditions apply in this regard:

            - security functions run on physically separate virtualisation platforms;

            - only system components that have the same classification level are combined;

            - the design and implementation has been approved by DISS/ISO.'
          annotation: 'Reference: Appendix 34'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.9.33
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.9:6
      ref_id: 4.9.33
      description: Het toepassen van VLAN's is alleen toegestaan in netwerken met
        een gelijk rubriceringsniveau. Het ontwerp en implementatie is goedgekeurd
        door BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 34'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The application of VLANs is only permitted on networks with
            the same classification level. The design and implementation has been
            approved by DISS/ISO.
          annotation: 'Reference: Appendix 34'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.10'
      name: Acquisitie, ontwikkeling en onderhoud van informatiesystemen
      translations:
        en:
          name: Acquisition, development and maintenance of information systems
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10
      name: Analyse en specificatie van informatiebeveiligingseisen
      translations:
        en:
          name: Analysis and specification of information security requirements
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:1
      ref_id: 4.10.1
      description: In projecten zijn beveiligingsrisicoanalyses en maatregelbepalingen
        opgenomen als onderdeel van het ontwerp. Ook bij wijzigingen in het ontwerp
        zijn de beveiligingsconsequenties meegenomen. Deze zijn bij Wijziging en jaarlijks
        gecontroleerd op actualiteit.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Security risk analyses and measures of control are included
            in projects as part of the design. In the case of changes to the design,
            the consequences for security are taken into account. These fall under
            Change and are checked for currency annually.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:1
      ref_id: 4.10.2
      description: De samenhang tussen de ICT-bedrijfsmiddelen is in kaart gebracht
        in een netwerktekening.
      annotation: 'Verwijzing : Bijlage 27'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The connections between Company ICT assets are set out on a
            network drawing.
          annotation: 'Reference: Appendix 27'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10
      name: Principes voor engineering van beveiligde systemen
      translations:
        en:
          name: Principles for engineering secured systems
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:2
      ref_id: 4.10.3
      description: Er zijn controles uitgevoerd op de invoer van gegevens. Daarbij
        is minimaal gecontroleerd op grenswaarden, ongeldige tekens, onvolledige gegevens,
        gegevens die niet aan het juiste format voldoen en inconsistentie van gegevens.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Checks are carried out on data entry, including at least checks
            of limit values, invalid characters, incomplete data, and data that does
            not comply with the format requirements and inconsistent data.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:2
      ref_id: 4.10.4
      description: Het Informatiesysteem bevat functies waarmee vastgesteld kan worden
        of gegevens correct verwerkt zijn. Hiermee wordt een geautomatiseerde controle
        bedoeld waarmee (duidelijke) transactie- en verwerkingsfouten kunnen worden
        gedetecteerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Information system contains functions that can determine
            whether data is correctly processed, that is to say an automatic check,
            whereby (obvious) transaction and processing errors can be detected.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:2
      ref_id: 4.10.5
      description: De uitvoerfuncties van programma's maken het mogelijk om de volledigheid
        en juistheid van de gegevens te kunnen vaststellen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The output functions of programmes makes it possible to determine
            the completeness and accuracy of the data.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10
      name: Systeemacceptatietests
      translations:
        en:
          name: System acceptance tests
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:3
      ref_id: 4.10.6
      description: Van acceptatietesten is een log bijgehouden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A log is kept of acceptance tests.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:3
      ref_id: 4.10.7
      description: Er zijn acceptatiecriteria vastgesteld voor het testen van de Beveiliging.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Acceptance criteria have been determined for testing the Security.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:3
      ref_id: 4.10.8
      description: Voordat systemen en/of componenten in productie genomen zijn, zijn
        testgegevens en testaccounts verwijderd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Before systems and/or components are taken into production,
            test data and test accounts are deleted.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.10.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.10:3
      ref_id: 4.10.9
      description: "Acceptatie van systemen/software vindt plaats nadat vastgesteld\
        \ is dat de ABDO beveiligingsmaatregelen daadwerkelijk zijn ge\xEFmplementeerd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Acceptance of systems/software takes place after it has been
            determined that the ABDO security requirements have in fact been implemented.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.11
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.11'
      name: Leveranciersrelaties
      translations:
        en:
          name: Suppliers
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.11:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.11
      name: Informatiebeveiligingsbeleid voor leveranciersrelaties
      translations:
        en:
          name: Information security policy for suppliers
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.11.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.11:1
      ref_id: 4.11.1
      description: Indien een externe partij betrokken is bij het beheer van een TBB
        omgeving, is voor deze partij door BIV / MIVD een ABDO-Autorisatie afgegeven.
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If an external party is involved in the management of an IBP
            environment, an ABDO Authorisation has been issued for this party by DISS/ISO.
          annotation: 'Reference: Appendix 8'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.11.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.11:1
      ref_id: 4.11.2
      description: Indien dataopslag van een TBB door een externe partij is gefaciliteerd,
        is voor deze partij door BIV / MIVD een ABDO-Autorisatie afgegeven.
      annotation: 'Verwijzing : Bijlage 8'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If data storage of an IBP is facilitated by an external party,
            an ABDO Authorisation has been issued for this party by DISS/ISO.
          annotation: 'Reference: Appendix 8'
