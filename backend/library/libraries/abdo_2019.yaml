      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.47
      description: Nadat voor een gebruikersaccount drie maal een verkeerd wachtwoord
        gegeven is, wordt het account minimaal 10 minuten geblokkeerd. Indien er geen
        lockout periode ingesteld kan worden, dan wordt het account geblokkeerd totdat
        de gebruiker verzoekt deze lockout op te heffen of het wachtwoord te resetten.
        De Cyber-BF verleent daartoe toestemming.
      implementation_groups:
      - '3'
      translations:
        en:
          description: After an incorrect password for a user account has been entered
            three times, the account will be blocked for at least 10 minutes. If a
            lock-out period cannot be imposed, the account will be blocked until the
            user requests the lockout be lifted (see 46). The Cyber SO grants permission
            in this regard.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.5.48
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.5:9
      ref_id: 4.5.48
      description: Nadat voor een gebruikersaccount drie maal een verkeerd wachtwoord
        gegeven is, wordt het account geblokkeerd totdat de gebruiker verzoekt de
