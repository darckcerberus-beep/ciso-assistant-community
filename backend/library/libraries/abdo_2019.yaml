      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.6:1
      ref_id: 4.6.3
      description: Er is vastgesteld aan welke overeenkomsten, wetten en voorschriften
        de toepassing van cryptografische technieken moet voldoen. Dit is vastgelegd
        in het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: It is determined with which agreements, laws and regulations
            the application of cryptographic techniques must comply. This is documented
            in the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.6:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.6
      name: Sleutelbeheer
      translations:
        en:
          name: Key management
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.6.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.6:2
      ref_id: 4.6.4
      description: In het sleutelbeheer is minimaal aandacht besteed aan het proces,
        de actoren en hun verantwoordelijkheden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Key management at least considers the process, the actors,
            and their responsibilities.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.6.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.6:2
      ref_id: 4.6.5
      description: De geldigheidsduur van cryptografische sleutels is bepaald aan
        de hand van de beoogde toepassing en is vastgelegd in het cryptografisch beleid
        als onderdeel van het Beveiligingsplan.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The period of validity of cryptographic keys is determined
            according to the intended application and is laid down in the cryptographic
            policy as part of the Security Plan.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.6.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.6:2
      ref_id: 4.6.6
      description: De Vertrouwelijkheid van cryptografische sleutels is gewaarborgd
        tijdens generatie, gebruik, transport en opslag van de sleutels.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The Confidentiality of cryptographic keys is safeguarded during
            the generation, use, transport and storage of the keys.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.6.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.6:2
      ref_id: 4.6.7
      description: Er is een procedure vastgesteld waarin is bepaald hoe wordt omgegaan
        met gecompromitteerde sleutels.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A procedure has been established which determines how compromised
            keys will be dealt with.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.7'
      name: Fysieke Beveiliging en Beveiliging van de omgeving
      translations:
        en:
          name: Physical Security and Security of the environment
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: Beveiligde gebieden
      translations:
        en:
          name: Secured areas
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:1
      ref_id: 4.7.1
      description: Systemen waarop zich een grote concentratie van ongerubriceerde
        of gemerkte TBB bevindt, zijn geplaatst in een ruimte die op TBB 4 niveau
        is beveiligd.
      annotation: 'Verwijzing : Bijlage 32'
      implementation_groups:
      - '4'
      translations:
        en:
          description: Systems that contain a large concentration of unclassified
            or unmarked IBPs are installed in an area that is secured to the IBP-4
            level.
          annotation: 'Reference: Appendix 32'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:1
      ref_id: 4.7.2
      description: Systemen waarop zich een grote concentratie van TBB van Departementaal
        Vertrouwelijk bevindt, zijn geplaatst in een ruimte die op TBB 3 niveau is
        beveiligd.
      annotation: 'Verwijzing : Bijlage 32'
      implementation_groups:
      - '4'
      translations:
        en:
          description: Systems that contain a large concentration of NLD Restricted
            IBPs are installed in an area that is secured to IBP-3 level.
          annotation: 'Reference: Appendix 32'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:1
      ref_id: 4.7.3
      description: Systemen waarop zich een grote concentratie van TBB van STG Confidentieel
        bevindt, zijn geplaatst in een ruimte die op TBB 2 niveau is beveiligd.
      annotation: 'Verwijzing : Bijlage 32'
      implementation_groups:
      - '3'
      translations:
        en:
          description: Systems that contain a large concentration of NLD Confidential
            IBPs are installed in an area that is secured to the IBP-2 level.
          annotation: 'Reference: Appendix 32'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:1
      ref_id: 4.7.4
      description: Systemen waarop zich een grote concentratie van TBB van STG Geheim
        bevindt, zijn geplaatst in een ruimte die op TBB 1  niveau is beveiligd.
      annotation: 'Verwijzing : Bijlage 32'
      implementation_groups:
      - '2'
      translations:
        en:
          description: Systems that contain a large concentration of NLD Secret IBPs
            are installed in an area that is secured to the IBP-1 level.
          annotation: 'Reference: Appendix 32'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: Plaatsing en bescherming van apparatuur
      translations:
        en:
          name: Installing and protecting equipment
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:2
      ref_id: 4.7.5
      description: Apparatuur en bekabeling is zo geplaatst en beschermd dat risico's
        van schade en storing van buitenaf is geminimaliseerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Equipment and cabling is installed and protected in such a
            way that the risk from outside of damage and failure is minimised.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:2
      ref_id: 4.7.6
      description: Ter voorkoming van compromitterende emissies zijn TEMPEST maatregelen
        genomen. De maatregelen zijn vooraf afgestemd met BIV / MIVD.
      annotation: 'Verwijzing : Bijlage 36'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: TEMPEST measures are taken to prevent emissions from being
            compromised. The measures are coordinated in advance with DISS/ISO.
          annotation: 'Reference: Appendix 36'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.6.1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7.6
      ref_id: 4.7.6.1
      description: Ter voorkoming van emissie dienen niet gebruikte spannings-/databekabeling
        of losse metaalgeleiders te worden verwijderd.
      annotation: 'Verwijzing : Bijlage 36'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: In order to prevent emissions, unused power/data cables and
            separate metal conductors must be removed.
          annotation: 'Reference: Appendix 36'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.6.2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7.6
      ref_id: 4.7.6.2
      description: Alle apparatuur gerelateerd aan het opslaan, verwerken en transporteren
        van de TBB is uitgerust met een voedingsfilter.
      implementation_groups:
      - '1'
      - '2'
      translations:
        en:
          description: All equipment related to the storage, processing and transport
            of an IBP is equipped with a feed filter
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: Onderhoud van apparatuur
      translations:
        en:
          name: Equipment maintenance
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:3
      ref_id: 4.7.7
      description: "Apparatuur, software en gegevensdragers is ge\xEFnstalleerd, gebruikt\
        \ en onderhouden volgens de voorschriften van de fabrikant voor zover dit\
        \ past binnen het gebruik en onderhoudsplan van de organisatie."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Equipment, software and data carriers are installed, used\
            \ and maintained in accordance with the manufacturer\u2019s instructions\
            \ insofar as this is compatible with the use and maintenance plan of the\
            \ organisation."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:3
      ref_id: 4.7.8
      description: Onderhoud vindt op locatie plaats en zijn uitsluitend toegestaan
        met toepassing van door BIV / MIVD goedgekeurde procedures.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Maintenance is performed on site and is only permitted with
            the application of procedures approved of by DISS/ISO.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: Verwijdering van Bedrijfsmiddelen
      translations:
        en:
          name: Removal of company resources
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:4
      ref_id: 4.7.9
      description: Apparatuur, informatie en programmatuur van de organisatie is niet
        zonder toestemming vooraf van de locatie meegenomen. Bij TBB 1,TBB 2 en TBB
        3 systemen geeft de Cyber-BF toestemming. Bij TBB 4 systemen de lijnmanager.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Equipment, information and software of the organisation may
            not be taken from the location without permission being given in advance.
            The Cyber SO grants permission for IBP-1, IBP-2 and IBP-3 systems. The
            line manager does so for IBP-4 systems.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: Veilig verwijderen of hergebruiken van apparatuur
      translations:
        en:
          name: Secure removal or reuse of equipment
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:5
      ref_id: 4.7.10
      description: Hergebruik van ICT-bedrijfsmiddelen is toegestaan mits het dezelfde
        TBB betreft en is gewist door gebruik te maken van de door BIV / MIVD goedgekeurde
        middelen. Een procesverbaal van vernietiging (wissen) is opgesteld.
      annotation: 'Verwijzing : Bijlage 23.2.2'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: Reusing Company ICT assets is permitted as long as the same
            IBP is concerned and deleted using means approved by DISS/ISO. An official
            report of destruction (deletion) is drawn up.
          annotation: 'Reference: Appendix 23.2.2'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: Onbeheerde gebruikersapparatuur
      translations:
        en:
          name: Unattended user equipment
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.11
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:6
      ref_id: 4.7.11
      description: Bij het verlaten van de werkplek vergrendelt de gebruiker de werkplek
        (clear screen).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When leaving the workstation, the user locks the workstation
            (clear screen).
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7:7
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7
      name: "\u201CClear Desk\u201D-beleid"
      translations:
        en:
          name: Clear desk policy
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.12
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:7
      ref_id: 4.7.12
      description: In het "clear-desk" beleid staat minimaal dat de gebruiker een
        TBB opbergt op de daartoe bestemde plaats indien men de Informatie niet gebruikt.
        Deze informatie is altijd opgeborgen in een afsluitbare opbergmogelijkheid
        van het juiste TBB niveau.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "The \u201CClear Desk Policy at least states that the user\
            \ puts away an IBP in the designated place if the Information is not being\
            \ used. This information is always kept in a lockable means of storage\
            \ of the correct IBP level."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.13
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:7
      ref_id: 4.7.13
      description: "Bij het afdrukken van een TBB op een printer in een andere ruimte\
        \ dan het werkstation is gebruik gemaakt van de functie \u201Cbeveiligd afdrukken\u201D\
        \ (bijvoorbeeld pincode verificatie)."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "When printing an IBP from a printer in a different area to\
            \ the workstation, the \u201Csecure printing function is used (e.g. PIN\
            \ code verification)."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.14
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:7
      ref_id: 4.7.14
      description: Een werkplek (sessie) is voor (TBB1 en 2 na:5, TBB3 na:10,TBB4
        na:15) minuten van inactiviteit automatisch geblokkeerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'A workstation session is automatically blocked after so many
            minutes of inactivity: IBP 1 and 2: 5, IBP 3: 10, IBP 4: 15.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.15
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:7
      ref_id: 4.7.15
      description: Toegangsbeveiligingslock is automatisch geactiveerd bij het verwijderen
        van een token (indien aanwezig).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: An access security lock is automatically activated when a token
            is removed (if used).
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.7.16
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.7:7
      ref_id: 4.7.16
      description: 'Voor het uitzetten/uitstellen van de schermbeveiliging op een
        bepaalde werkplek (sessie) gelden de volgende voorwaarden:

        - de schermbeveiliging is alleen uitgezet of uitgesteld als er een grote operationele
        noodzaak is;

        - voordat een schermbeveiliging wordt uitgezet of uitgesteld moet hiervoor
        toestemming verleend worden door de Cyber-BF;

        - de Cyber-BF onderhoudt een registratie van werkplek (sessie) en de noodzaak
        waarom ontheffing is gegeven.'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'When disabling/delaying screen lock for a specific workstation
            session, the following conditions apply:

            - screen lock is only turned off/delayed if there is a major operational
            need to do so;

            - before screen lock is turned off/delayed, permission must be given by
            the Cyber SO;

            - The Cyber SO keeps a workstation/workstation session log including the
            need for the exemption to be granted.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4
      ref_id: '4.8'
      name: Beveiliging bedrijfsvoering
      translations:
        en:
          name: Security of business operations
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Gedocumenteerde bedieningsprocedures
      translations:
        en:
          name: Documented operating procedures
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:1
      ref_id: 4.8.1
      description: Bedieningsprocedures bevatten actuele en accurate informatie over
        opstarten, afsluiten, back-uppen en herstelacties, afhandelen van fouten,
        beheer van logs, contactpersonen, noodprocedures, speciale maatregelen voor
        Beveiliging en zijn beschikbaar gesteld aan alle gebruikers die deze nodig
        hebben.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Operating procedures include current and accurate information
            regarding turning on, shutting down, backing up, recovery actions, dealing
            with errors, keeping logs, contact persons, emergency procedures, and
            special measures for Security, and are available to all users who need
            them.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:1
      ref_id: 4.8.2
      description: Er zijn procedures voor de behandeling van gegevensdragers die
        ingaan op ontvangst, opslag, Rubricering, toegangsbeperkingen, verzending,
        hergebruik en vernietiging.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There are procedures for handling data carriers, which detail
            receipt, storage, Classification, access restrictions, sending, reuse
            and destruction.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:1
      ref_id: 4.8.3
      description: Systeemcomponenten - zoals Firewall, router, switches, servers
        - zijn in de basis ingericht volgens een standaard configuratie. Deze configuratie
        is vastgelegd en regelmatig gecheckt op actualiteit.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "System components \u2013 such as Firewalls, routers, switches,\
            \ servers \u2013 are set up according to standard configuration. This\
            \ configuration has been laid down and is regularly checked for currency."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:1
      ref_id: 4.8.4
      description: De verantwoordelijkheden en procedures voor het adequaat beheer
        en juist gebruik van de IT-voorzieningen waarin gerubriceerde informatie wordt
        verwerkt, zijn vastgesteld.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The responsibilities and procedures for the adequate administration
            and correct use of IT assets that process classified information have
            been determined.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Wijzigingsbeheer
      translations:
        en:
          name: Change management
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:2
      ref_id: 4.8.5
      description: 'Voor TBB systemen is een proces van wijzigingenbeheer ingesteld.
        Dit proces behelst minimaal:

        - het administreren van significante wijzigingen, activiteiten zijn tot de
        natuurlijke persoon te herleiden;

        - impactanalyse van mogelijke gevolgen van de wijzigingen;

        - goedkeuringsprocedure voor wijzigingen. De Cyber-BF is daarin opgenomen.'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'A change-management process has been set up for IBP systems.
            This process includes at least the following:

            - recording significant changes, so activities can be traced back to the
            natural person;

            - an impact analysis of possible consequences of the changes;

            - an approval procedure for changes. The Cyber SO is included in this
            regard.'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.6
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:2
      ref_id: 4.8.6
      description: Instellingen van informatiebeveiligingsfuncties (b.v. securitysoftware)
        op het koppelvlak tussen vertrouwde en onbetrouwbare netwerken, zijn automatisch
        op wijzigingen gecontroleerd.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The settings of information security functions (e.g. security
            software) on the interface between trusted and unreliable networks are
            automatically checked for changes.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Capaciteitsbeheer
      translations:
        en:
          name: Capacity management
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.7
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:3
      ref_id: 4.8.7
      description: "Op basis van een risicoanalyse is bepaald wat de beschikbaarheidseis\
        \ van een ICT-voorziening is en wat de impact bij uitval is. Afhankelijk daarvan\
        \ zijn maatregelen bepaald zoals automatisch werkende mechanismen om uitval\
        \ van (fysieke) ICT-voorzieningen, waaronder verbindingen, op te vangen. De\
        \ ICT-voorzieningen voldoen aan het voor de diensten overeengekomen niveau\
        \ van Beschikbaarheid. Er zijn voorzieningen ge\xEFmplementeerd om de Beschikbaarheid\
        \ van componenten te bewaken (bijvoorbeeld de controle op aanwezigheid van\
        \ een component en metingen die het gebruik van een component vaststellen).\
        \ Op basis van voorspellingen van het gebruik is actie genomen om tijdig de\
        \ benodigde uitbreiding van capaciteit te bewerkstelligen."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The availability requirement of an ICT asset and the impact
            of failure is determined on the basis of a risk analysis. Based on this,
            measures are determined such as automatic mechanisms to accommodate for
            the failure of (primarily physical) ICT assets, including connections.
            The ICT assets meet the level of Availability agreed for the services.
            Provisions have been implemented to safeguard the Availability of components
            (e.g. checks that a component is present and measurements that determine
            the use of a component). On the basis of predicted use, action is taken
            in good time to put into effect any necessary extension to the capacity.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.8
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:3
      ref_id: 4.8.8
      description: Er zijn beperkingen opgelegd aan gebruikers en systemen ten aanzien
        van het gebruik van gemeenschappelijke middelen, zodat een enkele gebruiker
        (of systeem) niet meer van deze middelen kan opeisen dan nodig is voor de
        uitvoering van zijn of haar taak en daarmee de Beschikbaarheid van systemen
        voor andere gebruikers (of systemen) in gevaar kan brengen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Restrictions are imposed on users and systems with regard to
            the use of shared resources to ensure a single user (or system) cannot
            demand more of these resources than is necessary for his/her task and
            thus jeopardise the Availability of the systems for other users (or systems).
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.9
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:3
      ref_id: 4.8.9
      description: In koppelpunten met externe of onbetrouwbare segmenten zijn maatregelen
        getroffen om onder andere DOS / DDOS ((Distributed) Denial of Service attacks)
        aanvallen te signaleren en hierop te reageren. Het gaat hier om aanvallen
        die erop gericht zijn de verwerkingscapaciteit zodanig te laten vollopen,
        dat onbereikbaarheid of uitval van computers het gevolg is .
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: At connection points with external or untrusted segments, measures
            have been taken to signal attacks including DOS/DDOS ((Distributed) Denial
            of Service attacks) and respond to them. These attacks intend to overload
            the processing capacity so the computers cannot be accessed or fail.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Scheiding van ontwikkel-, test- en productieomgevingen
      translations:
        en:
          name: Separation of development, testing and production environments
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.10
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      ref_id: 4.8.10
      description: "Er zijn gescheiden omgevingen voor Ontwikkeling, Test, Acceptatie\
        \ en Productie (OTAP). De systemen en applicaties in deze omgevingen be\xEF\
        nvloeden systemen en applicaties in andere omgevingen niet."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There are separate environments for Development, Testing, Acceptance
            and Production (DTAP). The systems and applications in these environments
            do not influence the systems and applications in the other environments.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.11
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      ref_id: 4.8.11
      description: Er is een fysieke scheiding aanwezig tussen de ontwikkel- en testomgeving
        (OT-omgeving) enerzijds en acceptatie- en de productieomgeving (AP-omgeving)
        anderzijds.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      translations:
        en:
          description: There is a physical divide between the development and testing
            environment on the one hand (DT environment) and the acceptance and production
            (AP environment) on the other hand
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.12
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      ref_id: 4.8.12
      description: Gebruikers hebben gescheiden gebruiksprofielen voor Ontwikkeling,
        Test, Acceptatie en Productiesystemen om het risico van fouten te verminderen.
        Het moet duidelijk zichtbaar zijn in welk systeem gewerkt wordt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Users have separate user profiles for the Development, Testing,
            Acceptance and Production systems to reduce the risk of error. It is clearly
            visible in which system work is being carried out.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.13
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      ref_id: 4.8.13
      description: Indien er een experimenteer- of laboratorium omgeving is, is deze
        fysiek gescheiden van de andere omgevingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: If there is an experimental or laboratory environment, it is
            physically separated from the other environments.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.14
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      ref_id: 4.8.14
      description: De scheiding tussen Ontwikkel-, Test-, Acceptatie- en Productiesystemen
        (OTAP-systemen) is ondersteund door formele overdrachtsprocedures.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The separation of the Development, Testing, Acceptance and
            Production systems (DTAP systems) is supported by formal handover procedures.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.15
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:4
      ref_id: 4.8.15
      description: Gegevens uit de productieomgeving zijn alleen in de Acceptatieomgeving
        in gebruik wanneer deze op dezelfde wijze beveiligd zijn als in de productieomgeving.
        Deze gegevens zijn niet in een Ontwikkel- of Testomgeving gebruikt.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Data from the Production environment are only used in the Acceptance
            environment if it is secured in the same way as the Production environment.
            This data is not used in the Development or Testing environment.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Beheersmaatregelen tegen Malware
      translations:
        en:
          name: Measures of control against Malware
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.16
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.16
      description: "Bij het openen van bestanden zijn deze geautomatiseerd gecontroleerd\
        \ op Malware. De update voor de detectiedefinities vindt frequent, minimaal\
        \ \xE9\xE9n keer per dag, plaats."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: When opening files, these are automatically checked for Malware.
            The update for the detection definitions is carried out frequently, i.e.
            at least once a day.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.17
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.17
      description: "Inkomende en uitgaande e-mails zijn gecontroleerd op Malware.\
        \ De update voor de detectiedefinities vindt frequent, minimaal \xE9\xE9n\
        \ keer per dag, plaats."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Incoming and outgoing emails are checked for Malware. The update
            for the detection definitions is carried out frequently, i.e. at least
            once a day.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.18
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.18
      description: Bestanden op een bestandssysteem, zowel server- als hostbased zijn
        automatisch gescand op Malware. Bij het aantreffen van Malware zijn deze in
        quarantaine geplaatst.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Files on file systems, whether server-based or host-based,
            are automatically scanned for Malware. Upon the detection of Malware,
            these files are placed in quarantine.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.19
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.19
      description: In verschillende schakels van een keten binnen de infrastructuur
        van een organisatie is anti-Malware programmatuur van verschillende leveranciers
        toegepast.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Anti-Malware software from several different suppliers has
            been applied to various links of the chain within the infrastructure of
            an organisation.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.20
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.20
      description: Er zijn maatregelen getroffen om verspreiding van Malware tegen
        te gaan en daarmee schade te beperken (bijv. quarantaine en Compartimentering).
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Measures have been taken to combat the spread of Malware and
            thus limit the damage (e.g. quarantine and Compartmentalisation)
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.21
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.21
      description: "Er zijn continu\xEFteitsplannen voor herstel na aanvallen met\
        \ Malware waarin minimaal maatregelen voor back-ups en herstel van gegevens\
        \ en programmatuur zijn beschreven."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: There are continuity plans for recovery after Malware attacks
            in which minimum measures for back-ups and recovery of data and software
            are described.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.22
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.22
      description: Gebruikers controleren alle van externen verkregen of door externen
        gebruikte digitale gegevensdragers met speciaal voor dit doel ingerichte Scrubber-functionaliteiten.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Users check all digital data carriers obtained from external
            parties or used by external parties using special Scrubber functionalities
            set up for this purpose.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.23
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:5
      ref_id: 4.8.23
      description: "Afwijkingen van het normbeeld (anomalies) met betrekking tot sessies\
        \ door perimeter devices zijn onderzocht op dreigingen zoals  \"covert channels\"\
        . Monitoring op ongebruikelijke creaties, aanwezigheid en/of be\xEBindiging\
        \ van processen teneinde infiltratie te onderkennen, vindt continu plaats."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: "Deviations from the norm (anomalies) regarding perimeter-device\
            \ sessions are investigated for threats such as \u201Ccovert channels.\
            \ There is constant Monitoring for unusual creations and the presence\
            \ and/or termination of processes for the purpose of detecting infiltration."
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Back-up van informatie
      translations:
        en:
          name: Back up of information
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.24
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.24
      description: Er zijn geteste procedures voor back-up en recovery van informatie
        voor herinrichting en foutherstel van verwerkingen.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Tested procedures are in place for back-up and recovery of
            information to reestablish processing and correct errors.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.25
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.25
      description: "Back-upstrategie\xEBn zijn vastgesteld op basis van het soort\
        \ gegevens (bestanden, databases, enz.), de maximaal toegestane periode waarover\
        \ gegevens verloren mogen raken, en de maximaal toelaatbare back-up- en hersteltijd."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Back-up strategies are determined on the basis of data type
            (files, databases, etc.), the maximum permitted period for which data
            may be lost, and the maximum permitted back-up and recovery time.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.26
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.26
      description: Van back-upactiviteiten en de verblijfplaats van gegevensdragers
        is een registratie bijgehouden.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: A log is kept of back-up activities and the location of data
            carriers.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.27
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.27
      description: Back-ups zijn bewaard op een locatie die zodanig is gekozen dat
        een incident op de oorspronkelijke locatie niet leidt tot schade aan de back-up.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Back-ups are kept at a location that has been chosen on the
            basis of the fact that an incident at the original location will not damage
            the back-up.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.28
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.28
      description: De fysieke en logische toegang tot de back-ups, zowel van systeemschijven
        als van data, is zodanig geregeld dat alleen geautoriseerde personen zich
        toegang kunnen verschaffen tot deze back-ups.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The physical and logical access to back-ups, of both system
            drives and data, is arranged in such a way that only authorised persons
            can gain access to these back-ups.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.29
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.29
      description: Back-ups zijn beveiligd conform de hoogste Rubricering van de gegevens.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Back-ups are secured in accordance with the highest Classification
            of the data.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.30
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:6
      ref_id: 4.8.30
      description: "Back-ups zijn minimaal \xE9\xE9n jaar en maximaal voor de duur\
        \ van een project opgeslagen."
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Back-ups are saved at least a year and are kept for no longer
            than the duration of the project.
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:7
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Gebeurtenissen registreren
      translations:
        en:
          name: Registering events
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.31
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:7
      ref_id: 4.8.31
      description: Per systeem zijn gebeurtenissen vastgelegd in de Logging. Zie bijlage
        voor de op te nemen gegevens. Op basis van risicoanalyse is vastgesteld welke
        aanvullende Logging noodzakelijk is. Deze Logging kan context-specifiek zijn.
        In het Beveiligingsplan zijn de resultaten van de analyse verwerkt/vastgelegd.
      annotation: 'Verwijzing : Bijlage 33'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: Per system events are recorded in the Log. See the appendix
            for the information to be recorded. Any additional information to be logged
            is determined on the basis of a risk analysis. This Log may be context
            specific. The results of the analysis are included/recorded in the Security
            Plan.
          annotation: 'Reference: Appendix 33'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.32
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:7
      ref_id: 4.8.32
      description: Er is vastgelegd bij welke drempelwaarden meldingen en alarmoproepen
        zijn gegenereerd.
      annotation: 'Verwijzing : Bijlage 33'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: The threshold values for alerts and alarms are generated.
          annotation: 'Reference: Appendix 33'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.33
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:7
      ref_id: 4.8.33
      description: 'Controle op opslag van Logging: het vollopen van het opslagmedium
        voor de logbestanden boven een bepaalde grens is gelogd en leidt tot automatische
        alarmering van IT-beheer. Dit geldt ook als het bewaren van loggegevens niet
        (meer) mogelijk is (bijv. een logserver die niet bereikbaar is).'
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
          description: 'Monitoring of log storage: if the capacity of means of storage
            for log files exceeds a certain amount, the IT administrators are alerted
            automatically. This also applies if saving log data is not or is no longer
            possible (e.g. because a log server cannot be accessed/is no longer available).'
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8:8
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8
      name: Beschermen van informatie in logbestanden
      translations:
        en:
          name: Protecting information in log files
    - urn: urn:intuitem:risk:req_node:abdo_2019:4.8.34
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:abdo_2019:4.8:8
      ref_id: 4.8.34
      description: Het (automatisch) overschrijven of verwijderen van logbestanden
        is gelogd in de nieuw aangelegde log.
      implementation_groups:
      - '1'
      - '2'
      - '3'
      - '4'
      translations:
        en:
