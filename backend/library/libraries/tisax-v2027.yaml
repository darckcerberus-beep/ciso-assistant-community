    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:1
      description: + Unauthorized access to objects/ security areas is not possible.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:1
      description: + Easily accessible windows, doors, and other components are designed
        to prevent break-ins using simple tools such as screwdrivers and pliers for
        a minimum period of three minutes.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.3:2
      description: + Solid construction (e.g. masonry, concrete, reinforced concrete,
        or prestressed concrete). If the outer skin is not solid, risk mitigating
        measures must be in place and evidence of a risk-based decision to maintain
        an insubstantial barrier must exist.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2
      ref_id: 8.2.4
      name: To what extent is view and sight protection ensured in defined security
        areas?
      description: It must be ensured that unauthorized viewing of vehicles, components
        or parts classified as requiring protection is prevented.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:1
      description: + Unauthorized viewing of new developments needing high or very
        high protection is not possible.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:2
      description: + Sight protection through relevant glass surfaces is ensured.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:2
      description: + View into defined security areas through open doors/gates/windows
        is prevented.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.4
      name: Further information
      description: "In the case of prototype parts, it must be possible to prevent\
        \ anyone from seeing the parts at any time. Workstations must be designed\
        \ in such a way that they cannot be seen from the outside (covering/partition\
        \ walls/fabric). Privacy screens must be designed in such a way that they\
        \ cannot be easily manipulated from outside (e.g., external blinds on the\
        \ ground floor are not sufficient, but are acceptable on higher floors). \n\
        In the case of complete vehicles or vehicle superstructures, visibility must\
        \ be permanently prevented.\n Content displayed on monitors, projectors, etc.\
        \ must not be visible from outside."
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2
      ref_id: 8.2.5
      name: To what extent is the protection against unauthorized entry regulated
        in the form of access control?
      description: It must be ensured that all points of access to security areas
        where vehicles, components or parts classified as requiring protection are
        manufactured, processed, or stored are protected against unauthorized entry
        by  appropriate and effective measures.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5:1
      description: '+ At least one of the following three requirements must be met:
        Mechanical security locking units with documented key assignment, or electronic
        access systems with documented authorization assignment, or personal access
        control including documentation with access and exit times.'
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.5
      name: Further information
      description: "A security locking unit offers increased protection against unauthorised\
        \ opening \u2013 i.e. against breaking, drilling, lockpicking or manipulation.\
        \ \nThe closure may only be reproduced by authorised persons.\n\nThe documented\
        \ access and exit times must be provided with a maximum storage period, taking\
        \ into account country-specific legal provisions on data protection."
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2
      ref_id: 8.2.6
      name: To what extent are the premises to be secured monitored for intrusion?
      description: It must be ensured that premises where vehicles, components or
        parts classified as requiring protection are manufactured, processed, or stored
        are monitored for intrusion.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1
      description: + An intrusion detection system exists with alarm tracking to a
        qualified security service or control center (e.g. according to DIN 77200,
        VdS 3138), or 24/7 guarding by a qualified security service.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1
      description: + Alarm plans are available.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:1
      description: + Timely alarm processing is ensured.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.6
      name: Further information
      description: As a rule, an alarm intervention must take place within a maximum
        of twenty minutes.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.7
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2
      ref_id: 8.2.7
      name: To what extent is on-site client segregation existent?
      description: In order to ensure protection of the client-specific know-how at
        all times, a clear segregation of clients must be ensured. This particularly
        involves protection against unauthorized viewing and access to areas where
        vehicles, components or parts classified as requiring protection are processed
        or stored.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.7:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.7
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.7:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.7:1
      description: "+ There is a spatial separation through personnel, organizational\
        \ or technical measures.  The following aspects are considered:\n  - Customers,\
        \ and/or\n  - Projects,\n  - Where segregation is not in effect, explicit\
        \ approval by the customer is required."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9
      assessable: false
      depth: 1
      ref_id: '9'
      name: Data Protection
      description: This tab supplements the Information Security tab on information
        security with data protection. In order to obtain an effective TISAX assessment
        of data protection, the information security questionnaire must be also assessed.
        Therefore, an isolated assessment of the data protection module cannot lead
        to a TISAX label.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.1'
      name: Data Protection Policies
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.1.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.1
      ref_id: 9.1.1
      name: To what extent do data protection policies exist?
      description: The organization needs at least one policy on privacy. This reflects
        the importance and significance of data protection and is adapted to the organization.
        Other policies may be appropriate depending on the size and structure of your
        organization.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.1.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.1.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.1.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.1.1:1
      description: + A policy is created, regularly updated, and approved by the organization's
        management.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.2'
      name: Organization of Data Protection
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2
      ref_id: 9.2.1
      name: To what extent are the responsibilities for data protection organized?
      description: Successful data protection requires clear responsibilities in the
        organization.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      description: "+ A data protection officer is appointed, if required by Art.\
        \ 37 GDPR\n - Determination of whether the appointment of a data protection\
        \ officer is voluntary or mandatory\n - otherwise determination of a data\
        \ protection function or comparable"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      description: + Publication of contact details (e.g. on the Internet)
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      description: + Integration into the organization's structure
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      description: + Exercise of the control obligations as defined in Art. 39 (1)
        (b) GDPR and corresponding documentation
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      description: + Documentation of the data protection status and report to organization's
        top management
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.2.1:1
      description: "+ Equipped with sufficient capacities and resources\n - Determination\
        \ of whether the data protection function is full-time or part-time\n - adequate\
        \ professional qualification\n - regular professional training\n - access\
        \ to specialist literature\n - support of the data protection officer by data\
        \ protection coordinators in the companies organizational units, depending\
        \ on the company size (e.g. marketing, sales, personnel, logistics, development,\
        \ etc.)"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.3'
      name: Processing directory
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.3.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.3
      ref_id: 9.3.1
      name: To what extent are processing activities identified and recorded?
      description: The company fulfils its duty of accountability and transparency
        and thus creates an overview of the respective data processing.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.3.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.3.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.3.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.3.1:1
      description: "+ If required by law, a register of processing activities as defined\
        \ in Article 30 (1) and/or (2) GDPR (in the latter case only information relating\
        \ to the order, expressly not other information/details on internal processing)\
        \ exists and is up to date.\n  - Technical and organizational measures required\
        \ for processing as required by the information security questionnaire are\
        \ adequatly implemented for the processing activities\n  - There is a process\
        \ description / sequence description with defined responsibilities."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.4'
      name: Data protection impact assessment
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.4
      ref_id: 9.4.1
      name: To what extent is adequate handling of high-risk processing activities
        ensured (data protection impact assessment)?
      description: The handling of high-risk processing is secured in cooperation
        with the service provider with appropriate measures to identify and, if necessary,
        reduce risks to the rights and freedoms of the data subjects.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1:1
      description: + Processing activities that require a data protection impact assessment
        are known.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.4.1:1
      description: "+ Data protection impact assessments are carried out.\n  - Responsibilities/tasks\
        \ and support possibilities in the context of data protection impact assessments\
        \ are defined and known."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.5'
      name: Data transfers
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5
      ref_id: 9.5.1
      name: To what extent is the transfer of data managed?
      description: The company knows and secures data transmissions.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.1:1
      description: "+ Appropriate processes and workflows for the transmission of\
        \ data are implemented (e.g. valid contracts within the meaning of Art. 28\
        \ GDPR, suitable transfer instruments like standard contractual clauses, transfer\
        \ impact assessments, adequacy decisions)\n  - Ensuring the consent or the\
        \ right of objection of the person responsible for subcontracting"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5
      ref_id: 9.5.2
      name: To what extent are contractual obligations passed through to and enforced
        at subcontractors and cooperation partners?
      description: The company is aware of and secures data transfers to subcontractors.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2:1
      description: + Applicable contractual obligations to clients are passed on to
        subcontractors and cooperation partners (sub processors).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.2:1
      description: "+ Compliance with contractual agreements is reviewed.\n  - Contact\
        \ details of the contact persons of the subcontractor are available and up\
        \ to date."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5
      ref_id: 9.5.3
      name: To what extent are data transfers to third countries managed?
      description: The company is aware of and secures data transfers to third countries.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1
      description: "+ Transfers to third countries are known and systematically recorded.\n\
        \  - e.g. through corresponding documentation in the processing directory"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1
      description: + Sufficient guarantees (Chapter V GDPR, consideration of decisions
        of the ECJ on international data transfer, Transfer Impact Assessment in case
        of relevance, especially in the role of data exporter) are available for data
        transfers.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.5.3:1
      description: + In the case of data transfers to third countries, it is determined
        whether the consent of the person responsible is to be obtained for each transfer
        to third countries.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.6'
      name: Handling requests and incidents
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6
      ref_id: 9.6.1
      name: To what extent are data subject requests processed?
      description: The objective is to ensure the timely processing and fulfilment
        of data subject requests in order to secures the rights of data subjects guaranteed
        by law.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.1:1
      description: "+ Requests from data subjects are processed in a timely manner.\n\
        \  - Procedures are in place to assist the controller in responding to data\
        \ subject requests.\n  - Employees are trained to the effect that they must\
        \ immediately contact the respective person responsible in the event of an\
        \ incoming request from a data subject and coordinate the further procedure\
        \ with this person."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6
      ref_id: 9.6.2
      name: To what extent are data protection incidents processed?
      description: The objective of processing data protection incidents is to ensure
        that possible damage to the data subjects is limited and that a recurrence
        is prevented. In addition, the legally required documentation and, if necessary,
        timely reporting to the supervisory authority must be ensured.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1
      description: + Data protection incidents (e.g. unauthorized access to personal
        data) are processed in a timely manner.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1
      description: + The requirements from 1.6 of the information security questionnaire
        also take into account data protection incidents or, alternatively, there
        is an emergency plan for dealing with data protection incidents.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.6.2:1
      description: "+ In addition, procedures are established and documented to ensure\
        \ the following aspects:\n  - immediate notification to the respective responsible\
        \ person, as far as his order is affected\n  - Documentation of the incident\
        \ handling activities\n  - Training of employees on the defined measures/processes\n\
        \  - Support of the respective controller in the processing of data protection\
        \ incidents"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.7'
      name: Human Resources
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.7
      ref_id: 9.7.1
      name: To what extent are employees obliged to maintain confidentiality?
      description: Organizations are subject to laws, regulations, and internal policies.
        For employment (hiring/implementation/termination), it is important that employees
        commit to compliance with the guidelines.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.1:1
      description: "+ Employees whose tasks include the processing of personal data\
        \ are obliged to maintain confidentiality (even beyond the duration of the\
        \ employment relationship) and to comply with applicable data protection laws.\n\
        \  - The obligation is documented"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.7
      ref_id: 9.7.2
      name: To what extent are employees trained in data protection?
      description: If the requirements and risks of data protection are not known
        to employees, there is a risk that employees will behave incorrectly and thus
        damage the organization. It is therefore important that data protection is
        internalized and lived as a natural part of their work.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.7.2:1
      description: "+ Employees are trained and sensitized.\n  - Scope, frequency,\
        \ and content of the training is determined according to the protection needs\
        \ of the data\n  - Employees in critical areas (e.g. IT administrators) are\
        \ instructed and trained specifically for their work (e.g. specific training\
        \ courses or instructions, short videos, etc.)."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.8
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9
      ref_id: '9.8'
      name: Instructions
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.8
      ref_id: 9.8.1
      name: To what extent are instructions of processing relationships handled?
      description: The orderly and defined handling of instructions with regard to
        the processing of the controller is intended to ensure that the tasks of the
        processor are fulfilled, and that the processor fulfils the planned and contractually
        agreed obligations (in particular also to determine a possible exceeding of
        the contractually agreed framework).
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1:1
      description: + The instructions by the controller regarding the processing of
        personal data are handled.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:9.8.1:1
      description: "+ Procedures and measures are in place to ensure that:\n - Received\
        \ instructions are documented\n - Instructions can be implemented (e.g. procedures\
        \ for correcting, deleting, ...)\n - Data is separated by client and specific\
        \ order or project"
      implementation_groups:
      - must
