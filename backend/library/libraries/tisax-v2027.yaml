      name: Further information
      description: 'Corresponding provisions can be included in the following, for
        example:

        - Authors'' rights

        - Cryptography

        - Copyright

        - Intellectual property

        - Archiving

        - Information security legislation

        - Data protection

        - Trade Secrets Act

        - Contractually agreed provisions (GTC, terms and conditions of purchase,
        framework contracts, individual contracts)'
    - urn: urn:intuitem:risk:req_node:tisax-v2027:7.1.2
