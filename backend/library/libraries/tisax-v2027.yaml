packager: intuitem
objects:
  framework:
    urn: urn:intuitem:risk:framework:tisax-v2027
    ref_id: TISAX v2027
    name: Trusted Information Security Assessment Exchange (TISAX) v2027
    description: "ISA provides the basis for\n- a self-assessment to determine the\
      \ state of information security in an organization (e.g. company)\n- audits\
      \ performed by internal departments (e.g. Internal Audit, Information Security)\n\
      - TISAX\u24C7 Assessments (Trusted Information Security Assessment Exchange,\
      \ https://enx.com/tisax/)\nSource: https://enx.com/en-US/TISAX/downloads/"
    min_score: 0
    max_score: 5
    scores_definition:
    - score: 0
      name: Incomplete
      description: A process is not available, not followed or not suitable for achieving
        the objective.
    - score: 1
      name: Performed
      description: An undocumented or incompletely documented process is followed
        and indicators exist that it achieves its objective.
    - score: 2
      name: Managed
      description: A process achieving its objectives is followed. Process documentation
        and process implementation evidence are available.
    - score: 3
      name: Established
      description: A standard process integrated into the overall system is followed.
        Dependencies on other processes are documented and suitable interfaces are
        created. Evidence exists that the process has been used sustainably and actively
        over an extended period.
    - score: 4
      name: Predictable
      description: An established process is followed. The effectiveness of the process
        is continually monitored by collecting key figures. Limit values are defined
        at which the process is considered to be insufficiently effective and requires
        adjustment. (Key Performance Indicators)
    - score: 5
      name: Optimizing
      description: A predictable process with continual improvement as a major objective
        is followed. Improvement is actively advanced by dedicated resources.
    implementation_groups_definition:
    - ref_id: must
      name: Requirements (must)
      description: Strict requirements without any exemptions.
    - ref_id: should
      name: Requirements (should)
      description: Must be implemented by the organization. In certain circumstances,
        however, there may be a valid justification for non-compliance with these
        requirements. In case of any deviation, its effects must be understood by
        the organization and it must be plausibly justified.
    - ref_id: high
      name: In case of high protection needs
      description: Must additionally be met if the tested subject has high protection
        needs.
    - ref_id: very_high
      name: In case of very high protection needs
      description: Must additionally be met if the tested subject has very high protection
        needs.
    - ref_id: SGA
      name: For Simplified Group Assessments (SGA)
      description: A simplified way to audit very large organizations with a high
        maturity. An example is the TISAX Simplified Group Assessment mechanism that
        is an option for TISAX Assessments of an assessment scope with a large number
        of sites.
    - ref_id: vehicle
      name: For vehicles classified as requiring protection
      description: Protects physical prototypes which are classified as requiring
        protection. Prototypes include vehicles, components and parts. The owner of
        the intellectual property for the prototype is considered the owner of the
        prototype. The owner's commissioning department is responsible for classifying
        the protection need of a prototype. For prototypes classified as requiring
        high or very high protection, the minimum requirements for prototype protection
        must be applied.
    requirement_nodes:
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1
      assessable: false
      depth: 1
      ref_id: '1'
      name: IS Policies and Organization
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1
      ref_id: '1.1'
      name: Information Security Policies
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1
      ref_id: 1.1.1
      name: To what extent are information security policies available?
      description: The organization needs at least one information security policy.
        A good policy reflects the importance and significance of information security
        and is adapted to meet the needs of the organization. Additional policies
        may be appropriate depending on the size and structure of the organization.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1
      description: "+ The requirements for information security have been determined,\
        \ documented and adapted to the organization\u2019s goals."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1
      description: "+ A policy exists, and is approved by the organization\u2019s\
        \ management."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1
      description: + The policy includes objectives and the significance of information
        security within the organization.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1
      description: + The policies are made available to employees in a suitable form
        (e.g., intranet).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:1
      description: + Employees and external business partners are informed of any
        changes relevant to them.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2
      description: + The information security requirements are based on the strategy
        of the organization. Legislation and contracts are considered in the policy.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2
      description: + The policy indicates consequences in case of non-conformance.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2
      description: + Other relevant security policies are established.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:2
      description: + Periodic review and, if required, revision of the policies are
        established.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1
      name: (for Simplified Group Assessments)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.1.1:3
      description: + Policies are published and implemented in the entire assessment
        scope.
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1
      ref_id: '1.2'
      name: Organization of Information Security
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2
      ref_id: 1.2.1
      name: To what extent is information security managed within the organization?
      description: "Organizations create sustainable information security by including\
        \ it as a part of their strategic goals. The information security management\
        \ system (ISMS) is a control mechanism used by the organization\u2019s management\
        \ to ensure that information security is the result of sustainable management\
        \ rather than coincidence and individual effort."
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      description: + The scope of the ISMS (the organization managed by the ISMS)
        is defined.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      description: + The organization's requirements for the ISMS are determined.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      description: + The organizational management has commissioned and approved the
        ISMS.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      description: "+ The ISMS provides the organization\u2019s management with suitable\
        \ monitoring and control means (e.g., management review)."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      description: + Applicable controls have been determined (e.g., ISO 27001 Statement
        of Applicability, or completed ISA catalogue).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:1
      description: + The effectiveness of the ISMS is regularly reviewed by the management.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1
      name: (for Simplified Group Assessments)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.1:2
      description: + The management system is approved by an entity that has the necessary
        authority for the entire assessment scope (i.e., all locations within the
        scope).
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2
      ref_id: 1.2.2
      name: To what extent are information security responsibilities organized?
      description: A successful ISMS requires clear responsibilities within the organization.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1
      description: + Responsibilities for information security within the organization
        are defined, documented, and assigned.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1
      description: + The responsible employees are defined, qualified, and empowered
        for their task.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1
      description: + The required resources are available.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:1
      description: + The contact persons are known within the organization and to
        relevant business partners.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:2
      description: + There is a definition and documentation of an adequate information
        security structure within the organization.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:2
      description: + Security-relevant roles that are not part of the ISMS and are
        relevant for information security are considered
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:3
      description: + An appropriate organizational separation of responsibilities
        should be established in order to avoid conflict of interests (segregation
        of duties). (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2
      name: (for Simplified Group Assessments)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:4:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.2:4
      description: + A named person with overall responsibility for the management
        system exists and is available.
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2
      ref_id: 1.2.3
      name: To what extent are information security requirements considered in projects?
      description: For project implementation, it is important to consider the information
        security requirements. This applies to projects within the organization regardless
        of their type. By appropriately establishing the information security process
        in the project management procedures of the organization, any overlooking
        of requirements is prevented.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:1
      description: + Projects are classified while taking into account the information
        security requirements.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2
      description: + The procedure and criteria for the classification of projects
        are documented.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2
      description: + During an early stage of the project, risk assessment is conducted
        based on the defined procedure and repeated in case of changes to the project.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:2
      description: + For identified information security risks, measures are derived
        and considered in the project.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:3
      description: + The measures thus derived are reviewed regularly during the project
        and reassessed in case of changes to the assessment criteria. (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.2.3
      name: Further information
      description: 'Projects can be classified as follows

        - CIAA (Confidentiality, Integrity, Availability, Authenticity)

        - CIA (Confidentiality, Integrity, Availability)'
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1
      ref_id: '1.3'
      name: Asset Management
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3
      ref_id: 1.3.1
      name: To what extent are information assets identified and recorded?
      description: "It is important for each organization to understand what information\
        \ is critical to their business\u2019 function (e.g., business secrets, critical\
        \ business processes, know-how, patents). This information is referred to\
        \ as \u201Cinformation assets.\u201D\n\nTo protect this information sustainably,\
        \ a proper inventory of both the information assets and the supporting assets\
        \ (e.g., IT systems, services/IT services, employees) is essential."
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:1
      description: + Information assets and other assets where security is relevant
        to the organization are identified and recorded.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:1
      description: + The supporting assets processing the information assets are identified
        and recorded.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:2
      description: "+ A catalogue of the relevant information assets exists. The following\
        \ aspects are considered:\n  - The corresponding supporting assets are assigned\
        \ to each relevant information asset,\n  - A person responsible for these\
        \ information assets is assigned,\n  - The catalogue is subject to regular\
        \ review."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.1
      name: Further information
      description: "It is not necessary to list all information assets individually;\
        \ instead, categories can be established (e.g. master data of employees\_\u2013\
        \ responsible body: Human Resources)"
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3
      ref_id: 1.3.2
      name: To what extent are information assets classified and managed in terms
        of their protection needs?
      description: The objective of classifying information assets is the consistent
        determination of their protection needs. Once an organization determines the
        value of an information asset, and its protection needs, the asset can be
        classified according to its confidentiality, integrity, and availability.
        This enables the organization to implement adequate protective measures.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1
      description: + A consistent scheme for the classification of information assets
        regarding the protection goal of confidentiality is available.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1
      description: + Evaluation of the identified information assets is carried out
        according to the defined criteria, and assigned to the existing classification
        scheme.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:1
      description: + Specifications for the handling of supporting assets (e.g., identification,
        usage, transport, storage, return, deletion/disposal) depending on the classification
        of information assets are in place and implemented.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.2:2
      description: + The protection goals of integrity and availability are taken
        into consideration.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3
      ref_id: 1.3.3
      name: "To what extent is it ensured that only evaluated and approved external\
        \ IT services are used for processing the organization\u2019s information\
        \ assets?"
      description: Obtaining external IT services without proper consideration of
        information security places an organization at risk of cyber incidents. This
        is particularly common with IT services available online at little to no cost,
        as users may be able to obtain these services without following proper approval
        processes that consider information security.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:1
      description: "+ External IT services are not used without explicit assessment\
        \ and implementation of the information security requirements. The following\
        \ aspects are considered:\n  - Availability of a risk assessment of the external\
        \ IT services,\n  - Legal, regulatory, and contractual requirements."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:1
      description: + The external IT services have been harmonized with the protection
        need of the processed information assets.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2
      description: + Requirements regarding the procurement, commissioning and release
        associated with the use of external IT services are determined and fulfilled.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2
      description: + A procedure for release in consideration of the protection need
        is established.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2
      description: + External IT services and their approval are documented.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.3:2
      description: + It is verified at regular intervals that only approved external
        IT services are used.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3
      ref_id: 1.3.4
      name: "To what extent is it ensured that only evaluated and approved software\
        \ is used for processing the organization\u2019s information assets?"
      description: "Security issues in software place an organization\u2019s information\
        \ at risk. Therefore, organizations should oversee and appropriately manage\
        \ the software their work force uses for information processing."
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:1
      description: "+ Software is approved before installation or use. The following\
        \ aspects are considered:\n   - Limited approval for specific use-cases or\
        \ roles,\n   - Conformance to the information security requirements,\n   -\
        \ Software use rights and licensing,\n   - Source/reputation of the software."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:1
      description: + Software approval also applies to special purpose software such
        as maintenance tools.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2
      description: + The types of software such as firmware, operating systems, applications,
        libraries, device drivers to be managed are determined.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2
      description: + Repositories of managed software exist
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2
      description: + The software repositories are protected against unauthorized
        manipulation
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2
      description: + Approval of software is regularly reviewed
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:2
      description: + Software versions and patch levels are known
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4
      name: (for very high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:3
      description: + Additional requirements for software use (e.g., need for control
        or monitoring of usage) are determined (if any) (C, I, A)
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.3.4
      name: Further information
      description: 'The protection need of software can be derived from the intended
        use-case or from the design of the software. This means all software that
        do not have access to information with high or very confidentiality or integrity
        need and that does not run on systems that have high or very high availability
        requirements can be considered software with normal protection need. Additionally,
        software where the risk to information is limited by the fact that it is not
        designed to access relevant information and does not have elevated privilegies
        can be considered having a normal protection need.


        An organization might adopt the following policiy: For normal protection need
        software, a bulk-approval based on licensing terms and a well-known or otherwise
        sufficiently trusted distributor seems the appropriate solution. If the software
        in question is not available from trustworthy distributor, the organization
        will do a brief evaluation of the software functionality by testing the software
        for obvious undesired functionality such as adware or spyware by means of
        individual recherche and testing.


        Updated software will regularly inherit the approval of previous versions
        unless significant changes are detected.'
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1
      ref_id: '1.4'
      name: IS Risk Management
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4
      ref_id: 1.4.1
      name: To what extent are information security risks managed?
      description: Information security risk management aims at the timely detection,
        assessment and addressing of risks in order to achieve the protection goals
        of information security. It thus enables the organization to establish adequate
        measures for protecting its information assets under consideration of the
        associated prospects and risks. It is recommended to keep the information
        security risk management of an organization as simple as possible such as
        to enable its effective and efficient operation.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1
      description: + Risk assessments are carried out both at regular intervals and
        in response to events.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1
      description: + Information security risks are appropriately assessed (e.g.,
        for probability of occurrence and potential damage).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1
      description: + Information security risks are documented.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:1
      description: + A responsible person (risk owner) is assigned to each information
        security risk. This person is responsible for the assessment and handling
        of the information security risks.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2
      description: + A procedure is in place defining how to identify, assess and
        address security risks within the organization.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2
      description: + Criteria for the assessment and handling of security risks exist.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2
      description: + Measures for handling security risks and the persons responsible
        for these are specified and documented, a plan of measures or an overview
        of their state of implementation is followed.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.4.1:2
      description: + In case of changes to the environment (e.g., organizational structure,
        location, changes to regulations), reassessment is carried out in a timely
        manner.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.5
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1
      ref_id: '1.5'
      name: Assessments
