      ref_id: 8.2.1
      name: To what extent is a security concept available describing minimum requirements
        regarding the physical and environmental security for prototype protection?
      description: The necessary measures for prototype protection must be applied
        to and implemented on properties and facilities of suppliers, development
        partners and service providers. A security concept must be established by
        the respective operator. Implementation and observation of the physical and
        environmental security measures defined in the security concept must be ensured
        by the responsible operator.
