    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:1
      description: + An obligation to comply with the information security policies
        is in effect.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2
      description: + A non-disclosure obligation beyond the employment contract is
        in effect.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2
      description: + Information security aspects are considered in the employment
        contracts of the staff.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:2
      description: + A procedure for handling violations of said obligations is described.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2
      ref_id: 2.1.3
      name: To what extent is staff made aware of and trained with respect to the
        risks arising from the handling of information?
      description: If the requirements and risks of information security are not known
        to the employees, there is a risk of misconduct resulting in damage to the
        organization. Therefore, it is important that information security is internalized
        and practiced as a natural part of their work.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:1
      description: + Employees are trained and made aware.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2
      description: "+ A concept for awareness and training of employees is prepared.\
        \ The following aspects are considered:\n  - Information security policy,\n\
        \  - Reporting of information security events,\n  - Reaction to occurrence\
        \ of malware,\n  - Policies regarding user accounts and login information\
        \ (e.g., password policy),\n  - Compliance issues of information security,\n\
        \  - Requirements and procedures regarding the use of non-disclosure agreements\
        \ when sharing information requiring protection,\n  - Use of external IT services."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2
      description: + Target groups for training and awareness measures (i.e., people
        working in specific risk environments such as managers including organizational
        leaders, administrators, employees having access to customer networks, personnel
        in areas of manufacturing) are identified and considered in a training concept.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2:3
