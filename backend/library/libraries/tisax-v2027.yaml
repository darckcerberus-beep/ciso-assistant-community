    - urn: urn:intuitem:risk:req_node:tisax-v2027:6.1.1:5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:6.1.1
      name: Further information
      description: "Identification of contractors and specification of protection\
        \ needs and security requirements:\nIt is crucial for this evaluation whether\
        \ the contractor\u2019s work includes\n1) gaining access to information or\
        \ security zones of the company with normal protection needs regarding confidentiality;\
        \ or\n2) providing or being able to modify relevant information with normal\
        \ protection needs regarding integrity; or\n3) having relevant influence on\
        \ processes or IT systems with normal protection needs regarding availability\
        \ (comp. to internal or customer-related SLAs).\nTypical contractors with\
        \ normal protection needs are e.g. cleaning services for general areas, classic\
        \ logistics companies or maintenance staff.\n\nThe minimum requirements for\
        \ information security (in relation to the respective protection goal) should\
        \ be defined in a policy (e.g. information security policy for service providers).\
        \ These requirements can be based on the requirements of the ISA described\
        \ herein in addition to the company-specific requirements. This policy can\
        \ be supplemented according to the specific order.\n\nEnsuring implementation\
        \ by the contractor:\nThe security requirements should be made known to the\
        \ contractor, e.g. at procurement, in briefings (project meetings) by corresponding\
        \ documents (e.g. information security policy for service providers) or when\
        \ entering the premises (in case of contractors providing their services on\
        \ site). Compliance with the information security requirements should be contractually\
        \ fixed. At this point already, potential further subcontractors of the contractor\
        \ should also be considered, as relevant. This can be done by individual agreements\
        \ such as general terms and conditions of purchase, for example.  In many\
        \ cases, suppliers (e.g. IT service providers) already assure compliance with\
        \ security requirements in their standard contracts.\n\nIn order to ensure\
        \ compliance with the requirements in a suitable manner, simple mechanisms\
        \ should be established. This may include, for example:\n- The submission\
        \ of at least a self-disclosure confirmed by the management (e.g. ISA) or\
        \ an adequate attestation/certificate\n- The right to and execution of irregular\
        \ sampling and event-related inspections."
