      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.5
      ref_id: 1.5.2
      name: To what extent is the ISMS reviewed by an independent authority?
      description: Assessing the effectiveness of the ISMS from merely an internal
        point of view is insufficient. It is important that an independent and objective
        assessment is obtained at regular intervals and after fundamental changes.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.2
