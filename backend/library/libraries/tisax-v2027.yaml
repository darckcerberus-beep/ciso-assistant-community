      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:2
      description: "+ The following aspects are considered:\n  - Measures for travelling\
        \ (e.g., viewing by authorities),\n\_ - Measures for travelling to security-critical\
        \ countries."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:2:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:2
      description: + Employee awareness.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4
