      ref_id: 8.1.13
      name: ''
      description: '### To what extent is it ensured that vehicles, components, parts
        and relevant tools classified as in need of protection that are no longer
        needed are disposed of/ recycled/ returned in accordance with the client''s
        specifications?


        It is important for every organization that vehicles, components and parts
        classified as in need of protection are disposed of, recycled or returned
        after the use phase according to a specified process. This is to prevent them
        from falling into unauthorized hands or being disposed of as "standard waste".'
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.13:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.13
      name: (must)
