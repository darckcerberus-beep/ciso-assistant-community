      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:1
      description: "+ The requirements for mobile work are determined and fulfilled.\
        \ The following aspects are considered:\n  - Behavior in private surroundings\
        \ (e.g., working in a dedicated office at home or in a coworking space),\n\
        \  - Behavior in public surroundings (e.g., during travels, shared office\
        \ in a coworking space),\n  - Secure handling of and access to information\
        \ (in both electronic and paper form) while considering the protection needs\
        \ and the contractual requirements applying to private and public surroundings,\n\
        \  - Protection from theft in public surroundings.\n  - Measures to ensure\
        \ a secure access to organization\u2019s IT-services."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.4
      name: (should)
