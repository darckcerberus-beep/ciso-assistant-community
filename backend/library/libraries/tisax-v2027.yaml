      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:1
      description: + The identity of potential employees is verified (e.g. checking
        identity documents).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:2
      description: + The personal suitability of potential employees is verified by
        means of simple methods (e.g. job interview).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.5
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1
      ref_id: 8.1.5
      name: To what extent are non-disclosure agreements/obligations existent according
        to the valid contractual law?
      description: When transmitting information classified as requiring protection,
        it must be ensured that external organizations are obliged to meet the information
        security requirements and that the related necessary measures are implemented.
        The necessary legal basis for this obligation is provided by non-disclosure
        agreements. Hence, it must be ensured that information classified as requiring
        protection is transmitted only if such a non-disclosure agreement has been
        entered and is legally effective.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.5:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.5
      name: (must)
