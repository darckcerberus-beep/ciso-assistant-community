      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3
      ref_id: 3.1.1
      name: To what extent are security zones managed to protect information assets?
      description: Security zones provide physical protection of information assets.
        The more sensitive the information assets to be processed are the more protective
        measures are required.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1
      description: "+ A security zone concept including the associated protective\
        \ measures based on the requirements for the handling of information assets\
        \ is in place. The following aspects are considered:\n  - Physical conditions\
        \ (e.g., premises / buildings / spaces) in the definition of security zones,\n\
        \  - Delivery and shipping areas."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1
      description: + The defined protective measures are implemented.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:1
      description: + The code of conduct for security zones is known to all persons
        involved.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2
      description: + Procedures for allocation and revocation of access rights are
        established.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2
      description: + Visitor management policies (including registration and escorting
        of visitors) are defined.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2:3
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2
      description: + Policies for carrying along and using mobile IT devices and mobile
        data storage devices (e.g., registration before they are carried along, identification
        obligations) are defined and implemented.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2:4
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2
      description: + Network/infrastructure components (own or customer networks)
        are protected against unauthorized access.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2:5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:2
      description: + External properties used for storing and processing information
        assets are considered in the security zone concept (e.g. storage rooms, garages,
        workshops, test tracks, data processing centres).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:3:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:3
      description: + Protective measures against simple overhearing and viewing are
        implemented. (C)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1:4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.1
      name: Further information
      description: "For example, security zones can be represented as follows:\n-\
        \ Public (typical color coding in the security zone plan: grey): Public street,\
        \ parking lot without fences, company premises if no fencing is present, stairwell\
        \ in a house with several tenants.\n- Normal protection requirements (typical\
        \ color coding in the security zone plan: green) (e.g. internal data): Company\
        \ premises, if a complete fencing is given, reception areas, conference rooms,\
        \ corridors, general areas where every employee can stay, but these cannot\
        \ be entered from the public areas.\n- Special protection requirements (typical\
        \ color coding in the security zone plan: purple): Server room, infrastructure\
        \ switch and distribution rooms, chemical warehouse.\n\nExample of a zone\
        \ with normal protection requirements:\nThe following example contains selected\
        \ measures for an open-plan office of the shipping department, in which only\
        \ internal information such as shipping information, delivery notes and package\
        \ labels are produced and processed. The classification of the assets located\
        \ there has at most an \"internal character\".\n- Example of technical measures:\
        \ The open-plan office has not implemented any separate technical protection\
        \ measures.\n- Example of physical measures: The fa\xE7ade as well as doors\
        \ and windows are built in solid construction and thus enable a resistance\
        \ class against burglary according to RC 2 according to DIN EN 1627. Doors\
        \ to the open-plan office are open during the day so that every employee of\
        \ the company can enter the room at any time. In the evening the door is locked.\n\
        - Example of personnel measures: At night, a security service sporadically\
        \ carries out strip searches. An external cleaning company cleans the open-plan\
        \ office unattended outside regular working hours and uses its own keys.\n\
        - Example of organizational measures: Each employee of the open-plan office\
        \ has his own key. A ban on the use of company and private smartphones is\
        \ not pronounced. Employees can use these devices freely. A review of the\
        \ assigned access authorizations takes place sporadically. Employees are allowed\
        \ to leave documents such as delivery notes on the tables after work. Visitors\
        \ (and suppliers) may enter the area alone after registration and if necessary\
        \ and do not have to conclude an explicit confidentiality agreement in advance."
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3
