      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.13:1
      description: "+ There is a concept for dealing with classified vehicles, components\
        \ and parts and relevant tools reqiring protectionafter the use phase.  The\
        \ following aspects are considered:\n  - Specifications for disposal, recycling\
        \ or return are obtained from the respective client,\n  - Instruction of affected\
        \ employees about the requirements."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.13:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.13
