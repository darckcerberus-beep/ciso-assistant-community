      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.5
      ref_id: 1.5.1
      name: To what extent is compliance with information security ensured in procedures
        and processes?
      description: It is not sufficient to only define information security requirements
        and prepare and publish policies. It is important to regularly review their
        effectiveness.
