      ref_id: 7.1.1
      name: To what extent is compliance with regulatory and contractual provisions
        ensured?
      description: Non-compliance with legal, regulatory, or contractual provisions
        can create risks to the information security of customers and organization
        itself. Therefore, it is essential to ensure that these provisions are known
        and observed.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:7.1.1:1
