      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2
      description: + Training and awareness measures are carried out both at regular
        intervals and in response to events.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2:5
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.3:2
