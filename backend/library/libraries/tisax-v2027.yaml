      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2
      ref_id: 2.1.2
      name: "\u200BTo what extent is all staff contractually bound to comply with\
        \ information security policies?"
      description: Organizations are subject to legislation, regulations and internal
        policies. Already when hiring staff, it must be ensured that employees commit
        to compliance with the policies and are aware of the consequences of misconduct.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.2:1
