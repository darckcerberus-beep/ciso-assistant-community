      name: To what extent are incident management requirements regulated?
      description: Incidents that could interrupt or jeopardize the continuous protection
        of vehicles, components and parts classified as in need of protection can
        occur despite the security measures that have been implemented. In this case,
        competent, swift action is required to minimize the damage caused and implement
        appropriate measures in a timely manner.
