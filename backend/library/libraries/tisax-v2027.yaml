      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.5:1
      description: + Non-disclosure agreements between contractor and customer (company
        level), and with all employees and project members exist.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.5:1:2
