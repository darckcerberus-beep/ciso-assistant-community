    - urn: urn:intuitem:risk:req_node:tisax-v2027:8
      assessable: false
      depth: 1
      ref_id: '8'
      name: Prototype protection
      description: 'Prototype protection protects physical prototypes which are classified
        as requiring protection. Prototypes include vehicles, components, and parts.
        The owner of the intellectual property for the prototype is considered to
        be the owner of the prototype.

        The owner''s commissioning department is responsible for classifying the protection
        need of a prototype. For prototypes classified as requiring high or very high
        protection, the minimum requirements for prototype protection must be applied.'
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8
      ref_id: '8.1'
      name: Organizational requirements
      description: The requirements described in this section apply to all companies
        that manufacture or receive vehicles, components or parts classified as requiring
        protection.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1
      ref_id: 8.1.1
      name: To what extent are regulations for prototype protection defined within
        the organization and responsibilities established?
      description: Successful prototype protection requires regulations for implementation
        and clear responsibilities within the organization.
