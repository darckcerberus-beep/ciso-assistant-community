      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.1:2
      description: + An appropriate organizational separation of responsibilities
        should be established to avoid conflicts of interest (separation of functions).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1
      ref_id: 8.1.2
      name: To what extent are order-specific requirements and specifications for
        handling prototypes regulated?
      description: It is important that there is a common understanding of the division
        of responsibilities and that the implementation of all security requirements
        is ensured. Due to different client-specific requirements when dealing with
        prototypes, detailed coordination between the client and contractor is necessary
        in addition to the overarching implementation of measures to protect prototypes.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.2:1
      description: "+ For each relevant order and associated prototypes, order-specific\
        \ requirements are agreed with the customer and known to the relevant acting\
        \ employees. The following aspects are considered:\n  - Security classification\
        \ and associated security measures of the respective order,\n  - Specifications\
        \ for camouflage, including specifications for changes to camouflage,\n  -\
        \ Specifications and security concepts for the use of prototypes on test sites,\n\
        \  - Specifications for handling prototypes on public roads,\n  - Specifications\
        \ and security concepts for events with prototypes,\n  - Specifications and\
        \ security concepts for film/photo shoots with prototypes,\n  - Specifications\
        \ for the transport of the prototypes (incl. logistics specifications),\n\
        \  - Requirements for the use of subcontractors,\n  - Specifications for handling\
        \ prototype-relevant information on portable storage media."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1
      ref_id: 8.1.3
      name: To what extent do employees and project members evidently participate
        in training and awareness measures regarding the handling of prototypes?
      description: In trainings/awareness seminars on the subject of prototype protection,
        employees must obtain the necessary knowledge and skills for a security-conscious
        handling of vehicles, components and parts classified as requiring protection.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3
