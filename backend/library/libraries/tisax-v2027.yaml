      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:5.2.7:2
      description: "+ For a risk-based network segmentation. The following aspects\
        \ are considered:\n  - Limitations for connecting IT systems to the network,\n\
        \  - Use of security technologies,\n  - Performance, trust, availability,\
        \ security, and safety considerations\n  - Limitation of impact in case of\
        \ compromised IT systems,\n  - Detection of potential attacks and lateral\
        \ movement of attackers,\n  - Separation of networks with different operational\
        \ purpose (e.g., test and development networks, office network, manufacturing\
        \ networks),\n  - The increased risk due to network services accessible via\
        \ the internet,\n  - Technology-specific separation options when using external\
        \ IT services,\n  - Adequate separation between own networks and customer,\
        \ networks while considering customer requirements\n  - Detection and prevention\
        \ of data loss/leakage."
