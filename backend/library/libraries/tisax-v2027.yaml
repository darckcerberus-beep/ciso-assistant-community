      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.2:3
      description: + In case of fundamental changes, audits are conducted by an independent
        and appropriately qualified entity (i.e., external entities or special internal
        departments which are objective, competent and free from undue influence (independent)
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.2:3:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.2:3
      description: + Findings and implementation of corrective actions is tracked
        by the independent entity.
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1
      ref_id: '1.6'
      name: Incident and Crisis Management
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6
      ref_id: 1.6.1
      name: To what extent are information security relevant events or observations
        reported?
      description: Potential security events or observations are detected by anyone.
        It is vital that anyone can and knows when and how to report anything that
        one has observed and that has potential security implications (observations)
        or events so that the experts can decide if and how it needs to be handled.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1
      description: "+ A definition for a reportable security event or observation\
        \ exists and is known by employees and relevant stakeholders. The following\
        \ aspects are considered:\n  - Events and observations related to personnel\n\
        \  - Events and observations related to physical security (e.g., intrusion,\
        \ theft, unauthorized access to security zones, vulnerabilities in the security\
        \ zones)\n  - Events and observations related to IT and cyber security (e.g.,\
        \ vulnerable IT-systems, detected successful or unsuccessful attacks)\n  -\
        \ Events and observations related to suppliers and other business partners\
        \ (e.g., any incidents that can have negative effect on the security of own\
        \ organization)"
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1
      description: + Adequate mechanisms based on perceived risks to report security
        events are defined, implemented, and known to all relevant potential reporters
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:1
      description: + Adequate channels for communication with event reporters exist.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      description: + A common point of contact for event reporting exists.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      description: + Different reporting channels according to perceived severity
        (i.e., real time communication for significant events / emergencies in addition
        to asynchronous mechanisms such as tickets or email). are available
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      description: + Employees are obligated and trained to report relevant events.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      description: "+ Security event reports can also be submitted by external parties.\
        \ The following aspects are considered:\n  - Availability and communication\
        \ of a security event report channel for external parties,\n  -  Timely processing\
        \ of security event reports from external parties."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      description: + Mechanism to, and information how to, report incidents is accessible
        by all relevant reporters.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:2
      description: + A feedback procedure to reporters is established.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1
      name: (for very high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.1:3
      description: + Tests and exercises of event and observation reporting are conducted
        regularly. (C, I, A)
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6
      ref_id: 1.6.2
      name: To what extent are reported security events managed?
      description: Once security events are reported, it is vital that the handling
        of the events is managed. This means to ensure that the type and criticality
        of the reported event as well as the persons responsible are quickly identified
        to ensure that time-critical aspects can be handled in time. Once identification
        is done, ensuring that the responsible persons become aware and deal with
        the event within a reasonable time frame is necessary. Furthermore, if the
        event affects multiple different persons, or management also include coordinating
        communication is a important part of event management. Finally, if there are
        external (contractual or regulatory) reporting requirements, its important
        to ensure that these are also fulfilled in a professional way.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1
      description: + Reported events are processed without undue delay.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1
      description: + An adequate reaction to reported security events is ensured.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:1
      description: + Lessons learned are incorporated into continuous improvement.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2
      description: + During processing, reported events are categorized (e.g. by responsibility
        into personnel, physical and cyber), qualified (e.g., not security relevant,
        observation, suggested security improvement, security vulnerability, security
        incident) and prioritized (e.g., low, moderate, severe, critical).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2
      description: "+ Responsibilities for handling of events based on their category\
        \ are defined and assigned. The following aspects are considered:\n  - Coordination\
        \ of incidents and vulnerabilities across multiple categories,\n  - Qualification\
        \ and resources,\n  - Communication methods based on type and priority (e.g.,\
        \ non-time-critical communication, time-critical communication, emergency\
        \ communication),\n  - Absence-management."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:2
      description: + A strategy for reporting potentially criminal aspects of security
        incidents to relevant authorities when necessary or appropriate. (C, I, A).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3
      description: + Maximum response times based on class, category and severity
        are defined. (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3
      description: "+ Events not processed appropriately according to their priority\
        \ are escalated. The following aspects are considered: (C, I, A)\n  - Conditions\
        \ and thresholds (e.g., maximum reaction time before escalation),\n  - Mechanisms,\
        \ processes, and contacts for escalation,\n  - Escalation paths up to the\
        \ organization\u2019s top management."
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3
      description: + Lawful, regulatory, and contractual reporting obligations, and
        respective contact information are known. (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3
      description: "+ A communication strategy for security related events exists.\
        \ The following aspects are considered: (C, I, A)\n  - To whom to communicate\
        \ (e.g., shareholders, affected business partners and customers, other shareholders,\
        \ general public),\n  - When to communicate,\n  - Responsibilities for communication,\n\
        \  - Authorization and approval of communication,\n  - Legal and regulatory\
        \ restrictions of communication,\n  - What to communicate (e.g., prepared\
        \ templates and building blocks for specific scenarios),\n  - How to communicate\
        \ (e.g., communication channels)."
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:3
      description: "+ Procedures for response to supplier security incidents are established.\
        \ The following aspects are considered: (C, I, A)\n  - Analysis of the impact\
        \ on the own organization and invocation of appropriate internal mechanisms.\n\
        \  - The need for reporting according to own reporting procedures"
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2
      name: (for very high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:4:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:4
      description: "+ Handling of events in different categories and priorities is\
        \ regularly tested. The following aspects are considered: (A)\n  - Exercise\
        \ or simulation of rarely occurring categories and priorities,\n  - Exercise\
        \ or simulation include escalation mechanisms."
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:5
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2
      name: (for Simplified Group Assessments)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:5:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.2:5
      description: + Standard mechanisms to report and track relevant security events
        are established.
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6
      ref_id: 1.6.3
      name: To what extent is the organization prepared to handle crisis situations?
      description: A crisis situation occurs if exceptional situations (e.g., natural
        disasters, physical attacks, pandemics, exceptional social situations, cyber-attacks
        causing major infrastructure failures) are severely disrupting key business
        operations. In such cases, the main priority of the organization is to handle
        the situation as effectively as possible and recover as quickly as possible.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1
      description: + An appropriate plan to react to and recover from crisis situations
        exists and the required resources are available.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1
      description: + Responsibilities and authority for crisis management within the
        organization are defined, documented, and assigned.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:1
      description: + The responsible employees are defined and qualified for their
        task.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      description: + Methods to detect crisis situations are established. General
        indications for the existence or imminence of a crisis situation and specific
        predictable crisis are identified.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      description: + A procedure to invoke and/or escalate crisis management is in
        place.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      description: "+ Strategic goals and their priority in crisis situations are\
        \ defined and known to relevant personnel. The following aspects are considered:\n\
        \  - Ethical priorities (e.g., protection of life and health),\n  - Core business\
        \ processes (e.g., processes that ensure the survival of the organization),\n\
        \  - Appropriate information security."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      description: "+ A crisis management team is defined and approved. The following\
        \ aspects are considered:\n  - Management commitment,\n  - Composition (e.g.,\
        \ participation of all major functions of the organization including organization\
        \ leadership (management board), business operations (production), HR, information\
        \ security, corporate security, corporate emergency services, IT/cyber security,\
        \ communication, finance),\n  - Structure and roles,\n  - Competences of members,\n\
        \  - Expectation and authority,\n  - Decision making procedures."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      description: "+ Crisis policies and procedures are defined and approved. The\
        \ following aspects are considered:\n  - Exceptional authorities and decision-making\
        \ processes can be assigned beyond the crisis management team,\n  - Primary\
        \ and backup means of communication,\n  - Emergency operating procedures,\n\
        \  - Crisis-specific organizational structures (e.g., reporting, information\
        \ gathering, decision making),\n  - Crisis-specific functions, responsibilities,\
        \ and authority (including reporting),\n  - Crisis tools."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:2
      description: + Crisis planning is reviewed and updated regularly.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: "+ Relevant different potential crisis scenarios are identified.\n\
        The following aspects are considered:\n  - Crisis situations with unavailability\
        \ of key personnel (e.g. Health crisis, Kidnapping / accidents affecting organization\
        \ leadership),\n  - Crisis situations with unavailable of key physical resources\
        \ (e.g. fire or natural disasters at specific sites),\n  - Crisis situations\
        \ with outage of key infrastructure (e.g., outage of key communication channels,\
        \ complete outage of IT infrastructure)."
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: + Necessary resources and information to handle crisis (e.g., communication
        infrastructure, availability of necessary information such as contact information
        and relevant risks in different crisis situations) are identified. Appropriate
        measures to ensure availability of infrastructure or fallback planning and
        information considering different crisis scenarios are in place. (A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: "+ A communication strategy for crisis situations exists. The following\
        \ aspects are considered: (A)\n  - To whom to communicate (e.g., shareholders,\
        \ affected business partners and customers, other shareholders, general public),\n\
        \  - When to communicate,\n  - Responsibilities for communication,\n  - Authorization\
        \ and approval of communication,\n  - Legal and regulatory restrictions of\
        \ communication (e.g., stock corporation regulations),\n  - What to communicate\
        \ (e.g., prepared templates for statements, contact information and building\
        \ blocks for specific scenarios),\n  - Communication channels (e.g., Media\
        \ channels, social media),\n  - Methods to monitor communication,\n  - Instructions\
        \ and procedures for employees (in case of direct communication approaches\
        \ such as direct contact of employees by business partners)."
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: + The efficiency, feasibility, and appropriateness of the crisis
        planning is evaluated regularly. (A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: + Spot based testing of crisis planning is conducted ((e.g., simulation,
        table-top-exercises involving key personnel)(A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: "+ Relevant different potential crisis scenarios are identified.\
        \ The following aspects are considered: (A)\n  - Crisis situations with unavailability\
        \ of key personnel (e.g. Health crisis, Kidnapping / accidents affecting organization\
        \ leadership):\n  - Crisis situations with unavailable of key physical resources\
        \ (e.g. fire or natural disasters at specific sites)\n  - Crisis situations\
        \ with outage oaf key infrastructure (e.g. outage of key communication channels,\
        \ complete outage of IT infrastructure)"
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:7
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: "+ Necessary resources and information to handle crisis (e.g. communication\
        \ infrastructure, availability of necessary information such as contact information\
        \ and relevant risks in different crisis situations) are identified. (A)\n\
        \  - Appropriate measures to ensure availability of infrastructure or fallback\
        \ planning and information considering different crisis scenarios are in place"
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:8
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: "+ A communication strategy for crisis situations exists. The following\
        \ aspects are considered: (A)\n  - To whom to communicate (e.g., shareholders,\
        \ affected business partners and customers, other shareholders, general public)\n\
        \  - When to communicate\n  - Responsibilities for communication\n  - Authorization\
        \ and approval of communication\n  - Legal and regulatory restrictions of\
        \ communication (e.g., stock corporation regulations)\n  - What to communicate\
        \ (e.g., prepared templates for statements, contact information and building\
        \ blocks for specific scenarios)\n  - Communication channels (e.g., Media\
        \ channels, social media)\n  - Instruments to monitor communication\n  - Instructions\
        \ and procedures for employees (in case of direct communication approaches\
        \ such as direct contact of employees by business partners)"
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:9
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: + The efficiency, feasibility, and appropriateness of the crisis
        planning is evaluated regularly. (A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3:10
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:3
      description: + Spot based testing of crisis planning is conducted ((e.g., simulation,
        table-top-exercises involving key personnel). (A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3
      name: (for very high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:4:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.6.3:4
      description: + Crisis exercises and simulations involving all relevant persons,
        including decision makers are conducted regularly. (A)
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2
      assessable: false
      depth: 1
      ref_id: '2'
      name: "\u200BHuman Resources"
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2
      ref_id: 2.1.1
      name: To what extent is the qualification of employees for sensitive work fields
        ensured?
      description: Competent, reliable and trustworthy employees are essential for
        information security within the organization. Therefore, it is important to
        check the qualifications of potential employees (e.g., applicants) to an appropriate
        extent.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1
      name: (must)
