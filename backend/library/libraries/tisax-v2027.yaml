      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.1:3
      description: "+ A detailed internal audit plan and schedule is defined and followed.\
        \ The following aspects are considered:\n  - The entire assessment scope is\
        \ covered\n\_ - Internal audits are conducted regularly\n\_ - Results of internal\
        \ audits are tracked within the ISMS structures"
      implementation_groups:
      - SGA
    - urn: urn:intuitem:risk:req_node:tisax-v2027:1.5.2
      assessable: false
