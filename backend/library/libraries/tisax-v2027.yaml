      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.3
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.3:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.3:2
      description: + Disposal of supporting assets is conducted in accordance with
        one of the relevant standards (e.g. ISO 21964, at least security level 4).
        (C)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4
