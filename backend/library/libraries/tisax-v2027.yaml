      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3
      ref_id: 3.1.4
      name: To what extent is the handling of mobile IT devices and mobile data storage
        devices managed?
      description: Mobile IT devices (e.g., notebooks, tablets, smartphones) and mobile
        data storage devices (e.g., SD cards, hard drives) are generally used not
        only on the premises of an organization, but also in mobile applications.
        This presents an increased risk of loss, theft, etc.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:1:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:1
      description: "+ The requirements for mobile IT devices and mobile data storage\
        \ devices are determined and fulfilled. The following aspects are considered:\n\
        \_ - Encryption,\n\_ - Access protection (e.g., PIN, password),\n\_ - Marking\
        \ (also considering requirements for use in the presence of customers)."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:2
      description: + Registration of the IT devices.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:3:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:3.1.4:3
      description: + General encryption of mobile data storage devices or the information
        assets stored thereon. Where this is technically not feasible, information
        is protected by similarly effective measures. (C, I)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4
      assessable: false
      depth: 1
      ref_id: '4'
      name: "\u200BIdentity and Access Management"
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4
      ref_id: '4.1'
      name: "\u200BIdentity Management"
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1
      ref_id: 4.1.1
      name: To what extent is the use of identification means managed?
      description: To check the authorization for both physical access and electronic
        access, means of identification such as keys, visual IDs, or other physical
        access devices, as well as cryptographic tokens are often used. These security
        features are only reliable if the use of such identification means is handled
        adequately.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:1
      description: "+ The requirements for the handling of identification means over\
        \ the entire lifecycle are determined and fulfilled. The following aspects\
        \ are considered:\n\_ - Creation, handover, return and destruction,\n\_ -\
        \ Validity periods,\n\_ - Traceability,\n\_ - Handling of loss."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:2
      description: + Identification means can be produced under controlled conditions
        only.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.1:3
      description: + A strategy of blocking or invalidation of identification means
        in case of loss is prepared and implemented as far as possible. (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1
      ref_id: 4.1.2
      name: To what extent is the user access to IT services and IT systems secured?
      description: Only securely identified (authenticated) users are to gain access
        to IT systems. For this purpose, the identity of a user is securely determined
        by suitable procedures.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:1
      description: + The procedures for user authentication have been selected based
        on a risk assessment. Possible attack scenarios have been considered (e.g.,
        direct accessibility via the internet).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:1
      description: + State of the art procedures for user authentication are applied.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2
      description: '+ The user authentication procedures are defined and implemented
        based on the business-related and security-relevant requirements:'
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2
      description: + Users are authenticated at least by means of strong passwords
        according to proven and widely accepted practices.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:2
      description: + Superior procedures are used for the authentication of privileged
        user accounts (e.g., privileged access management, two-factor authentication).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:3
      description: + Depending on the risk assessment, authentication procedure and
        access control have been enhanced by supplementary measures (e.g., continuous
        access monitoring with respect to irregularities or use of strong authentication,
        automatic logout, disabling in case of inactivity, or brute force prevention).
        (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2
      name: (for very high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:4:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.2:4
      description: + Before gaining access to data of very high protection needs,
        users are authenticated by means of strong authentication (e.g., two-factor
        authentication) according to the state of the art. (C, I)
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1
      ref_id: 4.1.3
      name: To what extent are user accounts and login information securely managed
        and applied?
      description: Access to information and IT systems is provided via validated
        user accounts assigned to a person. It is important to protect login information
        and to ensure the traceability of transactions and accesses.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: + The creating, changing, and deleting of user accounts is conducted.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: + Unique and personalized user accounts are used.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: "+ The use of \u201Cshared accounts\u201D is regulated (e.g., restricted\
        \ to cases where traceability of actions is dispensable)."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: + User accounts are disabled immediately after the user has resigned
        from or left the organization (e.g., upon termination of the employment contract).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: + User accounts are regularly reviewed.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: + The login information is provided to the user in a secure manner.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1:7
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:1
      description: "+ A policy for the handling of login information is defined and\
        \ implemented. The following aspects are considered:\n  - No disclosure of\
        \ login information, not even to persons of authority, within the limits of\
        \ applicable law,\n  - No writing down or unencrypted storing of login information,\n\
        \  - Immediate changing of login information whenever potential compromising\
        \ is suspected,\n  - No use of identical login information for business and\
        \ non-business purposes,\n  - Changing of temporary or initial login information\
        \ following the 1st login,\n  - Requirements for the quality of authentication\
        \ information (e.g., length of password, types of characters to be used)."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + A basic user account with minimum access rights and functionalities
        is existent and used.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + Default accounts and passwords pre-configured by manufacturers
        are disabled (e.g., by blocking or changing of password).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + User accounts are created or authorized by the responsible body.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + Creating user accounts is subject to an approval process (four-eyes
        principle).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + User accounts of service providers are disabled upon completion
        of their task.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:6
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + Deadlines for disabling and deleting user accounts are defined.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:7
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + The use of default passwords is technically prevented.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:8
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + Where strong authentication is applied, the use of the medium
        (e.g., ownership factor) is secure.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:9
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + User accounts are reviewed at regular intervals. This also includes
        user accounts in customers' IT systems.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2:10
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.1.3:2
      description: + Interactive login for service accounts (technical accounts) is
        technically prevented.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4
      ref_id: '4.2'
      name: "\u200BAccess Management"
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2
      ref_id: 4.2.1
      name: To what extent are access rights assigned and managed?
      description: The management of access rights ensures that only authorized users
        have access to information and IT services. For this purpose, access rights
        are assigned to user accounts.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:1
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1
      name: (must)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:1:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:1
      description: "+ The requirements for the management of access rights (authorization)\
        \ are determined and fulfilled. The following aspects are considered:\n\_\
        \ - Procedure for application, verification, and approval,\n\_ - Applying\
        \ the minimum (\u201Cneed-to-know\u201D/\"least privilege\") principle,\n\_\
        \ - Access rights are revoked when no longer needed."
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:1
      description: + The access rights granted for normal and privileged user accounts
        and technical accounts are reviewed at regular intervals also within IT systems
        of customers.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2
      description: + Strategies for authorizing access to information are prepared.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2
      description: + Authorization roles are used.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2
      description: + Rights are allocated on a need-to-use basis and according to
        the role and/or area of responsibility.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2
      description: + Normal user accounts are not granted privileged access rights.
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:2
      description: "+ The user\u2019s access rights are updated after the user\u2019\
        s responsibilities have changed (e.g., to another field of responsibility)."
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:3
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1
      name: (for high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:3:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:3
      description: + The access rights are approved by the responsible internal Information
        Officer. (C, I, A)
      implementation_groups:
      - high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:4
      assessable: false
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1
      name: (for very high protection needs)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:4:1
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:4
      description: + Information is stored in encrypted form at content level (e.g.,
        file level) to prevent unauthorized persons from gaining access and information
        (privileged users). Where encryption is not feasible, information shall be
        protected by similarly effective measures. (C)
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:4:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:4.2.1:4
      description: + Existing access rights are regularly reviewed at shorter intervals
        (e.g., quarterly). (C)
      implementation_groups:
      - very_high
    - urn: urn:intuitem:risk:req_node:tisax-v2027:5
      assessable: false
      depth: 1
      ref_id: '5'
      name: IT Security/ Cyber Security
    - urn: urn:intuitem:risk:req_node:tisax-v2027:5.1
      assessable: false
      depth: 2
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:5
      ref_id: '5.1'
      name: "\u200BCryptography"
    - urn: urn:intuitem:risk:req_node:tisax-v2027:5.1.1
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:5.1
      ref_id: 5.1.1
      name: To what extent is the use of cryptographic procedures managed?
      description: When using cryptographic  methods  it is important to consider
        risks in the field of availability (lost key material) as well as those risks
        that arise due to incorrectly applied  methods in the fields of integrity
        and confidentiality (poor algorithms/protocols or insufficient key strengths).
    - urn: urn:intuitem:risk:req_node:tisax-v2027:5.1.1:1
      assessable: false
      depth: 4
