        handling of prototypes.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1
      description: + Training of employees and project participants in the handling
        of prototypes at the start of projects.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1:3
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1
      description: + Mandatory participation of all employees involved in the project
        in the training and awareness-raising measures.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1:4
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1
      description: + The completed measures are to be documented.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1:5
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.3:1
      description: + The training concept for prototype protection is an integral
        part of the general training concept (see also control question 2.1.3 Information
        security).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1
      ref_id: 8.1.4
      name: To what extent is the qualification of employees for working in prototype
        areas ensured?
      description: Competent, reliable and trustworthy employees are key to protecting
        prototypes in the organization. Therefore, it is important to check the suitability
        of potential employees (e.g. applicants) to an appropriate extent.
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:1
