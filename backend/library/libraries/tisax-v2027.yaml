      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.2.1:1
      description: "+ A security concept is established.  The following aspects are\
        \ considered:\n  - Stability of outer skin,\n  - View and sight protection,\n\
        \  - Protection against unauthorized entry and access control,\n  - Intrusion\
        \ monitoring,\n  - Documented visitor management,\n  - Client segregation."
      implementation_groups:
      - must
