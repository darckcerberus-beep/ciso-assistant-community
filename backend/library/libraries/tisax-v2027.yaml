      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:1
      description: + The identity of potential employees is verified (e.g., checking
        identity documents).
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:2
      assessable: false
      depth: 3
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1
      name: (should)
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:2:1
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:2
      description: + The personal suitability of potential employees is verified by
        means of simple methods (e.g., job interview).
      implementation_groups:
      - should
    - urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:2:2
      assessable: true
      depth: 4
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:2.1.1:2
