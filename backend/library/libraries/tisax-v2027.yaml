      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.11:1
      description: "+ For each order and associated prototypes, procedures for dealing\
        \ with incidents are agreed with the client and known to the relevant employees.\
        \ The following aspects are considered:\n  - Breach of secrecy,\n  - Burglary,\n\
        \  - Theft,\n  - Breakdowns,\n  - Accidents,\n  - Fire,\n  - Irregularities\
        \ in transport,\n  - Dealing with authorities and law enforcement officers,\n\
        \  - Damage to camouflage."
      implementation_groups:
      - must
