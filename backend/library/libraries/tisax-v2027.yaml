      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:1
      description: + Sensitive work fields and jobs are determined.
      implementation_groups:
      - must
    - urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:1:2
      assessable: true
      depth: 5
      parent_urn: urn:intuitem:risk:req_node:tisax-v2027:8.1.4:1
      description: + The requirements for employees with respect to their job profiles
